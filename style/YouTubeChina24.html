<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHINA 24H - EN</title>
    <style>
        :root {
            --bg: #ffffff;
            --text-main: #111111;
            --text-muted: #888888;
            --card-radius: 8px;
            --transition: all 0.3s ease;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        header {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: var(--text-muted);
            font-weight: 400;
            font-size: 14px;
            margin-left: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .actions {
            display: flex;
            gap: 16px;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            color: var(--text-muted);
            transition: var(--transition);
        }

        .icon-btn:hover {
            color: var(--text-main);
        }

        .icon-btn svg {
            width: 20px;
            height: 20px;
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 32px 24px;
        }

        .card {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .thumb-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: var(--card-radius);
            overflow: hidden;
            background: #f5f5f5;
            margin-bottom: 12px;
        }

        .thumb-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }

        .card:hover .thumb-wrapper img {
            transform: scale(1.03);
        }

        .title {
            font-size: 15px;
            font-weight: 500;
            line-height: 1.4;
            margin: 0 0 6px 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .meta {
            font-size: 13px;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
        }

        .loader {
            text-align: center;
            padding: 100px 0;
            color: var(--text-muted);
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            grid-column: 1 / -1;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(5px);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            width: 100%;
            max-width: 320px;
        }

        .modal input {
            width: 100%;
            padding: 12px 0;
            font-size: 16px;
            border: none;
            border-bottom: 1px solid #ddd;
            background: transparent;
            outline: none;
            margin-bottom: 24px;
            transition: var(--transition);
        }

        .modal input:focus {
            border-bottom-color: var(--text-main);
        }

        .modal button {
            width: 100%;
            background: var(--text-main);
            color: var(--bg);
            border: none;
            padding: 14px;
            font-size: 14px;
            font-weight: 500;
            border-radius: var(--card-radius);
            cursor: pointer;
            transition: var(--transition);
        }

        .modal button:hover {
            background: #333;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">CHINA <span>24H / EN</span></div>
    <div class="actions">
        <button class="icon-btn" onclick="forceRefresh()" title="Refresh">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.59-10.45l5.25 5.25"/></svg>
        </button>
        <button class="icon-btn" onclick="toggleModal(true)" title="Settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
    </div>
</header>

<main>
    <div id="grid" class="grid"></div>
</main>

<div id="modal" class="modal">
    <div class="modal-content">
        <input type="password" id="api-key" placeholder="API Key" autocomplete="off">
        <button onclick="saveKey()">Save</button>
    </div>
</div>

<script>
    const KEYWORD = 'China';
    const CACHE_KEY = 'yt_en_cache';
    const TIME_KEY = 'yt_en_time';
    const CACHE_LIMIT = 24 * 60 * 60 * 1000;

    const grid = document.getElementById('grid');
    const modal = document.getElementById('modal');
    const input = document.getElementById('api-key');

    function toggleModal(show) {
        modal.style.display = show ? 'flex' : 'none';
        if (show) {
            input.value = localStorage.getItem('yt_api_key') || '';
            input.focus();
        }
    }

    function saveKey() {
        const val = input.value.trim();
        if (val) {
            localStorage.setItem('yt_api_key', val);
            toggleModal(false);
            fetchData(true);
        }
    }

    function forceRefresh() {
        fetchData(true);
    }

    function formatNumber(num) {
        if (num >= 10000) return (num / 10000).toFixed(1).replace(/\.0$/, '') + 'W';
        return num || 0;
    }

    function timeAgo(dateString) {
        const diff = Date.now() - new Date(dateString).getTime();
        const hours = Math.floor(diff / (1000 * 60 * 60));
        if (hours === 0) return 'Just now';
        return `${hours}h ago`;
    }

    async function fetchData(force = false) {
        const key = localStorage.getItem('yt_api_key');
        if (!key) return toggleModal(true);

        const now = Date.now();
        const lastTime = localStorage.getItem(TIME_KEY);
        
        if (!force && lastTime && (now - lastTime < CACHE_LIMIT)) {
            const cached = localStorage.getItem(CACHE_KEY);
            if (cached) return render(JSON.parse(cached));
        }

        grid.innerHTML = '<div class="loader">Loading...</div>';

        try {
            const time24hAgo = new Date(now - 24 * 60 * 60 * 1000).toISOString();

            // 核心修改：加入了 relevanceLanguage=en 强制约束语言为英语
            const searchUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(KEYWORD)}&type=video&order=viewCount&publishedAfter=${time24hAgo}&relevanceLanguage=en&maxResults=12&key=${key}`;
            const sRes = await fetch(searchUrl);
            const sData = await sRes.json();
            if (sData.error) throw new Error(sData.error.message);

            const ids = sData.items.map(i => i.id.videoId).join(',');
            
            const statUrl = `https://www.googleapis.com/youtube/v3/videos?part=statistics&id=${ids}&key=${key}`;
            const stRes = await fetch(statUrl);
            const stData = await stRes.json();

            const finalData = sData.items.map(item => {
                const stat = stData.items.find(s => s.id === item.id.videoId);
                return {
                    id: item.id.videoId,
                    title: item.snippet.title,
                    thumb: item.snippet.thumbnails.high.url,
                    time: item.snippet.publishedAt,
                    views: stat ? stat.statistics.viewCount : 0
                };
            });

            localStorage.setItem(CACHE_KEY, JSON.stringify(finalData));
            localStorage.setItem(TIME_KEY, now.toString());
            render(finalData);

        } catch (e) {
            grid.innerHTML = `<div class="loader" style="color: #e74c3c;">Error: ${e.message}</div>`;
        }
    }

    function render(items) {
        if (!items || !items.length) {
            grid.innerHTML = '<div class="loader">No Results</div>';
            return;
        }
        grid.innerHTML = items.map(i => `
            <a href="https://www.youtube.com/watch?v=${i.id}" target="_blank" class="card">
                <div class="thumb-wrapper">
                    <img src="${i.thumb}" loading="lazy">
                </div>
                <h2 class="title" title="${i.title}">${i.title}</h2>
                <div class="meta">
                    <span>${formatNumber(i.views)} views</span>
                    <span>${timeAgo(i.time)}</span>
                </div>
            </a>
        `).join('');
    }

    fetchData();
</script>
</body>
</html>
