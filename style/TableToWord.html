<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML表格转 Word/Excel 通用工具</title>
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/moodHappy/moodHappy.gitHub.io-nce/refs/heads/main/icon/TableToWord.png">
  <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/moodHappy/moodHappy.gitHub.io-nce/refs/heads/main/icon/TableToWord.png">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; max-width: 800px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; color: #2c3e50; font-size: 24px; margin-bottom: 30px; }
        .container { background-color: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        label { font-weight: bold; display: block; margin-bottom: 8px; color: #34495e; }
        textarea { width: 100%; height: 250px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-family: monospace; font-size: 14px; resize: vertical; box-sizing: border-box; margin-bottom: 20px; }

        /* 按钮容器，使用 Flexbox 并排排列 */
        .btn-group { display: flex; gap: 15px; margin-bottom: 20px; }
        button { flex: 1; border: none; padding: 15px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: all 0.3s; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; }

        .btn-word { background-color: #2980b9; }
        .btn-word:hover { background-color: #3498db; transform: translateY(-2px); box-shadow: 0 4px 8px rgba(41, 128, 185, 0.3); }

        .btn-excel { background-color: #27ae60; }
        .btn-excel:hover { background-color: #2ecc71; transform: translateY(-2px); box-shadow: 0 4px 8px rgba(39, 174, 96, 0.3); }

        .preview-area { margin-top: 30px; border-top: 2px dashed #ecf0f1; padding-top: 20px; }
        .preview-area table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .preview-area th, .preview-area td { border: 1px solid #bdc3c7; padding: 8px; text-align: left; }
        .preview-area th { background-color: #ecf0f1; }
    </style>
</head>
<body>

    <h1>HTML表格转换工具</h1>

    <div class="container">
        <label for="htmlInput">HTML源码</label>
        <textarea id="htmlInput" placeholder="请粘贴HTML表格代码..."></textarea>

        <div class="btn-group">
            <button class="btn-word" onclick="exportToWord()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                导出为 Word
            </button>
            <button class="btn-excel" onclick="exportToExcel()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="8" y1="13" x2="16" y2="13"></line><line x1="8" y1="17" x2="16" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                导出为 Excel
            </button>
        </div>

        <div class="preview-area" id="previewContainer" style="display: none;">
            <label>网页实时预览:</label>
            <div id="previewBox"></div>
        </div>
    </div>

    <script>
        // 实时预览功能
        document.getElementById('htmlInput').addEventListener('input', function() {
            const htmlContent = this.value;
            const previewContainer = document.getElementById('previewContainer');
            const previewBox = document.getElementById('previewBox');
            if (htmlContent.trim().length > 0) {
                previewContainer.style.display = 'block'; previewBox.innerHTML = htmlContent;
            } else {
                previewContainer.style.display = 'none'; previewBox.innerHTML = '';
            }
        });

        // ----------------------------------------------------
        // 1. 导出为 Word 的逻辑 (强力防错位网格追踪版 - 彻底通用)
        // ----------------------------------------------------
        function exportToWord() {
            let htmlSource = document.getElementById('htmlInput').value.trim();
            if (!htmlSource) { alert("请先输入HTML表格源码！"); return; }

            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = htmlSource;

            // 清理语义标签防止 WPS 解析错乱
            ['thead', 'tbody'].forEach(tag => {
                const elements = tempDiv.querySelectorAll(tag);
                elements.forEach(el => el.outerHTML = el.innerHTML);
            });

            // 表头降级为普通加粗 td
            const ths = tempDiv.querySelectorAll('th');
            ths.forEach(th => {
                const td = document.createElement('td');
                td.innerHTML = '<b>' + th.innerHTML + '</b>';
                td.style.backgroundColor = '#f2f2f2';
                th.parentNode.replaceChild(td, th);
            });

            const tables = tempDiv.querySelectorAll('table');
            tables.forEach(table => {
                table.setAttribute('border', '1');
                table.setAttribute('cellspacing', '0');
                table.setAttribute('cellpadding', '5');
                table.style.borderCollapse = 'collapse';
                table.style.width = '100%';
                table.style.tableLayout = 'fixed'; 

                // 动态计算任意表格的最大列数 (完全通用)
                let maxCols = 0;
                Array.from(table.rows).forEach(row => {
                    let colsInRow = 0;
                    Array.from(row.cells).forEach(cell => {
                        colsInRow += parseInt(cell.getAttribute('colspan') || 1);
                    });
                    if (colsInRow > maxCols) maxCols = colsInRow;
                });

                if (maxCols === 0) return;

                // 动态分配列宽
                const colWidth = (100 / maxCols).toFixed(2) + '%';

                // 网格矩阵追踪器：解决任意 rowspan 导致的列宽错位
                let gridSpans = {}; 

                Array.from(table.rows).forEach(row => {
                    let currentCol = 0;

                    Array.from(row.cells).forEach(cell => {
                        while (gridSpans[currentCol] > 0) {
                            currentCol++;
                        }

                        // 强制写入固定宽度
                        cell.setAttribute('width', colWidth);
                        cell.style.width = colWidth;
                        cell.style.wordBreak = 'break-all';
                        cell.style.wordWrap = 'break-word';
                        cell.style.border = '1px solid windowtext';

                        if (cell.innerHTML.trim() === '') cell.innerHTML = '&nbsp;';

                        let rowSpan = parseInt(cell.getAttribute('rowspan') || 1);
                        let colSpan = parseInt(cell.getAttribute('colspan') || 1);

                        if (rowSpan > 1) {
                            for (let i = 0; i < colSpan; i++) {
                                gridSpans[currentCol + i] = rowSpan - 1;
                            }
                        }

                        currentCol += colSpan;
                    });

                    for (let key in gridSpans) {
                        if (gridSpans[key] > 0) gridSpans[key]--;
                    }
                });
            });

            const processedHtml = tempDiv.innerHTML;

            const preHtml = `
                <html xmlns:o='urn:schemas-microsoft-com:office:office' 
                      xmlns:w='urn:schemas-microsoft-com:office:word' 
                      xmlns='http://www.w3.org/TR/REC-html40'>
                <head><meta charset='utf-8'><title>Exported Table</title>
                <style> table { mso-table-layout-alt: fixed; } td { mso-border-alt: solid windowtext .5pt; } </style>
                </head><body><p style="margin:0; padding:0; line-height:1px;">&nbsp;</p>
            `;
            const postHtml = `</body></html>`;

            triggerDownload(preHtml + processedHtml + postHtml, 'application/msword', 'Word导出_');
        }

        // ----------------------------------------------------
        // 2. 导出为 Excel 的逻辑 (原生结构版，智能识别跨行跨列)
        // ----------------------------------------------------
        function exportToExcel() {
            let htmlSource = document.getElementById('htmlInput').value.trim();
            if (!htmlSource) { alert("请先输入HTML表格源码！"); return; }

            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = htmlSource;

            // Excel 引擎很聪明，只需要确保有基本的边框属性即可
            const tables = tempDiv.querySelectorAll('table');
            tables.forEach(table => {
                table.setAttribute('border', '1');
                const cells = table.querySelectorAll('th, td');
                cells.forEach(cell => {
                    cell.style.border = '1pt solid black'; // Excel识别pt单位的边框最准确
                });
            });

            const processedHtml = tempDiv.innerHTML;

            // Excel 专属的 Office XML 头部协议，告诉 Excel 这是它的专属文件
            const preHtml = `
                <html xmlns:o="urn:schemas-microsoft-com:office:office"
                      xmlns:x="urn:schemas-microsoft-com:office:excel"
                      xmlns="http://www.w3.org/TR/REC-html40">
                <head>
                    <meta charset="utf-8">
                    </head>
                <body>
            `;
            const postHtml = `</body></html>`;

            // Excel 导出使用 application/vnd.ms-excel 类型
            triggerDownload(preHtml + processedHtml + postHtml, 'application/vnd.ms-excel', 'Excel导出_');
        }

        // ----------------------------------------------------
        // 3. 通用下载触发器
        // ----------------------------------------------------
        function triggerDownload(fullHtml, mimeType, prefix) {
            // 添加 BOM (\ufeff) 确保中文在各种环境中绝不乱码
            const blob = new Blob(['\ufeff', fullHtml], { type: mimeType + ';charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const downloadLink = document.createElement("a");

            // 动态决定后缀名
            const extension = mimeType.includes('excel') ? '.xls' : '.doc';

            downloadLink.href = url;
            downloadLink.download = prefix + new Date().getTime() + extension;
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
            URL.revokeObjectURL(url);
        }
    </script>

</body>
</html>
