<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML表格转Word (WPS手机完美兼容版)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; max-width: 800px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; color: #2c3e50; font-size: 24px; }
        .container { background-color: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        label { font-weight: bold; display: block; margin-bottom: 8px; color: #34495e; }
        textarea { width: 100%; height: 250px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-family: monospace; font-size: 14px; resize: vertical; box-sizing: border-box; margin-bottom: 20px; }
        button { display: block; width: 100%; background-color: #27ae60; color: white; border: none; padding: 15px; font-size: 16px; font-weight: bold; border-radius: 4px; cursor: pointer; transition: background-color 0.3s; }
        button:hover { background-color: #2ecc71; }
        .preview-area { margin-top: 30px; border-top: 2px dashed #ecf0f1; padding-top: 20px; }
        .preview-area table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .preview-area th, .preview-area td { border: 1px solid #bdc3c7; padding: 8px; text-align: left; }
        .preview-area th { background-color: #ecf0f1; }
    </style>
</head>
<body>

    <h1>HTML表格转Word (WPS手机完美兼容版)</h1>
    
    <div class="container">
        <label for="htmlInput">请在此处粘贴HTML表格源码：</label>
        <textarea id="htmlInput" placeholder="输入您的表格代码..."></textarea>
        
        <button onclick="exportToWord()">转换为 Word 并下载</button>

        <div class="preview-area" id="previewContainer" style="display: none;">
            <label>网页预览 (仅供参考):</label>
            <div id="previewBox"></div>
        </div>
    </div>

    <script>
        document.getElementById('htmlInput').addEventListener('input', function() {
            const htmlContent = this.value;
            const previewContainer = document.getElementById('previewContainer');
            const previewBox = document.getElementById('previewBox');
            if (htmlContent.trim().length > 0) {
                previewContainer.style.display = 'block'; previewBox.innerHTML = htmlContent;
            } else {
                previewContainer.style.display = 'none'; previewBox.innerHTML = '';
            }
        });

        function exportToWord() {
            let htmlSource = document.getElementById('htmlInput').value.trim();
            if (!htmlSource) { alert("请先输入HTML表格源码！"); return; }

            // 1. 创建临时容器处理 HTML
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = htmlSource;

            const tables = tempDiv.querySelectorAll('table');
            tables.forEach(table => {
                // 强制写入最基础的 HTML 属性
                table.setAttribute('border', '1');
                table.setAttribute('cellspacing', '0');
                table.setAttribute('cellpadding', '5');
                table.setAttribute('width', '100%'); // 关键：WPS手机端依赖这个属性
                table.style.width = '100%';
                table.style.borderCollapse = 'collapse';
                
                // 2. 自动计算列数并平分宽度，防止某几列挤在一起
                const headers = table.querySelectorAll('th');
                if (headers.length > 0) {
                    // 平均分配宽度
                    const widthPercent = Math.floor(100 / headers.length) + '%';
                    headers.forEach(th => {
                        th.setAttribute('width', widthPercent);
                        th.style.width = widthPercent;
                    });
                }

                // 3. 遍历所有单元格修复空内容和边框
                const cells = table.querySelectorAll('th, td');
                cells.forEach(cell => {
                    cell.style.border = '1px solid black'; // 强制黑框
                    cell.setAttribute('valign', 'middle'); // 垂直居中
                    
                    // 关键修复：如果单元格是空的（比如你的“负责人”），塞入一个不换行空格
                    if (cell.innerHTML.trim() === '') {
                        cell.innerHTML = '&nbsp;';
                    }
                });
            });

            const processedHtml = tempDiv.innerHTML;

            // 4. 包含微软 Office 专属元数据的 HTML 骨架（强制以页面视图排版）
            const preHtml = `
                <html xmlns:o='urn:schemas-microsoft-com:office:office' 
                      xmlns:w='urn:schemas-microsoft-com:office:word' 
                      xmlns='http://www.w3.org/TR/REC-html40'>
                <head>
                    <meta charset='utf-8'>
                    <title>Exported Table</title>
                    <style>
                        table {
                            mso-table-layout-alt: fixed; /* 强制Word锁定表格布局 */
                            word-wrap: break-word;
                        }
                    </style>
                </head>
                <body>
            `;
            const postHtml = `
                </body>
                </html>
            `;
            
            const fullHtml = preHtml + processedHtml + postHtml;

            const blob = new Blob(['\ufeff', fullHtml], {
                type: 'application/msword;charset=utf-8'
            });

            const downloadLink = document.createElement("a");
            const url = URL.createObjectURL(blob);
            downloadLink.href = url;
            downloadLink.download = "表格导出_" + new Date().getTime() + ".doc";
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
