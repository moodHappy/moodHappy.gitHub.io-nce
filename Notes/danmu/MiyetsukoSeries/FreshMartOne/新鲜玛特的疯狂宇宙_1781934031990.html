<!DOCTYPE html>

    <title>新鲜玛特的疯狂宇宙</title>
    <style>
        body { 
            font-family: "Microsoft YaHei", "Arial Black", sans-serif; 
            line-height: 1.5; 
            background: #fff8dc; 
            color: #222; 
            max-width: 1100px; 
            margin: 0 auto; 
            padding: 20px; 
            border: 6px solid #8b0000;
        }
        h1 { 
            text-align: center; 
            background: #8b0000; 
            color: #fff; 
            padding: 15px; 
            letter-spacing: 2px; 
            transform: rotate(-1deg);
            box-shadow: 5px 5px 0px #222;
        }
        .subtitle {
            text-align: center;
            font-weight: bold;
            color: #444;
            transform: rotate(1deg);
            margin-bottom: 30px;
        }
        .season-divider {
            background: #222;
            color: #fff;
            padding: 15px;
            font-size: 1.3rem;
            font-weight: 900;
            text-align: center;
            letter-spacing: 1px;
            margin: 40px 0 20px 0;
            border: 3px dashed #8b0000;
            transform: rotate(-1deg);
            box-shadow: -4px 4px 0px #8b0000;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }
        .season-divider:hover {
            background: #444;
            color: #ffcccc;
        }
        .season-divider:nth-of-type(even) {
            transform: rotate(1deg);
            box-shadow: 4px 4px 0px #8b0000;
        }
        .container {
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 15px;
            transition: all 0.3s ease;
        }
        .ep { 
            position: relative;
            background: #fff; 
            padding: 15px; 
            border: 2px dashed #444; 
            box-shadow: 4px 4px 0px #aaa;
            transition: all 0.1s;
        }
        .ep:hover {
            background: #ffe4e1;
            box-shadow: 6px 6px 0px #8b0000;
            z-index: 10;
            transform: scale(1.02) !important;
        }
        .ep:nth-child(even) { transform: rotate(1.5deg); }
        .ep:nth-child(odd) { transform: rotate(-1.5deg); }
        .ep:nth-child(3n) { transform: rotate(0.5deg); } 
        
        .score {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #222;
            color: #ffcccc;
            font-size: 0.8rem;
            font-weight: 900;
            padding: 3px 6px;
            border-radius: 3px;
            border: 1px solid #8b0000;
            transform: rotate(4deg);
            box-shadow: 2px 2px 0px #8b0000;
            z-index: 2;
        }
        .ep:hover .score {
            transform: rotate(-2deg) scale(1.1);
            background: #8b0000;
            color: #fff;
            transition: all 0.2s;
        }

        .title { 
            font-weight: 900; 
            color: #b22222; 
            font-size: 1.1rem; 
            margin-bottom: 8px; 
            border-bottom: 2px solid #222;
            padding-bottom: 3px;
            padding-right: 45px;
        }
        p { margin: 0; font-size: 0.95rem; color: #111; text-align: justify; }
    </style>
<style>
        /* --- 通用：段落朗读按钮 --- */

        .tts-btn { padding: 0; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; font-weight: 500; transition: background 0.2s; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

        .test-err { background: #ffebee !important; color: #c62828 !important; }

        .tts-cancel { background: #f1f3f4; color: #333; }
        
        /* --- 移动端特别优化 (屏幕小于 480px) --- */

            .tts-source-row { gap: 4px; }
            .tts-btn-test, .tts-btn-del { width: 28px; height: 28px; }
        }

        @media (prefers-color-scheme: dark) {
            .tts-modal { background: #202124; color: #e8eaed; }
            .tts-header, .tts-footer { border-color: #3c4043; }

            .tts-inp { background: #303134; border-color: #5f6368; color: white; }
            .tts-btn-add { background: #303134; color: #81c784; border-color: #81c784; }
            .tts-btn-del { background: #451a1a; color: #ef9a9a; }

            .test-ok { background: #1b5e20 !important; color: #a5d6a7 !important; }
            .test-err { background: #b71c1c !important; color: #ef9a9a !important; }
            .tts-cancel { background: #303134; color: #e8eaed; }

    <script>
        // ==========================================
        // ⚠️ GitHub 仓库配置
        // ==========================================
        const GITHUB_OWNER = 'moodHappy'; 
        const GITHUB_REPO = 'moodHappy.gitHub.io-nce';     
        const FILE_PATH = 'Notes/danmu/MiyetsukoSeries/FreshMartOne/新鲜玛特的疯狂宇宙_1781934031990.html';        
        // ==========================================

        const controls = document.getElementById('simple-edit-controls');
        const saveBtn = document.getElementById('github-save-btn');

        // 1. 初始化可编辑元素
        const getEditableElements = () => document.querySelectorAll('.title, .ep p, .score');
        
        // 绑定编辑框特效的公共函数
        function bindEditEffects(elements) {
            elements.forEach(el => {
                // 防止重复绑定
                if(el.dataset.bound) return; 
                el.dataset.bound = "true";

                el.addEventListener('focus', () => {
                    el.style.backgroundColor = '#fffacd';
                    el.style.outline = '2px dashed #8b0000';
                    if (el.classList.contains('score')) el.style.color = '#8b0000';
                });
                el.addEventListener('blur', () => {
                    el.style.backgroundColor = '';
                    el.style.outline = '';
                    if (el.classList.contains('score')) el.style.color = '';
                });
            });
        }
        
        // 初始化绑定页面已有的元素
        bindEditEffects(getEditableElements());

        // 2. 模式切换机制
        function toggleEditMode() {
            const isEditing = controls.style.display === 'block';
            if (!isEditing) {
                controls.style.display = 'block';
                saveBtn.style.display = 'block';
                document.body.style.border = '6px solid #228b22'; 
                getEditableElements().forEach(el => el.setAttribute('contenteditable', 'true'));
            } else {
                controls.style.display = 'none';
                saveBtn.style.display = 'none';
                document.body.style.border = '6px solid #8b0000';
                getEditableElements().forEach(el => {
                    el.blur();
                    el.removeAttribute('contenteditable');
                });
            }
        }

        // 触发方式
        document.addEventListener('touchstart', (e) => { 
            if (e.touches.length === 2) { e.preventDefault(); toggleEditMode(); } 
        }, { passive: false });
        
        document.addEventListener('dblclick', (e) => { 
            if (e.altKey) { window.getSelection().removeAllRanges(); toggleEditMode(); } 
        });

        // 3. 极简增加逻辑 (核心修复区：不刷新，动态绑定！)
        document.getElementById('simple-add-btn').addEventListener('click', () => {
            const sName = prompt('请输入你要添加的季名\n（例如：第 XXI 部）：');
            if (!sName) return; 

            let epTemplate = '';
            for (let i = 1; i <= 10; i++) {
                epTemplate += `<div class="ep"><div class="score">?.?分</div><div class="title">第??章：[标题占位符]</div><p>[内容占位符]</p></div>`;
            }
            // 默认让新加的容器展开 (display: grid)
            const newSeasonHtml = `<div class="season-divider">${sName} (第??-??章)</div><div class="container" style="display: grid;">${epTemplate}</div>`;
            
            // 插入 HTML
            controls.insertAdjacentHTML('beforebegin', newSeasonHtml);
            
            // 抓取刚刚生成的新元素
            const newContainer = controls.previousElementSibling;
            const newDivider = newContainer.previousElementSibling;

            // 给新生成的标题加上点击折叠/展开功能
            newDivider.addEventListener('click', () => {
                if (newContainer.style.display === "none" || newContainer.style.display === "") {
                    newContainer.style.display = "grid";
                } else {
                    newContainer.style.display = "none";
                }
            });

            // 给新生成的文字框加上高亮特效和可编辑属性
            const newEdits = newContainer.querySelectorAll('.title, .ep p, .score');
            bindEditEffects(newEdits);
            newEdits.forEach(el => el.setAttribute('contenteditable', 'true'));

            alert('✨ 章节已生成在页面底部！\n您可以直接修改内容。\n⚠️ 注意：修改完成后，千万别忘了点击底部的【同步提交到 GitHub】！');
        });

        // 4. 删除逻辑
        document.getElementById('simple-del-btn').addEventListener('click', () => {
            const dividers = document.querySelectorAll('.season-divider');
            if (dividers.length === 0) return alert('已经删光了！');
            
            const lastDivider = dividers[dividers.length - 1];
            const lastContainer = lastDivider.nextElementSibling;
            
            if (confirm(`⚠️ 确定要删除【${lastDivider.innerText}】吗？\n删除后别忘了点提交才能真正从 GitHub 删掉哦！`)) {
                lastDivider.remove();
                if (lastContainer && lastContainer.classList.contains('container')) {
                    lastContainer.remove();
                }
            }
        });

        // 5. 纯净代码提取
        function getPurifiedHTML() {
            const clone = document.documentElement.cloneNode(true);
            
            clone.querySelectorAll('#simple-edit-controls, #github-save-btn').forEach(el => el.remove());
            clone.querySelectorAll('[id^="anki-"], #tts-plus-root, relingo-app, [data-relingo-block], [data-relin-paragraph], script[src*="extension"]').forEach(el => el.remove());
            
            clone.querySelector('body').style.border = '6px solid #8b0000';
            clone.querySelectorAll('.title, .ep p, .score').forEach(el => {
                el.removeAttribute('contenteditable');
                el.removeAttribute('data-bound'); // 移除我们自己加的标记
                el.style.backgroundColor = '';
                el.style.outline = '';
                el.style.color = '';
            });
            return `<!DOCTYPE html>\n${clone.outerHTML}`;
        }

        // 6. GitHub 同步
        saveBtn.addEventListener('mousedown', () => { saveBtn.style.boxShadow = '0 0px 0px #8b0000'; saveBtn.style.transform = 'translateX(-50%) translateY(4px)'; });
        saveBtn.addEventListener('mouseup', () => { saveBtn.style.boxShadow = '0 4px 0px #8b0000'; saveBtn.style.transform = 'translateX(-50%) translateY(0)'; });
        saveBtn.addEventListener('touchstart', () => { saveBtn.style.boxShadow = '0 0px 0px #8b0000'; saveBtn.style.transform = 'translateX(-50%) translateY(4px)'; });
        saveBtn.addEventListener('touchend', () => { saveBtn.style.boxShadow = '0 4px 0px #8b0000'; saveBtn.style.transform = 'translateX(-50%) translateY(0)'; });

        saveBtn.addEventListener('click', async () => {
            let token = localStorage.getItem('github_pat');
            if (!token) {
                token = prompt('请输入 GitHub Token:');
                if (!token) return;
                localStorage.setItem('github_pat', token);
            }
            saveBtn.innerText = '⏳ 正在拼命推送到云端...';
            saveBtn.style.pointerEvents = 'none';
            try {
                const apiUrl = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${FILE_PATH}`;
                const getRes = await fetch(apiUrl, { headers: { 'Authorization': `Bearer ${token}` } });
                
                if (getRes.status === 401) {
                    localStorage.removeItem('github_pat');
                    throw new Error('Token 无效，请重新输入。');
                }
                
                const fileSha = (await getRes.json()).sha;
                const cleanHTML = getPurifiedHTML();
                
                const putRes = await fetch(apiUrl, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: '📝 更新宇宙档案 (极简模式)',
                        content: btoa(unescape(encodeURIComponent(cleanHTML))),
                        sha: fileSha
                    })
                });
                if (putRes.ok) {
                    alert('🎉 终于搞定了，同步成功！');
                    if (controls.style.display === 'block') toggleEditMode(); 
                } else {
                    const err = await putRes.json();
                    throw new Error(err.message || '保存失败');
                }
            } catch (e) { 
                alert('报错了兄弟: ' + e.message); 
                controls.style.display = 'block'; 
            }
            finally { 
                saveBtn.innerText = '🚀 同步提交到 GitHub'; 
                saveBtn.style.pointerEvents = 'auto'; 
            }
        });
    </script>
