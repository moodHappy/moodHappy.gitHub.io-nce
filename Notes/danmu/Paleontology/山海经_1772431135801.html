    <title>山海经异兽神灵异草图鉴·古风注音版</title>
    <style>
        /* 基础古风排版 */
        body {
            /* 使用传统楷体/宋体作为主要中文字体 */
            font-family: "STKaiti", "KaiTi", "BiauKai", "楷体", "SimSun", "宋体", serif;
            line-height: 1.6;
            color: #2b2219; /* 墨色 */
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            /* 宣纸/羊皮纸质感背景色 */
            background-color: #f6f4ec; 
            /* 极淡的“山海经”背景水印 */
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" opacity="0.03"><text x="30" y="150" font-family="楷体" font-size="40" transform="rotate(-30)">山海经</text></svg>');
        }

        h1 {
            text-align: center;
            color: #611512; /* 朱砂红 */
            font-size: 28px;
            margin-bottom: 30px;
            letter-spacing: 4px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
            border-bottom: 2px solid #d5c4b3;
            padding-bottom: 20px;
        }

        /* 大分类卡片 */
        .main-category {
            background: #fffdf7;
            border: 1px solid #d5c4b3;
            border-radius: 4px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(97, 21, 18, 0.04);
        }

        .main-category h2 {
            border-bottom: 1px dashed #c4ad98;
            padding-bottom: 12px;
            color: #611512;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 20px;
            letter-spacing: 2px;
            font-weight: bold;
        }
        
        /* 古典折叠面板样式 */
        details {
            margin-bottom: 15px;
            background: #fbf8f1;
            border-radius: 4px;
            border: 1px solid #e2d7c8;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        summary {
            padding: 14px 20px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            color: #3e3226;
            background: #f1e9d8;
            border-left: 4px solid #611512; /* 左侧朱红点缀，形似古籍书脊 */
            list-style: none;
            position: relative;
            transition: background 0.2s ease;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; /* 标题用回现代字体保持清晰 */
        }
        
        summary::-webkit-details-marker {
            display: none;
        }
        
        summary:hover {
            background: #e6dac3;
        }
        
        summary::after {
            content: "▼";
            position: absolute;
            right: 20px;
            font-size: 12px;
            color: #8c7a6b;
            transition: transform 0.3s ease;
        }
        
        details[open] summary::after {
            transform: rotate(180deg);
        }
        
        /* 内部网格列表 */
        .details-content {
            padding: 20px;
            background-color: #fffdf7;
        }

        .grid-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px;
            padding: 0;
            margin: 0;
            list-style: none;
        }
        
        /* 交互式印章风格按钮 */
        .grid-list li a {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 12px 5px;
            background-color: transparent;
            border: 1px solid #d5c4b3;
            color: #2b2219;
            text-decoration: none;
            border-radius: 4px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            height: 100%;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        /* 悬停时的朱砂印泥背景填色效果 */
        .grid-list li a::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #611512;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .grid-list li a:hover {
            border-color: #611512;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(97, 21, 18, 0.2);
        }

        /* 悬停时文字变白 */
        .grid-list li a:hover::before {
            opacity: 1;
        }

        .grid-list li a:hover .name,
        .grid-list li a:hover .pinyin {
            color: #f6f4ec;
        }

        .pinyin {
            font-size: 11px;
            color: #8c7a6b;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; /* 拼音必须用现代无衬线字体才好读 */
            margin-bottom: 4px; /* 拼音在上了，留出下边距 */
            transition: color 0.3s ease;
        }

        .name {
            font-size: 17px;
            font-weight: 600;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }
        
        .count-tag {
            font-size: 13px;
            font-weight: normal;
            color: #8c7a6b;
        }
    </style>
</head>
