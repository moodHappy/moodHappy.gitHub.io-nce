<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双语对照电子书生成器 (全功能终极版)</title>
    <style>
        :root {
            --bg: #f8fafc;
            --panel-en: #ffffff;
            --panel-zh: #f1f5f9;
            --primary: #2563eb;
            --secondary: #10b981;
            --text-dark: #1e293b;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg); overflow: hidden;
        }

        /* ----- 输入界面 ----- */
        #setup-view {
            padding: 20px; display: flex; flex-direction: column;
            align-items: center; height: 100%; box-sizing: border-box; overflow-y: auto;
        }

        .container { width: 100%; max-width: 1100px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0; }
        textarea { width: 100%; height: 500px; padding: 15px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; line-height: 1.6; resize: none; box-sizing: border-box; }
        
        .button-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-top: 10px;
        }

        .btn-main { background: var(--primary); color: white; padding: 12px 60px; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; width: 300px; }
        .btn-main:hover { opacity: 0.9; }
        .btn-copy-source { background: var(--secondary); }

        /* ----- 阅读界面 ----- */
        #reading-view { display: none; flex-direction: column; height: 100vh; }
        .nav-bar { height: 50px; background: #0f172a; color: white; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 100; }
        .btn-tool { background: #334155; color: white; border: none; padding: 5px 15px; border-radius: 4px; cursor: pointer; font-size: 13px; margin-left: 10px;}
        .btn-tool:hover { background: #475569; }

        .panes { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
        .pane { flex: 1; overflow-y: auto; padding: 40px; scroll-behavior: auto; }
        #pane-en { border-bottom: 2px solid #cbd5e1; background: var(--panel-en); font-family: "Georgia", serif; font-size: 1.25rem; line-height: 1.8; }
        #pane-zh { background: var(--panel-zh); font-size: 1.15rem; line-height: 1.8; color: #334155; }
        .inner { max-width: 850px; margin: 0 auto; }

        /* 源码弹出层 */
        #code-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content { background: white; width: 80%; height: 80%; padding: 20px; border-radius: 8px; display: flex; flex-direction: column; }
        #code-output { flex: 1; font-family: monospace; font-size: 12px; margin-top: 10px; border: 1px solid #ccc; padding: 10px; overflow: auto; white-space: pre-wrap; }
    </style>
</head>
<body>

    <div id="setup-view">
        <div class="container">
            <h2 style="margin-top:0; text-align: center;">📖 沉浸式双语书生成器 (全能版)</h2>
            <div class="input-grid">
                <div>
                    <label><b>英文原著 (上半区)</b></label>
                    <textarea id="en-raw" placeholder="在此粘贴整本英文内容..."></textarea>
                </div>
                <div>
                    <label><b>中文翻译 (下半区)</b></label>
                    <textarea id="zh-raw" placeholder="在此粘贴对应中文内容..."></textarea>
                </div>
            </div>
            
            <div class="button-group">
                <button class="btn-main" onclick="startReading()">预览双语效果</button>
                <button class="btn-main btn-copy-source" onclick="generateSource()">✨ 生成并复制带记忆/模式切换的源码</button>
            </div>
        </div>
    </div>

    <div id="reading-view">
        <div class="nav-bar">
            <button class="btn-tool" onclick="location.reload()" style="margin-left: 0;">← 返回修改内容</button>
            <span style="font-size: 14px;"><input type="checkbox" id="sync-active" checked> 开启比例同步滚动</span>
            <button class="btn-tool" onclick="downloadFile()">保存此书 HTML</button>
        </div>
        <div class="panes">
            <div class="pane" id="pane-en"><div class="inner" id="out-en"></div></div>
            <div class="pane" id="pane-zh"><div class="inner" id="out-zh"></div></div>
        </div>
    </div>

    <div id="code-modal">
        <div class="modal-content">
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <b>🎉 导出版源码已生成：</b>
                <button style="padding: 5px 15px; cursor: pointer;" onclick="document.getElementById('code-modal').style.display='none'">关闭</button>
            </div>
            <textarea id="code-output" readonly></textarea>
            <p style="font-size: 12px; color: #666;">代码已复制！保存为 .html 文件后，它将支持【记忆阅读位置】和【英/中/双模式实时切换】。</p>
        </div>
    </div>

    <script>
        const enInput = document.getElementById('en-raw'), zhInput = document.getElementById('zh-raw');
        const outEn = document.getElementById('out-en'), outZh = document.getElementById('out-zh');
        const pEn = document.getElementById('pane-en'), pZh = document.getElementById('pane-zh');

        function format(t) {
            return t.split('\n').filter(l => l.trim()).map(l => `<p>${l.trim()}</p>`).join('');
        }

        function startReading() {
            if(!enInput.value && !zhInput.value) return alert("内容为空");
            outEn.innerHTML = format(enInput.value);
            outZh.innerHTML = format(zhInput.value);
            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('reading-view').style.display = 'flex';
        }

        let isSyncing = false;
        function sync(e, target) {
            if (!document.getElementById('sync-active').checked || isSyncing) return;
            isSyncing = true;
            const ratio = e.scrollTop / (e.scrollHeight - e.clientHeight);
            target.scrollTop = ratio * (target.scrollHeight - target.clientHeight);
            setTimeout(() => { isSyncing = false; }, 30);
        }
        pEn.onscroll = () => sync(pEn, pZh);
        pZh.onscroll = () => sync(pZh, pEn);

        // --- 核心：打包带模式切换和记忆功能的 HTML ---
        function getFullSource() {
            const finalEn = format(enInput.value);
            const finalZh = format(zhInput.value);
            const bookId = "book_" + Date.now(); // 唯一ID

            return `<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>沉浸阅读器</title>
    <style>
        body, html { margin: 0; height: 100%; font-family: sans-serif; overflow: hidden; background: #f8fafc; }
        .bar { height: 40px; background: #0f172a; color: white; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; font-size: 13px; }
        .controls { display: flex; gap: 10px; align-items: center; }
        .btn { background: #334155; color: white; border: none; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; transition: background 0.2s; }
        .btn:hover { background: #475569; }
        .btn-mode { background: #3b82f6; font-weight: bold; }
        .btn-mode:hover { background: #2563eb; }
        
        .panes { display: flex; flex-direction: column; height: calc(100vh - 40px); }
        .pane { flex: 1; overflow-y: auto; padding: 40px; scroll-behavior: auto; }
        #en { background: white; font-family: "Georgia", serif; font-size: 1.25rem; line-height: 1.8; border-bottom: 2px solid #cbd5e1; }
        #zh { background: #f1f5f9; font-size: 1.15rem; line-height: 1.8; color: #334155; }
        .inner { max-width: 800px; margin: 0 auto; }
        
        /* 滚动条美化 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div class="bar">
        <span id="status-text">📖 进度自动保存中...</span>
        <div class="controls">
            <button id="mode-btn" class="btn btn-mode" onclick="toggleMode()">模式: 双语对照</button>
            <button class="btn" onclick="if(confirm('重置阅读进度并回到顶部？')){localStorage.removeItem('${bookId}');location.reload();}">重置</button>
        </div>
    </div>
    <div class="panes">
        <div class="pane" id="en"><div class="inner">${finalEn}</div></div>
        <div class="pane" id="zh"><div class="inner">${finalZh}</div></div>
    </div>
    <script>
        const e = document.getElementById('en'), z = document.getElementById('zh');
        const modeBtn = document.getElementById('mode-btn');
        const id = "${bookId}";
        
        let s = false;
        let mode = 0; // 0: 双语, 1: 纯英文, 2: 纯中文
        const modeLabels = ['双语对照', '纯英模式', '纯中模式'];

        // 获取当前正在阅读的百分比
        function getRatio() {
            if (mode === 1) return e.scrollHeight > e.clientHeight ? e.scrollTop / (e.scrollHeight - e.clientHeight) : 0;
            if (mode === 2) return z.scrollHeight > z.clientHeight ? z.scrollTop / (z.scrollHeight - z.clientHeight) : 0;
            return e.scrollHeight > e.clientHeight ? e.scrollTop / (e.scrollHeight - e.clientHeight) : 0;
        }

        // 设置所有面板的百分比
        function setRatio(r) {
            if (mode === 0 || mode === 1) e.scrollTop = r * (e.scrollHeight - e.clientHeight);
            if (mode === 0 || mode === 2) z.scrollTop = r * (z.scrollHeight - z.clientHeight);
        }

        // 切换阅读模式
        function toggleMode() {
            const currentRatio = getRatio(); // 切换前记录百分比
            
            mode = (mode + 1) % 3;
            modeBtn.innerText = "模式: " + modeLabels[mode];
            
            if (mode === 0) {
                e.style.display = 'block'; z.style.display = 'block';
                e.style.borderBottom = '2px solid #cbd5e1';
            } else if (mode === 1) {
                e.style.display = 'block'; z.style.display = 'none';
                e.style.borderBottom = 'none';
            } else {
                e.style.display = 'none'; z.style.display = 'block';
            }
            
            // 稍作延迟等待 CSS 渲染后再恢复位置，实现无缝衔接
            setTimeout(() => setRatio(currentRatio), 20);
        }

        // 页面初始化恢复记忆进度
        window.onload = () => {
            const r = localStorage.getItem(id);
            if(r) { 
                setTimeout(() => setRatio(parseFloat(r)), 100);
            }
        };

        // 滚动同步与进度储存
        function sync(a, b) {
            if(s) return; s = true;
            const r = a.scrollHeight > a.clientHeight ? a.scrollTop / (a.scrollHeight - a.clientHeight) : 0;
            b.scrollTop = r * (b.scrollHeight - b.clientHeight);
            localStorage.setItem(id, r);
            setTimeout(() => { s = false; }, 30);
        }

        e.onscroll = () => { 
            if(mode === 0) sync(e, z); 
            else if(mode === 1) localStorage.setItem(id, getRatio()); 
        };
        z.onscroll = () => { 
            if(mode === 0) sync(z, e); 
            else if(mode === 2) localStorage.setItem(id, getRatio()); 
        };
    <\/script>
</body>
</html>`;
        }

        function generateSource() {
            if(!enInput.value && !zhInput.value) return alert("请先填入内容");
            const src = getFullSource();
            document.getElementById('code-output').value = src;
            document.getElementById('code-modal').style.display = 'flex';
            
            navigator.clipboard.writeText(src).then(() => {
                alert("✅ 终极版 HTML 源码已生成，并自动复制到剪贴板！\n粘贴保存为文件即可。");
            }).catch(()=> {
                alert("生成成功。由于浏览器安全限制，请手动全选下方代码复制。");
            });
        }

        function downloadFile() {
            if(!enInput.value && !zhInput.value) return alert("请先填入内容");
            const blob = new Blob([getFullSource()], {type: 'text/html'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'immersive_bilingual_book.html';
            a.click();
        }
    </script>
</body>
</html>
