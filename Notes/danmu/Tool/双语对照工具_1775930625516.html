<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双语对照电子书生成器</title>
    <style>
        :root {
            --bg: #f8fafc;
            --panel-en: #ffffff;
            --panel-zh: #f1f5f9;
            --primary: #2563eb;
            --secondary: #10b981;
            --text-dark: #1e293b;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg); overflow: hidden;
        }

        /* ----- 第一步：输入界面 ----- */
        #setup-view {
            padding: 20px; display: flex; flex-direction: column;
            align-items: center; height: 100%; box-sizing: border-box; overflow-y: auto;
        }

        .container { width: 100%; max-width: 1100px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0; }
        textarea { width: 100%; height: 500px; padding: 15px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; line-height: 1.6; resize: none; box-sizing: border-box; }
        
        .button-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-top: 10px;
        }

        .btn-main { background: var(--primary); color: white; padding: 12px 60px; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; width: 300px; }
        .btn-main:hover { opacity: 0.9; }
        .btn-copy-source { background: var(--secondary); }

        /* ----- 第二步：阅读界面 ----- */
        #reading-view { display: none; flex-direction: column; height: 100vh; }
        .nav-bar { height: 50px; background: #0f172a; color: white; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 100; }
        .btn-tool { background: #334155; color: white; border: none; padding: 5px 15px; border-radius: 4px; cursor: pointer; font-size: 13px; }
        .btn-tool:hover { background: #475569; }

        .panes { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
        .pane { flex: 1; overflow-y: auto; padding: 40px; scroll-behavior: auto; }
        #pane-en { border-bottom: 2px solid #cbd5e1; background: var(--panel-en); font-family: "Georgia", serif; font-size: 1.2rem; line-height: 1.8; }
        #pane-zh { background: var(--panel-zh); font-size: 1.1rem; line-height: 1.8; color: #334155; }
        .inner { max-width: 850px; margin: 0 auto; }

        /* 源码弹出层 */
        #code-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content { background: white; width: 80%; height: 80%; padding: 20px; border-radius: 8px; display: flex; flex-direction: column; }
        #code-output { flex: 1; font-family: monospace; font-size: 12px; margin-top: 10px; border: 1px solid #ccc; padding: 10px; }
    </style>
</head>
<body>

    <div id="setup-view">
        <div class="container">
            <h2 style="margin-top:0; text-align: center;">📚 大篇幅双语对照工具</h2>
            <div class="input-grid">
                <div>
                    <label><b>英文原著 (上半区)</b></label>
                    <textarea id="en-raw" placeholder="在此粘贴整本英文内容..."></textarea>
                </div>
                <div>
                    <label><b>中文翻译 (下半区)</b></label>
                    <textarea id="zh-raw" placeholder="在此粘贴对应中文内容..."></textarea>
                </div>
            </div>
            
            <div class="button-group">
                <button class="btn-main" onclick="startReading()">预览阅读效果</button>
                <button class="btn-main btn-copy-source" onclick="generateSource()">✨ 生成并复制源码 HTML</button>
            </div>
        </div>
    </div>

    <div id="reading-view">
        <div class="nav-bar">
            <div>
                <button class="btn-tool" onclick="location.reload()">← 返回修改内容</button>
            </div>
            <div>
                <span style="font-size: 14px;">
                    <input type="checkbox" id="sync-active" checked> 开启比例同步滚动
                </span>
            </div>
            <div>
                <button class="btn-tool" onclick="downloadFile()">直接保存 HTML 文件</button>
            </div>
        </div>
        <div class="panes">
            <div class="pane" id="pane-en"><div class="inner" id="out-en"></div></div>
            <div class="pane" id="pane-zh"><div class="inner" id="out-zh"></div></div>
        </div>
    </div>

    <div id="code-modal">
        <div class="modal-content">
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <b>生成的独立网页源码：</b>
                <button style="padding: 5px 15px;" onclick="document.getElementById('code-modal').style.display='none'">关闭窗口</button>
            </div>
            <textarea id="code-output" readonly></textarea>
            <p style="font-size: 12px; color: #666;">代码已自动复制。您可以将其保存为 .html 文件，在任何地方打开阅读。</p>
        </div>
    </div>

    <script>
        const enInput = document.getElementById('en-raw');
        const zhInput = document.getElementById('zh-raw');
        const outEn = document.getElementById('out-en');
        const outZh = document.getElementById('out-zh');
        const pEn = document.getElementById('pane-en');
        const pZh = document.getElementById('pane-zh');

        function format(t) {
            return t.split('\n').filter(l => l.trim()).map(l => `<p>${l.trim()}</p>`).join('');
        }

        // 预览模式
        function startReading() {
            if(!enInput.value && !zhInput.value) return alert("请先填入内容");
            outEn.innerHTML = format(enInput.value);
            outZh.innerHTML = format(zhInput.value);
            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('reading-view').style.display = 'flex';
        }

        // --- 同步滚动逻辑 ---
        let isSyncing = false;
        function sync(e, target) {
            if (!document.getElementById('sync-active').checked || isSyncing) return;
            isSyncing = true;
            const scrollRatio = e.scrollTop / (e.scrollHeight - e.clientHeight);
            target.scrollTop = scrollRatio * (target.scrollHeight - target.clientHeight);
            setTimeout(() => { isSyncing = false; }, 30);
        }

        pEn.onscroll = () => sync(pEn, pZh);
        pZh.onscroll = () => sync(pZh, pEn);

        // --- 生成全量源码逻辑 ---
        function getFullSource() {
            const finalEn = format(enInput.value);
            const finalZh = format(zhInput.value);
            return `<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>双语对照书 - 导出版</title>
    <style>
        body, html { margin: 0; height: 100%; font-family: sans-serif; overflow: hidden; background: #f8fafc; }
        .bar { height: 40px; background: #0f172a; color: white; display: flex; align-items: center; padding: 0 20px; font-size: 14px; }
        .panes { display: flex; flex-direction: column; height: calc(100vh - 40px); }
        .pane { flex: 1; overflow-y: auto; padding: 40px; border-bottom: 2px solid #cbd5e1; }
        #en { background: white; font-family: "Georgia", serif; font-size: 1.2rem; line-height: 1.8; }
        #zh { background: #f1f5f9; font-size: 1.1rem; line-height: 1.8; color: #334155; }
        .inner { max-width: 800px; margin: 0 auto; }
    </style>
</head>
<body>
    <div class="bar">📖 双语对照阅读器 (比例同步滚动)</div>
    <div class="panes">
        <div class="pane" id="en"><div class="inner">${finalEn}</div></div>
        <div class="pane" id="zh"><div class="inner">${finalZh}</div></div>
    </div>
    <script>
        const e=document.getElementById('en'), z=document.getElementById('zh');
        let s=false;
        function sync(a,b){
            if(s)return; s=true;
            b.scrollTop=(a.scrollTop/(a.scrollHeight-a.clientHeight))*(b.scrollHeight-b.clientHeight);
            setTimeout(()=>{s=false;},30);
        }
        e.onscroll=()=>sync(e,z); z.onscroll=()=>sync(z,e);
    <\/script>
</body>
</html>`;
        }

        // 生成并复制
        function generateSource() {
            if(!enInput.value && !zhInput.value) return alert("请先填入内容后再生成源码");
            
            const source = getFullSource();
            document.getElementById('code-output').value = source;
            document.getElementById('code-modal').style.display = 'flex';
            
            // 执行自动复制
            navigator.clipboard.writeText(source).then(() => {
                alert("HTML 源码已生成，并自动复制到您的剪贴板！");
            }).catch(err => {
                console.error('无法复制', err);
                alert("生成成功。由于浏览器限制，请手动全选下方的代码进行复制。");
            });
        }

        // 下载文件
        function downloadFile() {
            const source = getFullSource();
            const blob = new Blob([source], {type: 'text/html'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'my_bilingual_book.html';
            a.click();
        }
    </script>
</body>
</html>
