<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>实时文本清理工具</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: auto; }
        textarea { width: 100%; height: 200px; margin-bottom: 10px; display: block; box-sizing: border-box; }
        button { padding: 10px 20px; cursor: pointer; margin-bottom: 20px; }
        #output { border: 1px solid #ccc; padding: 10px; background: #f9f9f9; white-space: pre-wrap; min-height: 50px; }
    </style>
</head>
<body>

    <h2>自动化清理工具</h2>
    <p><small>输入或粘贴内容后，结果将自动生成：</small></p>
    <textarea id="inputBox" oninput="processText()" placeholder="请粘贴文本..."></textarea>

    <button id="copyBtn" onclick="copyResult()">一键复制结果</button>

    <h3>处理结果：</h3>
    <div id="output"></div>

    <script>
        function processText() {
            let input = document.getElementById('inputBox').value;

            // 1. 自动过滤：截断三个及以上连续换行符
            const cutIndex = input.search(/\n{3,}/);
            if (cutIndex !== -1) {
                input = input.substring(0, cutIndex);
            }

            // 2. 自动清洗：删除 # 和 *
            let cleaned = input.replace(/[#*]/g, '');

            // 3. 中文标题自动换行并去除括号
            // 匹配逻辑：匹配任意前置空格 + 全/半角括号 + 内部含有中文字符的内容
            // 替换逻辑：将其替换为换行符 + 括号内的内容
            cleaned = cleaned.replace(/[ \t]*[\(（]([\u4e00-\u9fa5][^()（）]*)[\)）]/g, '\n$1');

            // 4. 去除所有剩余的括号，但保留内部内容
            // 匹配逻辑：全/半角括号及其内部的所有内容
            // 替换逻辑：只保留括号内的内容
            cleaned = cleaned.replace(/[\(（](.*?)[\)）]/g, '$1');

            // 5. 实时显示
            document.getElementById('output').innerText = cleaned;
        }

        async function copyResult() {
            const output = document.getElementById('output').innerText;
            if (!output) return;
            try {
                await navigator.clipboard.writeText(output);
                alert('已复制到剪贴板！');
            } catch (err) {
                alert('复制失败。');
            }
        }
    </script>
</body>
</html>
