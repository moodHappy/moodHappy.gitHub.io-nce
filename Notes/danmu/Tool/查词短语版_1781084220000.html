<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ffffff">
    <meta name="format-detection" content="telephone=no">

    <title>Anki 短语笔记</title>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3389/3389081.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3389/3389081.png">

    <style>
        /* --- 1. 全局变量与重置 --- */
        :root {
            --primary: #2c3e50;
            --accent: #16a085; 
            --bg-body: #f4f7f6;
            --bg-card: #ffffff;
            --text-main: #2d3436;
            --text-sub: #7f8c8d;
            --shadow: 0 8px 24px rgba(0,0,0,0.08);
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- 2. 顶部导航栏 --- */
        .app-header {
            padding-top: var(--safe-top);
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            z-index: 100;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }

        .header-search-row {
            height: 56px; display: flex; align-items: center; padding: 0 16px; gap: 12px;
        }

        .header-action-row {
            height: 48px; display: flex; align-items: center; padding: 0 16px 10px; gap: 12px;
        }

        .search-wrapper {
            flex: 1; position: relative; display: flex; align-items: center;
        }

        .search-icon { position: absolute; left: 12px; color: #b2bec3; font-size: 16px; }

        input#searchInput {
            width: 100%; height: 40px; padding: 0 36px; border: none; border-radius: 20px;
            background: #e8ecef; font-size: 16px; color: var(--primary); transition: all 0.3s;
        }

        input#searchInput:focus { background: #fff; box-shadow: 0 0 0 2px var(--accent); }

        .clear-btn {
            position: absolute; right: 0; width: 36px; height: 100%;
            display: none; align-items: center; justify-content: center;
            color: #999; font-size: 14px; cursor: pointer;
        }

        /* 功能按钮 */
        .action-btn {
            flex: 1; height: 38px; border: none; border-radius: 12px;
            background: var(--bg-body); color: var(--primary); font-weight: 600; font-size: 14px;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05); cursor: pointer; transition: all 0.2s;
        }
        .action-btn:active { background: #dfe6e9; transform: scale(0.96); }
        .action-btn.highlight { color: #d35400; background: #fff8f0; box-shadow: inset 0 0 0 1px #e67e22; }

        /* --- 3. 主内容区 --- */
        .main-scroll-area {
            flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
            padding: 16px 16px calc(20px + var(--safe-bottom));
        }

        .empty-state {
            display: none; flex-direction: column; align-items: center;
            justify-content: center; height: 60%; text-align: center;
        }

        .app-name { font-size: 22px; font-weight: 700; color: var(--primary); margin-bottom: 6px; }
        .app-subtitle { font-size: 14px; color: var(--text-sub); }
        .status-text { font-size: 12px; color: #b2bec3; margin-top: 12px; padding: 0 20px;}

        .result-list { display: block; }

        .word-card {
            background: var(--bg-card); border-radius: 12px; padding: 12px 16px;
            margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            display: flex; align-items: center; justify-content: space-between;
        }
        .word-card:active { background: #fafafa; }

        .card-main { flex: 1; min-width: 0; margin-right: 12px; cursor: pointer; }
        .card-word { font-size: 17px; font-weight: 700; color: var(--primary); margin-bottom: 4px; }
        .card-preview { font-size: 13px; color: var(--text-sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* 队列操作按钮 */
        .queue-action {
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            font-size: 18px; cursor: pointer; transition: transform 0.2s; border-radius: 50%;
            background: #f1f2f6; flex-shrink: 0;
        }
        .queue-action:active { transform: scale(1.1); background: #dfe4ea; }
        .queue-action.in-queue { background: #fff8f0; }

        /* --- 4. Anki 卡片模式 --- */
        #ankiView {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: #eef2f5; z-index: 200; display: flex; flex-direction: column;
            transform: translate3d(100%, 0, 0);
            transition: transform 0.35s cubic-bezier(0.33, 1, 0.68, 1);
        }
        #ankiView.active { transform: translate3d(0, 0, 0); }

        .anki-nav {
            padding-top: var(--safe-top); height: calc(50px + var(--safe-top));
            background: rgba(255,255,255,0.8); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: space-between;
            padding-left: 10px; padding-right: 16px; flex-shrink: 0;
        }

        .nav-side { width: 80px; display: flex; align-items: center; }
        .nav-side.right { justify-content: flex-end; }

        .back-btn {
            background: transparent; border: none; font-size: 16px;
            color: var(--accent); display: flex; align-items: center; font-weight: 500; padding: 10px;
        }

        .anki-progress { font-size: 14px; font-weight: 600; color: #a4b0be; text-align: center; flex: 1; }

        .star-btn { 
            background: transparent; border: none; font-size: 22px; 
            cursor: pointer; padding: 10px; transition: transform 0.2s; 
        }
        .star-btn:active { transform: scale(1.2); }

        /* 3D 卡片场景 */
        .anki-scene {
            flex: 1; display: flex; align-items: center; justify-content: center;
            perspective: 1000px; padding: 20px;
        }

        .anki-card {
            width: 100%; max-width: 400px; height: 60vh; max-height: 500px;
            position: relative; transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d; cursor: pointer;
        }

        .anki-card.is-flipped { transform: rotateY(180deg); }

        .anki-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 20px;
            background: #fff; box-shadow: var(--shadow);
            display: flex; flex-direction: column;
            padding: 30px 24px; overflow-y: auto; -webkit-overflow-scrolling: touch;
        }

        /* 正面样式 */
        .anki-face--front { align-items: center; justify-content: center; text-align: center; }
        .front-word { font-size: 32px; font-weight: 800; color: var(--primary); word-break: break-word;}
        .tap-hint { margin-top: 30px; font-size: 14px; color: #ced6e0; animation: pulse 2s infinite; }

        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        /* 背面样式 */
        .anki-face--back { transform: rotateY(180deg); display: block;}
        .back-word { font-size: 24px; font-weight: 700; color: var(--primary); margin-bottom: 8px; border-bottom: 2px solid #f1f2f6; padding-bottom: 12px;}

        .md-content { font-size: 16px; line-height: 1.6; color: #333; margin-top: 16px;}
        .md-content strong { color: var(--accent); }

        /* 针对例句引用的 Markdown 样式优化 */
        .md-content blockquote {
            margin: 12px 0 0 0;
            padding: 10px 14px;
            background: #f8f9fa;
            border-left: 4px solid var(--accent);
            border-radius: 0 6px 6px 0;
            color: #555;
            font-size: 15px;
        }
        .md-content blockquote p { margin: 0 0 8px 0; }
        .md-content blockquote p:last-child { margin: 0; }

        /* 底部操作栏 */
        .anki-controls {
            padding: 16px 20px calc(16px + var(--safe-bottom)); flex-shrink: 0;
            display: flex; justify-content: space-between; gap: 16px; background: #fff;
        }
        .ctrl-btn {
            flex: 1; height: 50px; border: none; border-radius: 12px;
            font-size: 16px; font-weight: 600; display: flex; align-items: center; justify-content: center;
            background: #f1f2f6; color: var(--primary); transition: background 0.2s; cursor: pointer;
        }
        .ctrl-btn:active { background: #dfe4ea; transform: scale(0.98); }
        .ctrl-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .ctrl-btn.primary { background: var(--accent); color: #fff; }
        .ctrl-btn.primary:active { background: #117a65; }

        /* 全局状态通知小条 */
        .global-status-bar {
            background: #eccc68; color: #222f3e; font-size: 12px; font-weight: 600;
            text-align: center; padding: 4px 10px; display: none;
        }

    </style>
</head>
<body>

    <div class="app-header">
        <div id="dbStatusLine" class="global-status-bar">正在检查本地数据库...</div>
        <div class="header-search-row">
            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="搜索短语并加入队列..." autocomplete="off">
                <div class="clear-btn" id="clearBtn">✕</div>
            </div>
        </div>
        <div class="header-action-row">
            <button class="action-btn" onclick="startRandomReview()">🎲 随便测测</button>
            <button class="action-btn" id="queueBtn" onclick="startQueueReview()">⭐️ 集中攻克 (0)</button>
        </div>
    </div>

    <div class="main-scroll-area">
        <div id="emptyState" class="empty-state">
            <div style="font-size: 60px; margin-bottom: 20px;">⭐️</div>
            <div class="app-name">集中攻克队列为空</div>
            <div class="app-subtitle" id="syncStatus">请通过上方搜索框查找短语并点击 ➕ 号添加</div>
        </div>
        <div id="resultList" class="result-list"></div>
    </div>

    <div id="ankiView">
        <div class="anki-nav">
            <div class="nav-side">
                <button class="back-btn" onclick="closeAnkiView()">
                    <span style="font-size: 22px; margin-right: 4px; margin-top:-2px;">‹</span> 返回
                </button>
            </div>
            <div class="anki-progress" id="ankiProgress">1 / 10</div>
            <div class="nav-side right">
                <button class="star-btn" id="ankiStarBtn" onclick="toggleCurrentAnkiQueue()">⭐️</button>
            </div>
        </div>

        <div class="anki-scene">
            <div class="anki-card" id="ankiCard" onclick="flipCard()">
                <div class="anki-face anki-face--front">
                    <div class="front-word" id="frontWord">Phrase</div>
                    <div class="tap-hint">点击翻转卡片</div>
                </div>
                <div class="anki-face anki-face--back">
                    <div class="back-word" id="backWord">Phrase</div>
                    <div id="backContent" class="md-content"></div>
                </div>
            </div>
        </div>

        <div class="anki-controls">
            <button class="ctrl-btn" id="btnPrev" onclick="navCard(-1)">‹ 忘了</button>
            <button class="ctrl-btn primary" id="btnNext" onclick="navCard(1)">记住了 ›</button>
        </div>
    </div>

<script>
    // --- 1. 配置 ---
    const DB_NAME = 'PhraseDB';
    const STORE_NAME = 'json_data';
    const DB_VERSION = 3; 
    const PHRASE_URL = 'https://raw.githubusercontent.com/moodHappy/HelloWorld/refs/heads/main/json_data/Phrases.json';
    const QUEUE_KEY = 'anki_phrase_queue'; 

    // 状态管理
    let store = {
        data: [],          
        currentList: [],   
        learningQueue: [], 
        ankiIndex: 0       
    };

    const UI = {
        input: document.getElementById('searchInput'),
        clearBtn: document.getElementById('clearBtn'),
        emptyState: document.getElementById('emptyState'),
        resultList: document.getElementById('resultList'),
        syncStatus: document.getElementById('syncStatus'),
        queueBtn: document.getElementById('queueBtn'),
        dbStatusLine: document.getElementById('dbStatusLine'),

        // Anki UI
        ankiView: document.getElementById('ankiView'),
        ankiCard: document.getElementById('ankiCard'),
        frontWord: document.getElementById('frontWord'),
        backWord: document.getElementById('backWord'),
        backContent: document.getElementById('backContent'),
        ankiProgress: document.getElementById('ankiProgress'),
        ankiStarBtn: document.getElementById('ankiStarBtn'),
        btnPrev: document.getElementById('btnPrev'),
        btnNext: document.getElementById('btnNext')
    };

    // --- 2. IndexedDB 微型封装 ---
    function openDB() {
        return new Promise((resolve, reject) => {
            const req = indexedDB.open(DB_NAME, DB_VERSION);
            req.onupgradeneeded = e => {
                const db = e.target.result;
                if (db.objectStoreNames.contains(STORE_NAME)) {
                    db.deleteObjectStore(STORE_NAME);
                }
                db.createObjectStore(STORE_NAME);
            };
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
        });
    }

    function getIDBData(db, key) {
        return new Promise(resolve => {
            const req = db.transaction(STORE_NAME, 'readonly').objectStore(STORE_NAME).get(key);
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => resolve(null);
        });
    }

    function putIDBData(db, key, data) {
        return new Promise(resolve => {
            const req = db.transaction(STORE_NAME, 'readwrite').objectStore(STORE_NAME).put(data, key);
            req.onsuccess = () => resolve(true);
            req.onerror = () => resolve(false);
        });
    }

    // --- 3. 初始化与下载数据 ---
    window.addEventListener('DOMContentLoaded', initApp);

    async function initApp() {
        // 读取持久化的学习队列
        const savedQueue = localStorage.getItem(QUEUE_KEY);
        if(savedQueue) {
            try { store.learningQueue = JSON.parse(savedQueue); } catch(e){}
        }
        updateQueueUI(); 

        // 进入页面直接展现集中攻克列表视图
        renderQueueList();

        try {
            const db = await openDB();
            let localData = await getIDBData(db, 'all_phrases');

            if (localData && localData.length > 0) {
                store.data = localData;
                console.log(`离线加载了 ${store.data.length} 个短语。`);
            } else {
                UI.dbStatusLine.style.display = 'block';
                UI.dbStatusLine.innerText = "正在拉取全量短语库(含例句)，请稍候...";

                const res = await fetch(PHRASE_URL);
                if (!res.ok) throw new Error("Network response was not ok");

                const jsonData = await res.json();

                const parsedData = jsonData.filter(item => item && item.phrase).map(item => {
                    let mdContent = `**释义:** ${item.meaning}\n\n`;

                    if (item.example_en) {
                        mdContent += `**例句:**\n> ${item.example_en}\n`;
                        if (item.example_zh) {
                            mdContent += `> \n> *${item.example_zh}*\n\n`;
                        } else {
                            mdContent += `\n`;
                        }
                    }

                    return { 
                        word: item.phrase, 
                        content: mdContent, 
                        previewText: item.meaning || '' 
                    };
                });

                await putIDBData(db, 'all_phrases', parsedData);
                store.data = parsedData;

                UI.dbStatusLine.innerText = `🎉 短语库同步完成！共 ${store.data.length} 个短语已离线存储。`;
                setTimeout(() => UI.dbStatusLine.style.display = 'none', 3000);
            }

        } catch (err) {
            console.error(err);
            UI.dbStatusLine.style.display = 'block';
            UI.dbStatusLine.style.background = '#ff4d4d';
            UI.dbStatusLine.style.color = '#fff';
            UI.dbStatusLine.innerText = `数据同步失败，请检查网络。`;
        }

        window.addEventListener('popstate', (event) => {
            if (UI.ankiView.classList.contains('active')) closeAnkiView(false);
        });
    }

    // --- 4. 集中攻克队列逻辑 ---
    function updateQueueUI() {
        const count = store.learningQueue.length;
        UI.queueBtn.innerText = `⭐️ 集中攻克 (${count})`; 

        if (count > 0) UI.queueBtn.classList.add('highlight');
        else UI.queueBtn.classList.remove('highlight');

        if (UI.ankiView.classList.contains('active')) {
            const currentItem = store.currentList[store.ankiIndex];
            if (currentItem) {
                const inQueue = store.learningQueue.some(q => q.word === currentItem.word);
                UI.ankiStarBtn.innerText = inQueue ? '⭐️' : '☆';
            }
        }
    }

    function toggleQueue(safeWord, elementId) {
        const word = decodeURIComponent(safeWord);
        const index = store.learningQueue.findIndex(q => q.word === word);

        if (index >= 0) {
            store.learningQueue.splice(index, 1); 
        } else {
            const item = store.data.find(i => i.word === word);
            const fallbackItem = item || store.currentList.find(i => i.word === word);
            if (fallbackItem) store.learningQueue.push(fallbackItem); 
        }

        localStorage.setItem(QUEUE_KEY, JSON.stringify(store.learningQueue));
        updateQueueUI();

        if (elementId) {
            const el = document.getElementById(elementId);
            if (el) {
                const inQueue = index < 0; 
                el.innerText = inQueue ? '⭐️' : '➕';
                if(inQueue) el.classList.add('in-queue');
                else el.classList.remove('in-queue');
            }
        }

        // 如果处于空输入检索状态，用户增删词时，实时刷新当前列表
        if (!UI.input.value.trim()) {
            renderQueueList();
        }
    }

    function renderQueueList() {
        store.currentList = [...store.learningQueue];
        if (store.currentList.length === 0) {
            UI.emptyState.style.display = 'flex';
            UI.resultList.style.display = 'none';
        } else {
            UI.emptyState.style.display = 'none';
            UI.resultList.style.display = 'block';
            executeRender(store.currentList);
        }
    }

    function toggleCurrentAnkiQueue() {
        const currentItem = store.currentList[store.ankiIndex];
        if (currentItem) toggleQueue(encodeURIComponent(currentItem.word), null);
    }

    function startQueueReview() {
        if (store.learningQueue.length === 0) {
            alert('当前学习队列为空！\n请先通过搜索，点击短语右侧的 ➕ 号添加。');
            return;
        }
        store.currentList = [...store.learningQueue];
        openAnkiMode(0);
    }

    function startRandomReview() {
        if(store.data.length === 0) return alert('数据尚未加载完毕，请稍候');
        const shuffled = [...store.data].sort(() => 0.5 - Math.random());
        store.currentList = shuffled.slice(0, 50); 
        openAnkiMode(0);
    }

    // --- 5. 搜索与渲染 ---
    let searchTimeout;
    UI.input.addEventListener('input', (e) => {
        const val = e.target.value.trim().toLowerCase();
        UI.clearBtn.style.display = val ? 'flex' : 'none';

        if (!val) {
            renderQueueList();
            return;
        }

        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            const filtered = store.data.filter(item => 
                (item.word && item.word.toLowerCase().includes(val)) ||
                (item.previewText && item.previewText.toLowerCase().includes(val))
            );
            
            store.currentList = filtered;
            UI.emptyState.style.display = 'none';
            UI.resultList.style.display = 'block';

            if (filtered.length === 0) {
                UI.resultList.innerHTML = `<div style="text-align:center; padding:40px; color:#999;">无匹配结果</div>`;
                return;
            }
            executeRender(filtered);
        }, 200);
    });

    UI.clearBtn.addEventListener('click', () => {
        UI.input.value = '';
        UI.clearBtn.style.display = 'none';
        renderQueueList();
        UI.input.focus();
    });

    function executeRender(list) {
        const displayList = list.slice(0, 100);
        UI.resultList.innerHTML = displayList.map((item, index) => {
            const preview = item.previewText.slice(0, 40) + (item.previewText.length > 40 ? '...' : '');
            const safeWord = encodeURIComponent(item.word);
            const inQueue = store.learningQueue.some(q => q.word === item.word);
            const btnId = `qbtn_${index}`;

            return `
                <div class="word-card">
                    <div class="card-main" onclick="openAnkiMode(${index})">
                        <div class="card-word">${item.word}</div>
                        <div class="card-preview">${preview}</div>
                    </div>
                    <div class="queue-action ${inQueue ? 'in-queue' : ''}" id="${btnId}" 
                         onclick="toggleQueue('${safeWord}', '${btnId}')">
                        ${inQueue ? '⭐️' : '➕'}
                    </div>
                </div>
            `;
        }).join('');

        if (list.length > 100) {
            UI.resultList.innerHTML += `<div style="text-align:center; padding:10px; font-size:12px; color:#ccc;">还有 ${list.length - 100} 条未显示...</div>`;
        }
    }

    // --- 6. Anki 卡片交互 ---
    function openAnkiMode(index) {
        store.ankiIndex = index;
        updateAnkiCardUI();
        UI.ankiView.classList.add('active');
        UI.input.blur();
        history.pushState({ page: 'anki' }, null, '');
    }

    function closeAnkiView(triggerHistory = true) {
        UI.ankiView.classList.remove('active');
        if(!UI.input.value.trim()) renderQueueList();
        else executeRender(store.currentList);
        
        if (triggerHistory && history.state && history.state.page === 'anki') history.back();
    }

    function flipCard() {
        UI.ankiCard.classList.toggle('is-flipped');
    }

    function navCard(direction) {
        const newIndex = store.ankiIndex + direction;
        if (newIndex >= 0 && newIndex < store.currentList.length) {
            UI.ankiCard.style.transition = 'none';
            UI.ankiCard.classList.remove('is-flipped');
            void UI.ankiCard.offsetWidth; 
            UI.ankiCard.style.transition = 'transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1)';
            store.ankiIndex = newIndex;
            updateAnkiCardUI();
        }
    }

    function updateAnkiCardUI() {
        const item = store.currentList[store.ankiIndex];
        if (!item) return;

        UI.frontWord.innerText = item.word;
        UI.backWord.innerText = item.word;
        UI.backContent.innerHTML = item.content ? marked.parse(item.content) : '<p>无详细信息</p>';

        UI.ankiProgress.innerText = `${store.ankiIndex + 1} / ${store.currentList.length}`;
        UI.btnPrev.disabled = (store.ankiIndex === 0);
        UI.btnNext.disabled = (store.ankiIndex === store.currentList.length - 1);

        const backFace = document.querySelector('.anki-face--back');
        if(backFace) backFace.scrollTop = 0;

        updateQueueUI(); 
    }

</script>
</body>
</html>
