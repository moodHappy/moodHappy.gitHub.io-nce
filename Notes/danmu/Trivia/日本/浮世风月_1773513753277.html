<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#fff5f7">
    <title>日本历代风月人物·传奇断代档案</title>
    <style>
        /* 淡樱桃色·清爽风月排版 */
        body {
            font-family: "STKaiti", "KaiTi", "BiauKai", "楷体", "SimSun", "宋体", serif;
            line-height: 1.5;
            color: #5a3a3a; 
            max-width: 1350px; 
            margin: 0 auto;
            padding: 15px;
            background-color: #fff5f7; 
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" opacity="0.04"><circle cx="300" cy="300" r="250" stroke="%23ff8da1" stroke-width="2" fill="none"/><text x="130" y="320" font-family="楷体" font-size="80" transform="rotate(-15)" font-weight="bold" fill="%23ff8da1">浮世风月</text></svg>');
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            color: #d95d77; 
            font-size: 24px; 
            margin-bottom: 5px;
            letter-spacing: 5px;
            text-shadow: 2px 2px 4px rgba(255, 182, 193, 0.5); 
            font-weight: bold;
        }

        .subtitle {
            text-align: center;
            color: #886262;
            font-size: 11px;
            margin-bottom: 25px;
            border-bottom: 1px solid #ffd1dc;
            padding-bottom: 15px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .subtitle span {
            color: #d95d77;
            font-weight: bold;
            padding: 0 2px;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .search-box {
            width: 100%;
            max-width: 320px;
            padding: 7px 15px;
            border: none;
            border-bottom: 2px solid #ffd1dc;
            background: rgba(255, 255, 255, 0.7);
            font-family: inherit;
            font-size: 12px; 
            color: #5a3a3a;
            outline: none;
            transition: all 0.3s;
            text-align: center;
            border-radius: 4px 4px 0 0;
        }

        .search-box::placeholder {
            color: #b08c8c;
        }

        .search-box:focus {
            border-bottom-color: #ff8da1;
            background: #ffffff;
            box-shadow: 0 4px 6px rgba(255, 141, 161, 0.1);
        }

        .toggle-btn {
            background-color: #fff0f3;
            border: 1px solid #ffb6c1;
            color: #d95d77;
            padding: 6px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px; 
            font-weight: bold;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        .toggle-btn:hover {
            background-color: #ff8da1; 
            border-color: #ff8da1;
            color: #fff;
            box-shadow: 0 0 12px rgba(255, 141, 161, 0.4);
        }

        .main-category {
            background: #ffffff;
            border: 1px solid #ffe4e8;
            border-radius: 6px;
            padding: 12px 15px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(217, 93, 119, 0.08); 
        }

        .main-category h2 {
            border-bottom: 1px dashed #ffd1dc;
            padding-bottom: 8px;
            color: #c74b67; 
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 16px; 
            letter-spacing: 2px;
            font-weight: bold;
            text-align: center;
        }

        details {
            margin-bottom: 10px;
            background: #fffafa;
            border-radius: 4px;
            border: 1px solid #ffe4e8;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        summary {
            padding: 9px 12px;
            cursor: pointer;
            font-size: 12px; 
            font-weight: bold;
            color: #5a3a3a;
            background: #fff0f3;
            border-left: 4px solid #ff8da1; 
            list-style: none;
            position: relative;
            white-space: nowrap; 
        }

        summary::-webkit-details-marker { display: none; }

        summary::after {
            content: "▼";
            position: absolute;
            right: 12px;
            font-size: 10px;
            color: #d95d77;
        }

        .details-content {
            padding: 12px;
            background-color: #ffffff;
        }

        .grid-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 8px;
            padding: 0;
            margin: 0;
            list-style: none;
        }

        .grid-list li a {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px 6px;
            background-color: #fffcfd;
            border: 1px solid #ffe4e8;
            color: #6b4c4c; 
            text-decoration: none;
            border-radius: 4px;
            height: 100%;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        .grid-list li a:hover {
            border-color: #ff8da1;
            background-color: #fff0f3;
            color: #d95d77;
        }

        .is-v1 a {
            border-color: #ffb6c1; 
            background-color: #fff5f7; 
        }
        .is-v1 .name {
            color: #c74b67; 
            font-weight: bold;
        }

        .name {
            font-size: 11px;
            text-align: center;
            white-space: normal; 
        }

        .count-tag {
            font-size: 10px;
            font-weight: normal;
            color: #a88a8a;
            margin-left: 4px;
        }
    </style>
</head>
<body>

    <h1>《浮世风月》艳闻传奇档案库</h1>
    <div class="subtitle">汇集日本史料、物语文学及大奥秘闻中的 <span>风月人物</span>。带有 <span>👑</span> 的为该时期核心禁忌、大奥丑闻或著名心中（殉情）事件。</div>

    <div class="controls">
        <input type="text" id="searchInput" class="search-box" placeholder="搜索人物 (如：光源氏 / 龙马 / 紫式部)">
        <button id="toggleBtn" class="toggle-btn">展开卷轴</button>
    </div>

    <div id="content"></div>

    <script>
        // 日本历代艳闻数据（去重版）
        const data = [
            {
                category: "一、 飞鸟·奈良·平安 (皇室禁忌与公卿物哀)",
                subCats: [
                    {
                        title: "1. 飞鸟奈良 (皇室迷情与血亲禁断)",
                        items: [
                            "中大兄皇子/大海人皇子与额田王(兄弟争妻的飞鸟绝恋)|v1", 
                            "木梨轻皇子与轻大娘皇女(同母兄妹殉情)|v1", 
                            "孝谦女帝与道镜和尚(女帝与妖僧)|v1", 
                            "藤原不比等与橘三千代(权臣与后宫女官)|",
                            "藤原药子与平城天皇(引发“药子之变”的绝代妖妃)|v1",
                            "小野篁与异母妹(遣唐使名门因乱伦被流放的丑闻)|v1"
                        ]
                    },
                    {
                        title: "2. 平安风月 (和歌传情与夜半私奔)",
                        items: [
                            "在原业平与藤原高子(贵公子拐跑未来皇妃)|v1", 
                            "在原业平与恬子内亲王(风流公子夜入伊势神宫幽会斋宫)|v1",
                            "和泉式部与弹正宫/帅宫(魔性才女与皇子兄弟)|v1", 
                            "小野小町与深草少将(绝代佳人与百夜通传说)|v1", 
                            "紫式部与藤原道长(《源氏物语》作者与权臣的隐秘绯闻)|",
                            "清少纳言与藤原实方(《枕草子》作者与风流才子的情缘)|",
                            "藤原道长与赤染卫门(顶级权臣与才女)|", 
                            "平将门与桔梗姬(关东叛将与绝色宠妾)|"
                        ]
                    },
                    {
                        title: "3. 源氏物语投影 (虚实交织的后宫隐秘)",
                        items: [
                            "光源氏与藤壶中宫(前皇子与绝色继母)|v1", 
                            "光源氏与六条御息所(前皇子与前太子妃寡妇)|v1", 
                            "光源氏与胧月夜(绿了当朝太子)|v1", 
                            "柏木与女三宫(臣子绿了光源氏)|",
                            "薰君与浮舟(《宇治十帖》最纠葛的虐恋)|v1",
                            "匂宫与浮舟(皇室贵公子横刀夺爱)|"
                        ]
                    }
                ]
            },
            {
                category: "二、 镰仓·室町 (武家初兴、狂僧与悲恋)",
                subCats: [
                    {
                        title: "1. 源平合战 (英雄气短与红颜薄命)",
                        items: [
                            "源义经与静御前(悲剧战神与绝代白拍子)|v1", 
                            "木曾义仲与巴御前(枭雄与女武将)|", 
                            "平清盛与祇王/佛御前(权臣抛弃旧爱纳新欢)|", 
                            "高仓天皇与小督局(天皇隐秘宠妃)|",
                            "后鸟羽上皇与龟菊(因宠爱舞女引发“承久之乱”)|v1",
                            "源赖家与若狭局(二代将军与权臣之女的灭门悲剧)|"
                        ]
                    },
                    {
                        title: "2. 镰仓室町 (将军后院与狂僧艳史)",
                        items: [
                            "一休宗纯与森女(七旬狂僧与二十岁盲女艺人)|v1", 
                            "源赖朝与龟之前(幕府初代将军与出轨私宠)|", 
                            "北条政子与源赖朝(吃醋悍妻悍然烧毁小三家)|v1", 
                            "后醍醐天皇与阿野廉子(流放孤岛的患难宠妃)|v1",
                            "护良亲王与雏鹤姬(悲剧皇子与携其首级逃亡的正室)|",
                            "足利义政与日野富子(怠政艺术将军与敛财恶妻)|", 
                            "北条高时与田乐舞女(亡国执权的荒淫末路)|",
                            "新田义贞与勾当内侍(大将因沉迷女色延误战机)|"
                        ]
                    }
                ]
            },
            {
                category: "三、 战国·安土桃山 (乱世霸主与宿命狂花)",
                subCats: [
                    {
                        title: "1. 枭雄绝恋 (征服与背叛)",
                        items: [
                            "丰臣秀吉与淀殿[茶茶](太阁与宿敌浅井家之女)|v1", 
                            "丰臣秀吉与京极龙子(太阁与绝美寡妇的羁绊)|",
                            "织田信长与浓姬(第六天魔王与美浓蝮蛇之女)|", 
                            "柴田胜家与阿市(悲情老将与战国第一美女)|v1", 
                            "细川忠兴与细川伽罗奢(极度病娇大名与天主教佳丽)|v1", 
                            "上杉谦信与伊势姬(战神终身不娶的悲恋传说)|v1",
                            "明智光秀与熙子(卖发结发、战国罕见的糟糠情深)|",
                            "浅井长政与阿市(乱世模范夫妻的毁灭)|",
                            "武田胜赖与北条夫人(乱世末路的不离不弃)|"
                        ]
                    },
                    {
                        title: "2. 权谋床榻 (侧室与暗流)",
                        items: [
                            "德川家康与筑山殿(大御所与被逼下令处死的正室)|v1", 
                            "德川家康与西乡局(备受宠爱的盲视侧室)|",
                            "千姬与坂崎直盛(德川家康孙女被抢婚的“千姬事件”)|v1",
                            "武田信玄与诹访御料人(灭了老丈人后强娶其女)|v1", 
                            "真田信繁[幸村]与竹林院(日本第一兵的贤内助)|",
                            "丰臣秀次与一之台(杀生关白强纳极品寡妇)|", 
                            "前田利家与阿松(加贺百万石的贤内助)|", 
                            "伊达政宗与爱姬(独眼龙大名与正室)|"
                        ]
                    }
                ]
            },
            {
                category: "四、 江户时代 (大奥秘闻、游廓与绝命殉情)",
                subCats: [
                    {
                        title: "1. 大奥丑闻 (幕府后宫的权力与情欲)",
                        items: [
                            "江岛与生岛新五郎(大奥总管与当红男星的世纪丑闻)|v1", 
                            "德川家光与阿万之方(将军强令尼姑还俗纳为侧室)|v1",
                            "德川纲吉与染子(犬将军绿了权臣柳泽吉保)|v1", 
                            "和宫与德川家茂(跨越公武之局的纯爱悲歌)|v1",
                            "德川家齐与众多侧室(生了53个孩子的海王将军)|", 
                            "春日局与德川家光(权倾天下的大奥女帝与将军)|", 
                            "天英院与月光院(大奥正室与侧室的终极宫斗)|",
                            "浅野长矩与阿久里(赤穗事件引发的生死诀别)|"
                        ]
                    },
                    {
                        title: "2. 浮世游廓 (吉原花魁与痴客)",
                        items: [
                            "高尾太夫与伊达纲宗(仙台藩主豪掷千金买花魁)|v1", 
                            "吉野太夫与灰屋绍益(顶级花魁与富商的赎身之恋)|", 
                            "唐人阿吉与哈里斯(被时代牺牲的“洋人小妾”悲剧)|v1",
                            "近藤勇与深雪太夫(新选组局长与名妓)|"
                        ]
                    },
                    {
                        title: "3. 极致破灭 (名留青史的净琉璃“心中”事件)",
                        items: [
                            "德兵卫与阿初(店伙计与游女·《曾根崎心中》殉情)|v1", 
                            "治兵卫与小春(已婚纸商与游女·《心中天网岛》殉情)|v1", 
                            "八百屋阿七与吉三郎(为见和尚情郎不惜纵火的少女)|v1", 
                            "忠兵卫与梅川(挪用公款为游女赎身的死罪之恋)|v1",
                            "半平与阿千代(《大经师昔历》被逼上绝路的主仆禁恋)|"
                        ]
                    }
                ]
            },
            {
                category: "五、 幕末维新 (刀光剑影与红颜知己)",
                subCats: [
                    {
                        title: "1. 乱世风流 (维新志士的艺妓情缘)",
                        items: [
                            "桂小五郎与几松(幕末逃亡路上的乱世佳偶)|v1", 
                            "坂本龙马与楢崎龙(日本首对蜜月旅行的传奇夫妇)|v1", 
                            "高杉晋作与鹈野(维新狂人与倾城艺妓)|",
                            "西乡隆盛与爱加那(流放岛屿上的南国之恋)|",
                            "伊藤博文与梅子(风流首相与艺妓妻子)|"
                        ]
                    },
                    {
                        title: "2. 幕末悲歌 (新选组与遗臣的爱恨)",
                        items: [
                            "土方岁三与君菊/小雪(鬼副长的风流花街轶事)|",
                            "冲田总司与医者之女(新选组天才剑士的无果微恋)|",
                            "武市半平太与富子(牢狱书信传情的笃道夫妻)|v1",
                            "松平容保与照姬(会津藩主的灵魂伴侣与悲剧落幕)|"
                        ]
                    }
                ]
            }
        ];

        const container = document.getElementById('content');

        data.forEach(main => {
            let html = `<div class="main-category"><h2>${main.category}</h2>`;
            main.subCats.forEach(sub => {
                html += `
                <details>
                    <summary>${sub.title} <span class="count-tag">(${sub.items.length}组)</span></summary>
                    <div class="details-content">
                        <ul class="grid-list">
                `;
                sub.items.forEach(item => {
                    const parts = item.split('|');
                    const nameInfo = parts[0];
                    const isV1 = parts[1] === 'v1' ? 'is-v1' : ''; 
                    const icon = parts[1] === 'v1' ? '👑 ' : '';

                    const searchName = nameInfo.replace(/与/g, '+').replace(/\(.*\)/g, '').replace(/\[.*\]/g, '').trim(); 

                    html += `
                        <li class="${isV1}">
                            <a href="https://www.google.com/search?q=日本历史+${searchName}" target="_blank" rel="noopener noreferrer">
                                <div class="name">${icon}${nameInfo}</div>
                            </a>
                        </li>
                    `;
                });
                html += `</ul></div></details>`;
            });
            html += `</div>`;
            container.innerHTML += html;
        });

        const toggleBtn = document.getElementById('toggleBtn');
        let isExpanded = false;

        toggleBtn.addEventListener('click', () => {
            isExpanded = !isExpanded;
            const allDetails = document.querySelectorAll('details');
            allDetails.forEach(details => {
                details.toggleAttribute('open', isExpanded);
            });
            toggleBtn.textContent = isExpanded ? '合上卷轴' : '展开卷轴';
        });

        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase().trim();
            document.querySelectorAll('.main-category').forEach(mainCat => {
                let mainHasMatch = false;
                mainCat.querySelectorAll('details').forEach(details => {
                    let detailsHasMatch = false;
                    details.querySelectorAll('.grid-list li').forEach(li => {
                        const hasMatch = li.textContent.toLowerCase().includes(term);
                        li.style.display = hasMatch ? '' : 'none';
                        if (hasMatch) detailsHasMatch = true;
                    });
                    details.style.display = detailsHasMatch ? '' : 'none';
                    if (detailsHasMatch) {
                        mainHasMatch = true;
                        if (term !== '') details.setAttribute('open', '');
                    }
                });
                mainCat.style.display = mainHasMatch ? '' : 'none';
            });
        });
    </script>
</body>
</html>
