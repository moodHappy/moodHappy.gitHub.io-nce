<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>朱里亚-克劳狄王朝 - 核心人物关系网状图</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f8f9fa;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .legend {
            text-align: center;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .legend span {
            display: inline-block;
            margin: 0 10px;
            padding: 5px 10px;
            border-radius: 5px;
            color: white;
            font-weight: bold;
        }
        /* 为图表容器设置固定高度和边框 */
        #mynetwork {
            width: 100%;
            height: 750px;
            border: 2px solid #bdc3c7;
            background-color: #ffffff;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-radius: 8px;
        }
    </style>
</head>
<body>

<h1>朱里亚-克劳狄王朝（修罗场）关系网</h1>
<div class="legend">
    <span style="background-color: #e74c3c;">皇帝 (Emperors)</span>
    <span style="background-color: #f39c12;">核心后妃/皇族 (Royals)</span>
    <span style="background-color: #3498db;">权臣/近卫军 (Officials)</span>
    <span style="background-color: #9b59b6;">牺牲品/其他 (Others)</span>
    <br><br>
    <small>💡 提示：您可以使用鼠标<b>拖拽节点</b>，或通过滚轮<b>缩放</b>查看错综复杂的关系连线。</small>
</div>

<div id="mynetwork"></div>

<script type="text/javascript">
    // 创建节点集合
    var nodes = new vis.DataSet([
        // 皇帝组 (红色系)
        { id: 1, label: '奥古斯都\n(开国皇帝)', group: 'emperor', font: {size: 20} },
        { id: 3, label: '提贝里乌斯\n(第二任)', group: 'emperor', font: {size: 20} },
        { id: 9, label: '卡利古拉\n(第三任)', group: 'emperor', font: {size: 20} },
        { id: 12, label: '克劳狄乌斯\n(第四任)', group: 'emperor', font: {size: 20} },
        { id: 16, label: '尼禄\n(第五任)', group: 'emperor', font: {size: 20} },

        // 后宫与皇族组 (橙色系)
        { id: 2, label: '莉薇娅\n(提贝里乌斯之母)', group: 'royal' },
        { id: 5, label: '莉维拉\n(小德鲁苏斯之妻)', group: 'royal' },
        { id: 8, label: '大阿格里皮娜\n(日耳曼尼库斯之妻)', group: 'royal' },
        { id: 10, label: '卡索妮亚\n(卡利古拉之妻)', group: 'royal' },
        { id: 13, label: '麦瑟琳娜\n(克劳狄第三任妻子)', group: 'royal' },
        { id: 14, label: '小阿格里皮娜\n(尼禄之母)', group: 'royal', font: {size: 18} },
        { id: 18, label: '波培娅\n(尼禄之妻)', group: 'royal' },

        // 权臣与近卫军 (蓝色系)
        { id: 6, label: '塞扬努斯\n(近卫军长官)', group: 'official' },
        { id: 11, label: '马克罗\n(近卫军长官)', group: 'official' },
        { id: 17, label: '塞内加 & 布鲁斯\n(尼禄文武导师)', group: 'official' },
        { id: 19, label: '三大自由人\n(克劳狄心腹)', group: 'official' },

        // 牺牲品/将领/皇子 (紫色系)
        { id: 4, label: '小德鲁苏斯\n(提贝里乌斯之子)', group: 'victim' },
        { id: 7, label: '日耳曼尼库斯\n(帝国军方偶像)', group: 'victim' },
        { id: 15, label: '布里塔尼库斯\n(克劳狄亲生子)', group: 'victim' },
        { id: 20, label: '科尔布罗\n(帝国名将)', group: 'victim' }
    ]);

    // 创建关系边连线集合
    var edges = new vis.DataSet([
        // 奥古斯都时期
        { from: 1, to: 2, label: '夫妻', arrows: 'to, from', color: {color: '#7f8c8d'} },
        { from: 2, to: 3, label: '生母', arrows: 'to', color: {color: '#27ae60'} },
        { from: 1, to: 3, label: '收养/继任', arrows: 'to', color: {color: '#d35400'} },
        { from: 1, to: 8, label: '外祖父', arrows: 'to', color: {color: '#27ae60'} },

        // 提贝里乌斯时期
        { from: 3, to: 4, label: '生父', arrows: 'to', color: {color: '#27ae60'} },
        { from: 3, to: 7, label: '养父', arrows: 'to', color: {color: '#27ae60'} },
        { from: 4, to: 5, label: '夫妻', arrows: 'to, from', color: {color: '#7f8c8d'} },
        { from: 7, to: 8, label: '夫妻', arrows: 'to, from', color: {color: '#7f8c8d'} },
        { from: 6, to: 5, label: '通奸/合谋', arrows: 'to, from', color: {color: '#c0392b'}, dashes: true },
        { from: 5, to: 4, label: '毒杀', arrows: 'to', color: {color: '#c0392b'} },
        { from: 6, to: 8, label: '政治构陷', arrows: 'to', color: {color: '#c0392b'} },
        { from: 3, to: 6, label: '宠信转处决', arrows: 'to', color: {color: '#8e44ad'} },
        
        // 卡利古拉时期
        { from: 7, to: 9, label: '生父', arrows: 'to', color: {color: '#27ae60'} },
        { from: 8, to: 9, label: '生母', arrows: 'to', color: {color: '#27ae60'} },
        { from: 3, to: 9, label: '监视/交棒', arrows: 'to', color: {color: '#d35400'} },
        { from: 11, to: 3, label: '闷死(传闻)', arrows: 'to', color: {color: '#c0392b'} },
        { from: 11, to: 9, label: '拥立转被杀', arrows: 'to', color: {color: '#8e44ad'} },
        { from: 9, to: 10, label: '最宠爱妻子', arrows: 'to, from', color: {color: '#7f8c8d'} },

        // 克劳狄乌斯时期
        { from: 7, to: 12, label: '亲兄弟', arrows: 'to, from', color: {color: '#2980b9'} },
        { from: 9, to: 12, label: '叔侄', arrows: 'to, from', color: {color: '#2980b9'} },
        { from: 12, to: 13, label: '夫妻 (处死)', arrows: 'to, from', color: {color: '#8e44ad'} },
        { from: 13, to: 15, label: '生母', arrows: 'to', color: {color: '#27ae60'} },
        { from: 12, to: 15, label: '生父', arrows: 'to', color: {color: '#27ae60'} },
        { from: 19, to: 12, label: '架空/辅佐', arrows: 'to', color: {color: '#f39c12'} },
        
        // 尼禄与小阿格里皮娜时期
        { from: 7, to: 14, label: '生父', arrows: 'to', color: {color: '#27ae60'} },
        { from: 8, to: 14, label: '生母', arrows: 'to', color: {color: '#27ae60'} },
        { from: 14, to: 12, label: '乱伦/毒杀', arrows: 'to', color: {color: '#c0392b'}, font: {color: '#c0392b'} },
        { from: 14, to: 16, label: '生母/强权控制', arrows: 'to', color: {color: '#d35400'} },
        { from: 12, to: 16, label: '收养/传位', arrows: 'to', color: {color: '#d35400'} },
        { from: 16, to: 14, label: '派兵弑母', arrows: 'to', color: {color: '#c0392b'}, font: {color: '#c0392b'} },
        { from: 16, to: 15, label: '毒杀夺权', arrows: 'to', color: {color: '#c0392b'} },
        { from: 16, to: 18, label: '挚爱(传被踢死)', arrows: 'to, from', color: {color: '#8e44ad'} },
        { from: 17, to: 16, label: '辅佐黄金五年', arrows: 'to', color: {color: '#f39c12'} },
        { from: 16, to: 17, label: '逼迫自杀', arrows: 'to', color: {color: '#c0392b'} },
        { from: 16, to: 20, label: '逼迫自杀', arrows: 'to', color: {color: '#c0392b'} }
    ]);

    // 获取容器
    var container = document.getElementById('mynetwork');

    // 将数据注入
    var data = {
        nodes: nodes,
        edges: edges
    };

    // 配置图表物理引擎与节点样式
    var options = {
        nodes: {
            shape: 'dot',
            size: 16,
            font: {
                size: 14,
                color: '#333',
                multi: 'html'
            },
            borderWidth: 2,
            shadow: true
        },
        edges: {
            width: 2,
            font: {
                size: 11,
                align: 'middle'
            },
            smooth: {
                type: 'dynamic'
            }
        },
        groups: {
            emperor: {
                color: {background: '#e74c3c', border: '#c0392b'},
                shape: 'hexagon'
            },
            royal: {
                color: {background: '#f39c12', border: '#d35400'}
            },
            official: {
                color: {background: '#3498db', border: '#2980b9'},
                shape: 'square'
            },
            victim: {
                color: {background: '#9b59b6', border: '#8e44ad'},
                shape: 'triangle'
            }
        },
        physics: {
            forceAtlas2Based: {
                gravitationalConstant: -100,
                centralGravity: 0.005,
                springLength: 200,
                springConstant: 0.08
            },
            maxVelocity: 50,
            solver: 'forceAtlas2Based',
            timestep: 0.35,
            stabilization: {iterations: 150}
        }
    };

    // 初始化网状图
    var network = new vis.Network(container, data, options);
</script>

</body>
</html>
