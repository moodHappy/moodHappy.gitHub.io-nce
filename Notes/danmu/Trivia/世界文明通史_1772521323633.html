        }

            color: #fbbf24;
            box-shadow: 0 0 15px rgba(30, 58, 138, 0.6);

            border-radius: 6px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);

        }

        }

            padding: 15px 15px;
            cursor: pointer;
            list-style: none; /* 隐藏原生折叠三角 */
            text-align: left;
            border-bottom: 1px dashed transparent;
            transition: background 0.3s ease;
        }

        .main-category-summary::-webkit-details-marker {
            display: none; /* 兼容 Safari 隐藏原生折叠三角 */
        }

        .main-category-summary:hover {
            background: rgba(255, 255, 255, 0.02);
        }

            background: rgba(0, 0, 0, 0.2);

        }

            font-weight: bold;
            margin: 0;

            margin-top: 6px;
            font-weight: normal;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            letter-spacing: 1px;
        }

        .main-category-content {
            padding: 15px 15px 5px 15px;
        }

        .sub-category {
            margin-bottom: 10px;
            background: #1e293b;
            border-radius: 4px;
            border: 1px solid #334155;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .sub-category summary {
            padding: 9px 12px;
            cursor: pointer;
            font-size: 12px; 
            font-weight: bold;
            color: #e2e8f0;
            background: #0f172a;
            border-left: 4px solid #3b82f6; 
            list-style: none;
            position: relative;
            transition: background 0.2s ease;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            white-space: nowrap;
        }

        .sub-category summary::-webkit-details-marker {
            display: none;
        }

        .sub-category summary:hover {
            background: #1e293b;
            color: #fbbf24;
        }

        .sub-category summary::after {
            content: "▼";
            position: absolute;
            right: 12px;
            font-size: 10px;
            color: #64748b;
            transition: transform 0.3s ease;

            transform: rotate(180deg);
        }

        .details-content {
            padding: 12px;
            background-color: #0f172a;
        }

            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
            gap: 8px;
            padding: 0;
            margin: 0;
            list-style: none;

            justify-content: center;
            align-items: center;
            padding: 8px 6px;
            background-color: #1e293b;
            border: 1px solid #334155;
            color: #94a3b8; 
            text-decoration: none;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .grid-list li a::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #1e3a8a; 
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

            border-color: #3b82f6;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);

                        items: ["末代沙皇(尼古拉二世)|v1", "联盟缔造者(列宁)|v1", "钢铁慈父(斯大林)|v1", "末代书记(戈尔巴乔夫)|v1", "首任总统(叶利钦)|", "现任总统(普京)|v1"]
                    },
                    {
                        title: "2. 德意志的崩溃与重生 (1914年-至今)",
                        items: ["末代德皇(威廉二世)|v1", "末代总统(保罗冯兴登堡)|", "帝国元首(阿道夫希特勒)|v1", "统一总理(赫尔穆特科尔)|", "铁娘子(安格拉默克尔)|v1", "现任总理(奥拉夫朔尔茨)|v1"]
                    },
                    {
                        title: "3. 现代不列颠与法兰西 (1914年-至今)",
                        items: ["一战总理(克列孟梭)|", "结巴国王(乔治六世)|", "超长待机(伊丽莎白二世)|", "开国总统(戴高乐)|v1", "现任国王(查尔斯三世)|v1", "现任总统(马克龙)|v1"]
                    },
                    {
                        title: "4. 美利坚霸权与当代社会 (1914年-至今)",
                        items: ["二战轮椅总统(罗斯福)|v1", "现任总统(特朗普)|v1"]
                    },
                    {
                        title: "5. 中东剧变与现代列国 (1922年-至今)",
                        items: ["末代苏丹(穆罕默德六世)|v1", "建国之父(凯末尔)|v1", "革命领袖(霍梅尼)|v1", "建国总理(本古里安)|v1", "开国君主(伊本沙特)|", "现任最高领袖(哈梅内伊)|v1", "现任总统(埃尔多安)|v1", "现任总理(内塔尼亚胡)|v1"]
                    },
                    {
                        title: "6. 现代南欧国家 (1914年-至今)",
                        items: ["法西斯元首(墨索里尼)|v1", "末代葡王(曼努埃尔二世)|", "末代国王(康斯坦丁二世)|", "现任总统(德索萨)|v1", "现任国王(费利佩六世)|v1", "现任总理(梅洛尼)|v1"]
                    }
                ]
            }
        ];

        const container = document.getElementById('content');

        data.forEach(main => {
            // 利用 JS 动态分割主标题和年代，实现换行
            const parts = main.category.split(' (');
            const mainTitle = parts[0];
            const timeStr = parts.length > 1 ? '(' + parts[1] : '';

            let html = `
            <details class="main-category">
                <summary class="main-category-summary">
                    <div class="main-title-text">${mainTitle}</div>
                    ${timeStr ? `<span class="main-title-time">${timeStr}</span>` : ''}
                </summary>
                <div class="main-category-content">
            `;
            
            main.subCats.forEach(sub => {
                html += `
                <details class="sub-category">
                    <summary>${sub.title} <span class="count-tag">(${sub.items.length}位)</span></summary>
                    <div class="details-content">
                        <ul class="grid-list">
                `;
                sub.items.forEach(item => {
                    const itemParts = item.split('|');
                    const name = itemParts[0];
                    const isV1 = itemParts[1] === 'v1' ? 'is-v1' : ''; 
                    const searchName = name.replace(/[()]/g, ' ').trim(); 

                    html += `
                        <li class="${isV1}">
                            <a href="https://www.google.com/search?q=世界历史+${searchName}" target="_blank" rel="noopener noreferrer">
                                <div class="name">${name}</div>
                            </a>
                        </li>
                    `;
                });
                html += `</ul></div></details>`;
            });
            html += `</div></details>`;
            container.innerHTML += html;
        });

        const toggleBtn = document.getElementById('toggleBtn');
        let isExpanded = false;

        toggleBtn.addEventListener('click', () => {
            isExpanded = !isExpanded;
            // 获取所有的 details，包括外层的主分类和内层的子分类
            const allDetails = document.querySelectorAll('details');
            allDetails.forEach(details => {
                if (details.style.display !== 'none') {
                    if (isExpanded) {
                        details.setAttribute('open', '');
                    } else {
                        details.removeAttribute('open');
                    }
                }
            });
            toggleBtn.textContent = isExpanded ? '收拢星图' : '展开星图';
        });

        const searchInput = document.getElementById('searchInput');

        searchInput.addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase().trim();
            const allMainCategories = document.querySelectorAll('.main-category');

            allMainCategories.forEach(mainCat => {
                let mainHasMatch = false;
                const subElements = mainCat.querySelectorAll('.sub-category');

                subElements.forEach(details => {
                    let detailsHasMatch = false;
                    const items = details.querySelectorAll('.grid-list li');

                    items.forEach(li => {
                        const text = li.textContent.toLowerCase();
                        if (text.includes(term)) {
                            li.style.display = '';
                            detailsHasMatch = true;
                        } else {
                            li.style.display = 'none';
                        }
                    });

                    if (detailsHasMatch) {
                        details.style.display = '';
                        mainHasMatch = true;
                        if (term !== '') {
                            details.setAttribute('open', '');
                        } else {
                            if (!isExpanded) details.removeAttribute('open');
                        }
                    } else {
                        details.style.display = 'none';
                    }
                });

                if (mainHasMatch) {
                    mainCat.style.display = '';
                    if (term !== '') {
                        mainCat.setAttribute('open', ''); // 搜索时外层自动展开
                    } else {
                        if (!isExpanded) mainCat.removeAttribute('open');
                    }
                } else {
                    mainCat.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
