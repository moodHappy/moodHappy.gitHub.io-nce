<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f9f6f0">
    <title>日本神话神代与百鬼图鉴</title>
    <style>
        /* 基础和风排版 */
        body {
            font-family: "STKaiti", "KaiTi", "BiauKai", "楷体", "SimSun", "宋体", serif;
            line-height: 1.6;
            color: #2b2219; /* 墨色 */
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f9f6f0; /* 和纸底色 */
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" opacity="0.03"><text x="10" y="150" font-family="楷体" font-size="36" transform="rotate(-30)">日本神话</text></svg>');
        }

        h1 {
            text-align: center;
            color: #b32025; /* 鸟居朱红 */
            font-size: 26px; 
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
            border-bottom: 2px solid #e6c8c8;
            padding-bottom: 20px;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .search-box {
            width: 100%;
            max-width: 260px;
            padding: 8px 12px;
            border: none;
            border-bottom: 2px solid #dcb5b5;
            background: transparent;
            font-family: inherit;
            font-size: 16px;
            color: #2b2219;
            outline: none;
            transition: border-color 0.3s;
            text-align: center;
        }

        .search-box:focus {
            border-bottom-color: #b32025;
        }

        .search-box::placeholder {
            color: #bfaea0;
            font-size: 15px;
            letter-spacing: 1px;
        }

        .toggle-btn {
            background-color: transparent;
            border: 1px solid #b32025;
            color: #b32025;
            padding: 7px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .toggle-btn:hover {
            background-color: #b32025;
            color: #f9f6f0;
            box-shadow: 0 2px 6px rgba(179, 32, 37, 0.2);
        }

        .main-category {
            background: #fffdf9;
            border: 1px solid #e6c8c8;
            border-radius: 4px;
            padding: 15px; 
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            transition: opacity 0.3s;
        }

        .main-category h2 {
            border-bottom: 1px dashed #dcb5b5;
            padding-bottom: 12px;
            color: #b32025;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 18px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        details {
            margin-bottom: 15px;
            background: #fdfaf5;
            border-radius: 4px;
            border: 1px solid #f0e1e1;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        summary {
            padding: 12px 15px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            color: #4a3636;
            background: #f5ecec;
            border-left: 4px solid #b32025;
            list-style: none;
            position: relative;
            transition: background 0.2s ease;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        summary::-webkit-details-marker {
            display: none;
        }

        summary:hover {
            background: #ecdcdc;
        }

        summary::after {
            content: "▼";
            position: absolute;
            right: 15px;
            font-size: 12px;
            color: #9c8a8a;
            transition: transform 0.3s ease;
        }

        details[open] summary::after {
            transform: rotate(180deg);
        }

        .details-content {
            padding: 15px;
            background-color: #fffdf9;
        }

        .grid-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 10px; 
            padding: 0;
            margin: 0;
            list-style: none;
        }

        .grid-list li {
            transition: opacity 0.3s ease;
            min-width: 0; 
        }

        .grid-list li a {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px 4px; 
            background-color: transparent;
            border: 1px solid #e6c8c8;
            color: #2b2219;
            text-decoration: none;
            border-radius: 4px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            height: 100%;
            position: relative;
            overflow: hidden;
            z-index: 1;
            width: 100%;
            box-sizing: border-box;
        }

        .grid-list li a::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #b32025;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .grid-list li a:hover {
            border-color: #b32025;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(179, 32, 37, 0.2);
        }

        .grid-list li a:hover::before {
            opacity: 1;
        }

        .grid-list li a:hover .name,
        .grid-list li a:hover .subtitle {
            color: #f9f6f0;
        }

        .grid-list li a:hover .name.famous {
            color: #ffd700; /* 亮金 */
            text-shadow: 0px 0px 6px rgba(255, 215, 0, 0.6);
        }

        .subtitle {
            font-size: 10px; 
            color: #8c7a6b;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin-bottom: 4px;
            transition: color 0.3s ease;
            white-space: nowrap; 
            overflow: hidden;
            text-overflow: ellipsis; 
            width: 100%; 
            text-align: center;
            letter-spacing: -0.5px; 
        }

        .name {
            font-size: 14px; 
            font-weight: 600;
            letter-spacing: 0px; 
            transition: color 0.3s ease, text-shadow 0.3s ease;
            white-space: nowrap; 
            overflow: hidden;
            text-overflow: ellipsis; 
            width: 100%;
            text-align: center;
        }

        .name.famous {
            color: #c58d20; /* 莳绘暗金 */
            text-shadow: 0px 1px 1px rgba(197, 141, 32, 0.2);
        }

        .count-tag {
            font-size: 13px;
            font-weight: normal;
            color: #8c7a6b;
        }
    </style>
</head>
<body>

    <h1>《日本神话》神代与百鬼图鉴</h1>

    <div class="controls">
        <input type="text" id="searchInput" class="search-box" placeholder="寻觅神明与物语 (搜汉字)">
        <button id="toggleBtn" class="toggle-btn">展开卷轴</button>
    </div>

    <div id="content"></div>

    <script>
        // 定义最知名的日本神明、妖怪与事件 (高亮金色)
        const famousEntities = [
            "伊邪那岐", "伊邪那美", "天照大御神", "月读命", "须佐之男", 
            "大国主神", "建御雷神", "八幡神", "稻荷神",
            "八岐大蛇", "玉藻前", "酒吞童子", "大天狗", "滑头鬼",
            "草薙剑", "八咫镜", "八尺琼勾玉",
            "黄泉之国", "天岩户", "斩杀八岐大蛇", "让国神话", "天孙降临"
        ];

        const data = [
            {
                category: "一、 创世与高天原篇",
                subCats: [
                    {
                        title: "1. 别天津神 (宇宙初开之神)",
                        items: ["天之御中主神|宇宙的根本/最高神", "高御产巢日神|征服与统御之神", "神产巢日神|生产与创造之神", "宇摩志阿斯诃备比古迟神|生命力神格化", "天之常立神|高天原永恒之神"]
                    },
                    {
                        title: "2. 神世七代 (演化之神)",
                        items: ["国之常立神|大地的永恒基础", "丰云野神|云雾与丰饶之神", "泥土煮神|泥土神格化", "大户之道神|男性门神/家宅守护", "面胴尊|面容完美之神", "伊邪那岐|神世七代末/创世之父", "伊邪那美|神世七代末/创世之母"]
                    }
                ]
            },
            {
                category: "二、 三贵子与天津神篇",
                subCats: [
                    {
                        title: "1. 三贵子 (至高三神)",
                        items: ["天照大御神|太阳女神/皇室祖神", "月读命|月亮与夜国之神", "须佐之男|风暴之神/破坏与海洋神"]
                    },
                    {
                        title: "2. 核心天津神 (高天原诸神)",
                        items: ["天手力男神|怪力之神/推开岩户者", "思金神|智慧与计谋之神", "天钿女命|演艺与舞蹈女神", "建御雷神|雷神/剑神/武神", "天之忍穗耳命|天照之子/稻穗之神", "迩迩艺命|天孙/降临凡间的皇祖", "天儿屋命|言灵与祭祀之神"]
                    }
                ]
            },
            {
                category: "三、 苇原中国与地祇篇",
                subCats: [
                    {
                        title: "1. 国津神 (大地原住民神)",
                        items: ["大国主神|建国之神/结缘与农业神", "少彦名神|医药与温泉之神", "建御名方神|风神/农业神/战神", "事代主神|托宣之神/商业惠比寿", "大山津见神|群山之神", "大物主神|蛇神/水神与雷神"]
                    },
                    {
                        title: "2. 民间信仰与八百万神",
                        items: ["稻荷神|宇迦之御魂神/五谷神", "八幡神|应神天皇/武神与镇守神", "天满大自在天神|菅原道真/学问之神", "水波能卖神|水神与井神", "猿田彦神|指引道路的道祖神", "木花开耶姬|樱花女神/富士山神"]
                    }
                ]
            },
            {
                category: "四、 百鬼夜行与神兽篇",
                subCats: [
                    {
                        title: "1. 上古大妖与三大妖",
                        items: ["八岐大蛇|八头八尾的洪荒水怪", "玉藻前|魅惑众生的九尾妖狐", "酒吞童子|大江山的恶鬼头领", "大天狗|崇德天皇化身/傲慢之妖", "两面宿傩|飞驒国的双面四手恶神", "土蜘蛛|潜伏深山的巨型蛛妖"]
                    },
                    {
                        title: "2. 经典妖怪与幽灵",
                        items: ["滑头鬼|妖怪头目/白发老者", "河童|水泽恶作剧之妖", "鬼|头上长角手持狼牙棒的恶鬼", "雪女|风雪中的致命美人", "座敷童子|带来繁荣的家宅精灵", "鸦天狗|鸟喙武士/剑术高手", "姑获鸟|执念化作的产妇之妖", "鵺|猿首狸身虎肢蛇尾的合成兽"]
                    },
                    {
                        title: "3. 瑞兽与灵物",
                        items: ["八咫乌|三足金乌/神圣的向导", "狛犬|镇守神社的狮狗神兽", "白泽|通晓万物之理的瑞兽", "管狐|可装入竹筒的灵狐使魔", "化狸|善于变化与恶作剧的狸猫"]
                    }
                ]
            },
            {
                category: "五、 三神器与传世法宝篇",
                subCats: [
                    {
                        title: "1. 皇室三神器",
                        items: ["草薙剑|天丛云剑/八岐大蛇尾中剑", "八咫镜|引出天照大御神的神镜", "八尺琼勾玉|天皇正统的灵魂象征"]
                    },
                    {
                        title: "2. 神代武具与奇物",
                        items: ["十拳剑|诸神标配的斩断之剑", "天之琼矛|搅拌出日本岛的创世长矛", "天羽羽矢|贯穿一切的神圣之箭", "潮盈珠与潮乾珠|控制海潮的龙宫宝珠", "布都御魂剑|建御雷神的平定之剑"]
                    }
                ]
            },
            {
                category: "六、 神代物语与著名史诗篇",
                subCats: [
                    {
                        title: "1. 创世与分离",
                        items: ["诞生国岛|伊邪那岐与伊邪那美搅动沧海", "火神之劫|迦具土烧死母亲与诸神诞生", "黄泉之国|追寻亡妻的禁忌之旅与诀别", "禊祓与三贵子|洗去黄泉污秽诞生至高神"]
                    },
                    {
                        title: "2. 高天原的纷争",
                        items: ["誓约与诞生|天照与须佐之男的斗法", "天岩户|太阳隐匿与诸神献舞的救赎", "斩杀八岐大蛇|须佐之男的救美与得剑英雄谭"]
                    },
                    {
                        title: "3. 苇原中国的平定",
                        items: ["因幡之白兔|大国主神的仁慈与考验", "建国与让国|大国主建立国家并交还天神", "天孙降临|迩迩艺命带着三神器降临人间", "山幸彦与海幸彦|兄弟之争与龙宫游记", "神武东征|第一代天皇平定大和的征途"]
                    }
                ]
            }
        ];

        const container = document.getElementById('content');

        data.forEach(main => {
            let html = `<div class="main-category"><h2>${main.category}</h2>`;
            main.subCats.forEach(sub => {
                html += `
                <details>
                    <summary>${sub.title} <span class="count-tag">(${sub.items.length}个)</span></summary>
                    <div class="details-content">
                        <ul class="grid-list">
                `;
                sub.items.forEach(item => {
                    const [name, subtitle] = item.split('|');
                    const searchName = name; 

                    const isFamous = famousEntities.includes(name);
                    const nameClass = isFamous ? "name famous" : "name";

                    html += `
                        <li class="item-li">
                            <a href="https://www.google.com/search?tbm=isch&q=日本神话+${searchName}" target="_blank" rel="noopener noreferrer" title="${subtitle} - ${name}">
                                <div class="subtitle">${subtitle}</div>
                                <div class="${nameClass}">${name}</div>
                            </a>
                        </li>
                    `;
                });
                html += `</ul></div></details>`;
            });
            html += `</div>`;
            container.innerHTML += html;
        });

        const toggleBtn = document.getElementById('toggleBtn');
        let isExpanded = false;

        toggleBtn.addEventListener('click', () => {
            isExpanded = !isExpanded;
            const allDetails = document.querySelectorAll('details');
            allDetails.forEach(details => {
                if (details.style.display !== 'none') {
                    if (isExpanded) {
                        details.setAttribute('open', '');
                    } else {
                        details.removeAttribute('open');
                    }
                }
            });
            toggleBtn.textContent = isExpanded ? '收起卷轴' : '展开卷轴';
        });

        const searchInput = document.getElementById('searchInput');

        searchInput.addEventListener('input', function(e) {
            const term = e.target.value.trim();
            const allMainCategories = document.querySelectorAll('.main-category');

            allMainCategories.forEach(mainCat => {
                let mainHasMatch = false;
                const detailsElements = mainCat.querySelectorAll('details');

                detailsElements.forEach(details => {
                    let detailsHasMatch = false;
                    const items = details.querySelectorAll('.item-li');

                    items.forEach(li => {
                        const text = li.textContent;
                        if (text.includes(term)) {
                            li.style.display = '';
                            detailsHasMatch = true;
                        } else {
                            li.style.display = 'none';
                        }
                    });

                    if (detailsHasMatch) {
                        details.style.display = '';
                        mainHasMatch = true;
                        if (term !== '') {
                            details.setAttribute('open', '');
                        } else {
                            if (!isExpanded) details.removeAttribute('open');
                        }
                    } else {
                        details.style.display = 'none';
                    }
                });

                mainCat.style.display = mainHasMatch ? '' : 'none';
            });
        });
    </script>
</body>
</html>
