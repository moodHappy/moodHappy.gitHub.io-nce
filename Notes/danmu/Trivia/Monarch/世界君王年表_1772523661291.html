<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0b1120">
    <title>人类群星闪耀时：君王与名将时间线</title>
    <style>
        /* 全局排版 */
        body {
            font-family: "STKaiti", "KaiTi", "BiauKai", "楷体", "SimSun", "宋体", serif;
            line-height: 1.6;
            color: #cbd5e1;
            margin: 0;
            padding: 0;
            background-color: #0b1120; 
            box-sizing: border-box;
        }

        /* 独立区块样式 */
        .section-wrapper {
            max-width: 1000px;
            margin: 0 auto;
            padding: 30px 15px;
            background-position: center;
            background-repeat: repeat-y;
        }

        /* 背景水印定义 */
        .bg-western-king { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" opacity="0.02"><circle cx="300" cy="300" r="250" stroke="%23ffffff" stroke-width="2" fill="none"/><text x="130" y="320" font-family="楷体" font-size="80" transform="rotate(-15)" font-weight="bold" fill="%23ffffff">影响深远</text></svg>'); }
        .bg-world-king { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" opacity="0.02"><circle cx="300" cy="300" r="250" stroke="%23ffffff" stroke-width="2" fill="none"/><text x="130" y="320" font-family="楷体" font-size="80" transform="rotate(-15)" font-weight="bold" fill="%23ffffff">千古一帝</text></svg>'); }
        .bg-western-general { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" opacity="0.02"><circle cx="300" cy="300" r="250" stroke="%23ffffff" stroke-width="2" fill="none"/><text x="130" y="320" font-family="楷体" font-size="80" transform="rotate(-15)" font-weight="bold" fill="%23ffffff">西方战神</text></svg>'); }
        .bg-world-general { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" opacity="0.02"><circle cx="300" cy="300" r="250" stroke="%23ffffff" stroke-width="2" fill="none"/><text x="130" y="320" font-family="楷体" font-size="80" transform="rotate(-15)" font-weight="bold" fill="%23ffffff">百战百胜</text></svg>'); }

        /* 折叠标题交互样式 - 已修改为左对齐 */
        h1 {
            text-align: left;
            font-size: 26px; 
            margin-bottom: 20px;
            letter-spacing: 5px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: flex-start; /* 从 center 改为 flex-start 靠左 */
            gap: 15px;
            transition: opacity 0.3s;
        }

        h1:hover { opacity: 0.8; }

        /* 颜色主题分类 */
        .h1-king { color: #fbbf24; }
        .h1-general { color: #ef4444; }

        /* 展开/折叠的小箭头 */
        .icon-arrow {
            font-size: 18px;
            transition: transform 0.3s ease;
            color: #94a3b8;
        }
        h1.open .icon-arrow {
            transform: rotate(90deg);
        }

        /* 列表容器 (默认隐藏) */
        .timeline-container {
            display: none; 
            flex-direction: column;
            gap: 12px;
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 行样式与双主题边框 */
        .king-row {
            display: flex;
            align-items: baseline;
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 4px;
            padding: 15px 20px;
            transition: transform 0.2s ease, background-color 0.2s ease, border-color 0.2s ease;
        }

        .theme-king { border-left: 4px solid #fbbf24; }
        .theme-king:hover { transform: translateX(8px); background: #1e293b; border-color: #3b82f6; }
        
        .theme-general { border-left: 4px solid #ef4444; }
        .theme-general:hover { transform: translateX(8px); background: #1e293b; border-color: #ef4444; }

        .part { white-space: nowrap; }

        /* 统一各个模块的宽度对齐 */
        .col-name {
            color: #fbbf24;
            font-weight: bold;
            font-size: 16px;
            width: 140px; 
            flex-shrink: 0;
        }

        .col-dynasty {
            color: #93c5fd;
            font-size: 14px;
            width: 150px; 
            flex-shrink: 0;
        }

        .col-time {
            color: #a7f3d0;
            font-size: 13px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            width: 140px; 
            flex-shrink: 0;
        }

        .col-achieve {
            color: #e2e8f0;
            font-size: 14px;
            white-space: normal;
            flex-grow: 1;
        }

        .slash {
            color: #475569;
            margin: 0 12px;
            font-weight: 300;
            flex-shrink: 0;
        }

        /* 普通分隔线 */
        .section-divider {
            border: 0;
            height: 1px;
            background-image: linear-gradient(to right, rgba(11, 17, 32, 0), rgba(59, 130, 246, 0.4), rgba(11, 17, 32, 0));
            margin: 10px 0;
        }

        /* 大章节分隔线 (君王过渡到名将) */
        .chapter-divider {
            border: 0;
            height: 2px;
            background-image: linear-gradient(to right, rgba(11, 17, 32, 0), #fbbf24, #ef4444, rgba(11, 17, 32, 0));
            margin: 40px 0;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .king-row { flex-wrap: wrap; padding: 12px; }
            .col-name { width: auto; font-size: 14px; }
            .col-dynasty { width: auto; font-size: 12px; }
            .col-time { width: auto; font-size: 11px; }
            .slash { margin: 0 5px; font-size: 12px; }
            .col-achieve { width: 100%; margin-top: 8px; font-size: 13px; color: #94a3b8; }
            .hide-on-mobile { display: none; }
            h1 { font-size: 20px; letter-spacing: 2px; }
        }
    </style>
</head>
<body>

    <div class="section-wrapper bg-western-king">
        <h1 class="h1-king" onclick="toggleSection('timeline-western-kings', this)">
            <span class="icon-arrow">▶</span> 西方史影响最深远五大君主
        </h1>
        <div id="timeline-western-kings" class="timeline-container"></div>
    </div>

    <hr class="section-divider">

    <div class="section-wrapper bg-world-king">
        <h1 class="h1-king" onclick="toggleSection('timeline-world-kings', this)">
            <span class="icon-arrow">▶</span> 世界伟大君王时间线
        </h1>
        <div id="timeline-world-kings" class="timeline-container"></div>
    </div>

    <hr class="chapter-divider">

    <div class="section-wrapper bg-western-general">
        <h1 class="h1-general" onclick="toggleSection('timeline-western-generals', this)">
            <span class="icon-arrow">▶</span> 西方史影响最深远五大名将
        </h1>
        <div id="timeline-western-generals" class="timeline-container"></div>
    </div>

    <hr class="section-divider">

    <div class="section-wrapper bg-world-general">
        <h1 class="h1-general" onclick="toggleSection('timeline-world-generals', this)">
            <span class="icon-arrow">▶</span> 世界伟大名将时间线
        </h1>
        <div id="timeline-world-generals" class="timeline-container"></div>
    </div>

    <script>
        // 交互逻辑：点击折叠/展开
        function toggleSection(containerId, headerElement) {
            const container = document.getElementById(containerId);
            if (container.style.display === "none" || container.style.display === "") {
                container.style.display = "flex";
                headerElement.classList.add("open");
            } else {
                container.style.display = "none";
                headerElement.classList.remove("open");
            }
        }

        // 数据源 1：西方君主
        const westernKingsData = [
            "亚历山大大帝 / 马其顿帝国 / 前336–前323年 / 开启希腊化时代，将古典文化播撒至东方，奠定西方文明底座",
            "凯撒大帝 / 罗马共和国 / 前49–前44年 / 终结共和内耗，奠定帝国基石，其名号成为西方最高权力的代名词",
            "君士坦丁大帝 / 罗马帝国 / 306–337年 / 合法化基督教，确立教权与皇权格局，建立君士坦丁堡延续文明",
            "查理大帝 / 法兰克王国 / 768–814年 / 史称“欧洲之父”，统一西欧并确立封建制度，保存古典文化火种",
            "拿破仑一世 / 法兰西第一帝国 / 1804–1815年 / 颁布《拿破仑法典》，摧毁封建秩序，构建现代国家法律与行政蓝本"
        ];

        // 数据源 2：世界君主
        const worldKingsData = [
            "那尔迈 / 埃及早期王朝 / 约前3100年 / 统一上下埃及，开启法老时代",
            "萨尔贡 / 阿卡德帝国 / 前2334–前2154年 / 建立人类历史上第一个大帝国",
            "汉谟拉比 / 古巴比伦王国 / 前1792–前1750年 / 统一两河流域，颁布《汉谟拉比法典》",
            "图特摩斯三世 / 埃及新王国 / 前1479–前1425年 / 杰出的军事统帅，建立埃及最大疆域",
            "拉美西斯二世 / 埃及新王国 / 前1279–前1213年 / 建筑狂魔，卡迭石战役，签署最早和平条约",
            "大卫王 / 希伯来联合王国 / 前1000–前970年 / 攻占耶路撒冷，奠定希伯来黄金时代",
            "居鲁士大帝 / 波斯阿契美尼德王朝 / 前559–前530年 / 建立波斯帝国，释放巴比伦之囚，以宽容著称",
            "大流士一世 / 波斯阿契美尼德王朝 / 前522–前486年 / 帝国极盛，修建波斯波利斯与御道，统一度量衡",
            "亚历山大大帝 / 马其顿帝国 / 前336–前323年 / 摧毁波斯帝国，建立地跨欧亚非的大帝国",
            "凯撒大帝 / 罗马共和国 / 前49–前44年 / 征服高卢，终结共和国体制，奠定罗马帝国基础",
            "屋大维(奥古斯都) / 罗马帝国 / 前27–14年 / 结束内战，建立罗马帝国，开创长达两百年的罗马和平",
            "图拉真 / 罗马帝国 / 98–117年 / 杰出的统帅，将罗马帝国疆域扩张至历史极盛",
            "查士丁尼一世 / 拜占庭帝国 / 527–565年 / 编纂《查士丁尼法典》，收复西部领土，建圣索菲亚大教堂",
            "查理大帝 / 法兰克王国 / 768–814年 / 统一大半个欧洲，被教皇加冕为“罗马人的皇帝”",
            "巴西尔二世 / 拜占庭帝国 / 976–1025年 / 保加利亚屠夫，带领拜占庭帝国走向中世纪的鼎盛",
            "穆罕默德二世 / 奥斯曼帝国 / 1451–1481年 / 攻陷君士坦丁堡，彻底终结拜占庭帝国",
            "伊莎贝拉一世 / 西班牙王国 / 1474–1504年 / 资助哥伦布大航海，完成收复失地运动，统一西班牙",
            "苏莱曼一世 / 奥斯曼帝国 / 1520–1566年 / 帝国极盛时期，被称为“立法者”和“大帝”",
            "伊丽莎白一世 / 英格兰都铎王朝 / 1558–1603年 / 击败西班牙无敌舰队，开创英国历史上的黄金时代",
            "阿拔斯一世 / 波斯萨非王朝 / 1588–1629年 / 击败奥斯曼与乌兹别克，缔造波斯近代最繁荣时期",
            "路易十四 / 法兰西波旁王朝 / 1643–1715年 / 史称“太阳王”，确立法国的欧洲霸权，建造凡尔赛宫",
            "彼得大帝 / 俄罗斯帝国 / 1682–1725年 / 推行全面西化改革，建立波罗的海霸权，营建圣彼得堡",
            "腓特烈大帝 / 普鲁士王国 / 1740–1786年 / 卓越的军事天才，确立普鲁士的欧洲大国地位",
            "叶卡捷琳娜二世 / 俄罗斯帝国 / 1762–1796年 / 扩张黑海出海口，瓜分波兰，将俄罗斯推向鼎盛",
            "拿破仑一世 / 法兰西第一帝国 / 1804–1814年 / 颁布《拿破仑法典》，凭借军事才能横扫欧洲大陆",
            "维多利亚女王 / 大英帝国 / 1837–1901年 / 缔造“日不落帝国”的极盛巅峰，开创维多利亚时代"
        ];

        // 数据源 3：西方名将
        const westernGeneralsData = [
            "亚历山大大帝 / 马其顿帝国 / 前336–前323年 / 欧洲历史上最伟大的军事天才，以马其顿方阵横扫波斯帝国，未尝一败",
            "汉尼拔·巴卡 / 迦太基 / 前247–前183年 / 被誉为“战略之父”，翻越阿尔卑斯山，坎尼战役创下包围歼灭战的永恒典范",
            "尤利乌斯·凯撒 / 罗马共和国 / 前100–前44年 / 杰出的统帅，阿莱西亚之战展现了卓越的工程与战术，奠定罗马帝国版图",
            "古斯塔夫二世 / 瑞典帝国 / 1594–1632年 / “现代军事之父”，首创线式战术、步骑炮协同作战，在三十年战争中称霸",
            "拿破仑·波拿巴 / 法兰西帝国 / 1769–1821年 / 炮兵出身的军事天才，创立军团编制与大纵深作战，奥斯特里茨战役被誉为巅峰"
        ];

        // 数据源 4：世界名将
        const worldGeneralsData = [
            "图特摩斯三世 / 古埃及 / 前1479–前1425年 / 军事天才，首创协同作战，被誉为“古埃及的拿破仑”",
            "孙武 / 春秋吴国 / 约前545–前470年 / 尊为“兵圣”，著有《孙子兵法》，奠定东方军事理论基础",
            "大西庇阿 / 罗马共和国 / 前236–前183年 / 罗马救星，扎马战役击败汉尼拔，赢得第二次布匿战争",
            "韩信 / 西汉 / ?–前196年 / 汉初三杰之一，被誉为“兵仙”，明修栈道暗渡陈仓，垓下之战击败项羽",
            "卫青 / 西汉 / ?–前106年 / 龙城大捷，七战七捷，首次深入漠北击溃匈奴单于主力",
            "贝利撒留 / 拜占庭帝国 / 505–565年 / 最后的罗马人，以极少兵力收复汪达尔与东哥特王国，重夺罗马",
            "哈立德 / 阿拉伯帝国 / 592–642年 / “安拉之剑”，雅尔穆克战役大败拜占庭，百战百胜无一败绩",
            "李靖 / 唐朝 / 571–649年 / 大唐“军神”，南平萧铣、北灭东突厥、西破吐谷浑",
            "速不台 / 蒙古帝国 / 1176–1248年 / 征战范围最广的将领，横跨亚欧大陆，指挥了六十五次大战役",
            "贞德 / 法兰西 / 1412–1431年 / 奥尔良之女，在百年战争中挽救法国，民族军事精神图腾",
            "李舜臣 / 朝鲜王朝 / 1545–1598年 / 鸣梁海战奇迹，改良龟船，在壬辰倭乱中彻底摧毁日本水军",
            "苏沃洛夫 / 俄罗斯帝国 / 1729–1800年 / 俄国常胜将军，六十余场战役未尝一败，著有《制胜的科学》",
            "纳尔逊 / 英国 / 1758–1805年 / 皇家海军之魂，特拉法加海战全歼法西联合舰队，确立英国海霸权",
            "威灵顿公爵 / 英国 / 1769–1852年 / 铁公爵，滑铁卢战役中彻底击败拿破仑，终结法兰西第一帝国",
            "老毛奇 / 普鲁士 / 1800–1891年 / 总参谋部制度的缔造者，策划普奥与普法战争实现德国统一",
            "乔治·巴顿 / 美国 / 1885–1945年 / “血胆老将”，装甲战术大师，率第三集团军横扫西欧大陆",
            "格奥尔基·朱可夫 / 苏联 / 1896–1974年 / 苏联元帅，指挥斯大林格勒保卫战与柏林战役，二战苏军核心统帅"
        ];

        // 公共渲染函数 (带主题Class注入)
        function renderTimeline(dataArray, containerId, themeClass) {
            const container = document.getElementById(containerId);
            let htmlContent = '';

            dataArray.forEach(item => {
                const parts = item.split(' / ');
                if (parts.length === 4) {
                    htmlContent += `
                        <div class="king-row ${themeClass}">
                            <div class="part col-name">${parts[0]}</div><div class="slash">/</div>
                            <div class="part col-dynasty">${parts[1]}</div><div class="slash">/</div>
                            <div class="part col-time">${parts[2]}</div><div class="slash hide-on-mobile">/</div>
                            <div class="part col-achieve">${parts[3]}</div>
                        </div>
                    `;
                }
            });

            container.innerHTML = htmlContent;
        }

        // 初始化渲染
        renderTimeline(westernKingsData, 'timeline-western-kings', 'theme-king');
        renderTimeline(worldKingsData, 'timeline-world-kings', 'theme-king');
        renderTimeline(westernGeneralsData, 'timeline-western-generals', 'theme-general');
        renderTimeline(worldGeneralsData, 'timeline-world-generals', 'theme-general');

    </script>
</body>
</html>
