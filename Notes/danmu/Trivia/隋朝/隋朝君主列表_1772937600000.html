<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>隋朝君主列表</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f4f7f6;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        h2 {
            color: #2980b9;
            margin-top: 30px;
        }
        details {
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }
        details[open] {
            border-color: #3498db;
            box-shadow: 0 4px 8px rgba(52, 152, 219, 0.2);
        }
        summary {
            font-weight: bold;
            font-size: 1.2em;
            cursor: pointer;
            outline: none;
            color: #2c3e50;
        }
        summary:hover {
            color: #3498db;
        }
        ol {
            margin-top: 15px;
            margin-bottom: 5px;
            padding-left: 25px;
        }
        li {
            margin-bottom: 8px;
            font-size: 1.05em;
        }
        .note {
            color: #7f8c8d;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

    <h1>隋朝君主列表</h1>

    <h2>隋朝 (581–619)</h2>

    <details>
        <summary>隋朝历代皇帝</summary>
        <ol>
            <li>杨坚 — 文帝</li>
            <li>杨广 — 炀帝</li>
            <li>杨侑 — 恭帝 <span class="note">（李渊所立傀儡）</span></li>
            <li>杨浩 — 秦王 <span class="note">（宇文化及所立傀儡）</span></li>
            <li>杨侗 — 皇泰主 / 越王 <span class="note">（王世充所立傀儡）</span></li>
        </ol>
    </details>

</body>
</html>
