<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0b1120">
    <title>世界伟大君王时间线</title>
    <style>
        /* 极简星空背景与全局排版 */
        body {
            font-family: "STKaiti", "KaiTi", "BiauKai", "楷体", "SimSun", "宋体", serif;
            line-height: 1.6;
            color: #cbd5e1;
            max-width: 1000px; /* 列表模式不需要太宽 */
            margin: 0 auto;
            padding: 30px 15px;
            background-color: #0b1120; 
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" opacity="0.02"><circle cx="300" cy="300" r="250" stroke="%23ffffff" stroke-width="2" fill="none"/><line x1="50" y1="300" x2="550" y2="300" stroke="%23ffffff" stroke-width="1"/><line x1="300" y1="50" x2="300" y2="550" stroke="%23ffffff" stroke-width="1"/><text x="130" y="320" font-family="楷体" font-size="80" transform="rotate(-15)" font-weight="bold" fill="%23ffffff">千古一帝</text></svg>');
            box-sizing: border-box;
        }

        h1 {
            text-align: center; /* 标题居中 */
            color: #fbbf24;
            font-size: 26px; 
            margin-bottom: 5px;
            letter-spacing: 5px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
            font-weight: bold;
        }

        .subtitle {
            text-align: center; /* 副标题居中 */
            color: #64748b;
            font-size: 12px;
            margin-bottom: 40px;
            border-bottom: 1px solid #1e3a8a;
            padding-bottom: 15px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 强迫症福音：严格对齐的列表容器 */
        #timeline-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .king-row {
            display: flex;
            align-items: baseline;
            background: #0f172a;
            border: 1px solid #1e293b;
            border-left: 3px solid #fbbf24;
            border-radius: 4px;
            padding: 12px 16px;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        .king-row:hover {
            transform: translateX(5px);
            background: #1e293b;
            border-color: #3b82f6;
        }

        /* 统一各个模块的宽度，确保在大屏上 "/" 完美垂直对齐 */
        .part {
            white-space: nowrap;
        }

        .col-name {
            color: #fbbf24;
            font-weight: bold;
            font-size: 16px;
            width: 120px; /* 固定宽度对齐 */
            flex-shrink: 0;
        }

        .col-dynasty {
            color: #93c5fd;
            font-size: 14px;
            width: 160px; /* 固定宽度对齐 */
            flex-shrink: 0;
        }

        .col-time {
            color: #a7f3d0;
            font-size: 13px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            width: 140px; /* 固定宽度对齐 */
            flex-shrink: 0;
        }

        .col-achieve {
            color: #94a3b8;
            font-size: 14px;
            white-space: normal; /* 成就可以换行 */
            flex-grow: 1;
        }

        .slash {
            color: #475569;
            margin: 0 10px;
            font-weight: 300;
            flex-shrink: 0;
        }

        /* 移动端适配：缩小字号，严禁前三项换行 */
        @media (max-width: 768px) {
            .king-row {
                flex-wrap: wrap; /* 允许内部折行，把成就挤到下面 */
                padding: 10px;
            }
            
            /* 前三项：取消固定宽度，缩小字号，收缩间距 */
            .col-name { width: auto; font-size: 13px; }
            .col-dynasty { width: auto; font-size: 12px; }
            .col-time { width: auto; font-size: 11px; }
            .slash { margin: 0 4px; font-size: 12px; }
            
            /* 成就部分：强制单起一行 */
            .col-achieve {
                width: 100%;
                margin-top: 6px;
                font-size: 13px;
            }
            
            /* 手机端隐藏第三个斜杠（位于时间和成就之间） */
            .hide-on-mobile {
                display: none;
            }
        }
    </style>
</head>
<body>

    <h1>世界伟大君王时间线</h1>
    <div class="subtitle">注：严格按年代排序。两河、北非、西亚及欧洲历史极简纵览。</div>

    <div id="timeline-container"></div>

    <script>
        const kingsData = [
            "那尔迈 / 埃及早期王朝 / 约前3100年 / 统一上下埃及，开启法老时代",
            "萨尔贡 / 阿卡德帝国 / 前2334–前2154年 / 建立人类历史上第一个大帝国",
            "汉谟拉比 / 古巴比伦王国 / 前1792–前1750年 / 统一两河流域，颁布《汉谟拉比法典》",
            "图特摩斯三世 / 埃及新王国 / 前1479–前1425年 / 杰出的军事统帅，建立埃及最大疆域",
            "拉美西斯二世 / 埃及新王国 / 前1279–前1213年 / 建筑狂魔，卡迭石战役，签署最早和平条约",
            "大卫王 / 希伯来联合王国 / 前1000–前970年 / 攻占耶路撒冷，奠定希伯来黄金时代",
            "居鲁士大帝 / 波斯阿契美尼德王朝 / 前559–前530年 / 建立波斯帝国，释放巴比伦之囚，以宽容著称",
            "大流士一世 / 波斯阿契美尼德王朝 / 前522–前486年 / 帝国极盛，修建波斯波利斯与御道，统一度量衡",
            "亚历山大大帝 / 马其顿帝国 / 前336–前323年 / 摧毁波斯帝国，建立地跨欧亚非的大帝国",
            "凯撒大帝 / 罗马共和国 / 前49–前44年 / 征服高卢，终结共和国体制，奠定罗马帝国基础",
            "屋大维(奥古斯都) / 罗马帝国 / 前27–14年 / 结束内战，建立罗马帝国，开创长达两百年的罗马和平",
            "图拉真 / 罗马帝国 / 98–117年 / 杰出的统帅，将罗马帝国疆域扩张至历史极盛",
            "查士丁尼一世 / 拜占庭帝国 / 527–565年 / 编纂《查士丁尼法典》，收复西部领土，建圣索菲亚大教堂",
            "查理大帝 / 法兰克王国 / 768–814年 / 统一大半个欧洲，被教皇加冕为“罗马人的皇帝”",
            "巴西尔二世 / 拜占庭帝国 / 976–1025年 / 保加利亚屠夫，带领拜占庭帝国走向中世纪的鼎盛",
            "穆罕默德二世 / 奥斯曼帝国 / 1451–1481年 / 攻陷君士坦丁堡，彻底终结拜占庭帝国",
            "伊莎贝拉一世 / 西班牙王国 / 1474–1504年 / 资助哥伦布大航海，完成收复失地运动，统一西班牙",
            "苏莱曼一世 / 奥斯曼帝国 / 1520–1566年 / 帝国极盛时期，被称为“立法者”和“大帝”",
            "伊丽莎白一世 / 英格兰都铎王朝 / 1558–1603年 / 击败西班牙无敌舰队，开创英国历史上的黄金时代",
            "阿拔斯一世 / 波斯萨非王朝 / 1588–1629年 / 击败奥斯曼与乌兹别克，缔造波斯近代最繁荣时期",
            "路易十四 / 法兰西波旁王朝 / 1643–1715年 / 史称“太阳王”，确立法国的欧洲霸权，建造凡尔赛宫",
            "彼得大帝 / 俄罗斯帝国 / 1682–1725年 / 推行全面西化改革，建立波罗的海霸权，营建圣彼得堡",
            "腓特烈大帝 / 普鲁士王国 / 1740–1786年 / 卓越的军事天才，确立普鲁士的欧洲大国地位",
            "叶卡捷琳娜二世 / 俄罗斯帝国 / 1762–1796年 / 扩张黑海出海口，瓜分波兰，将俄罗斯推向鼎盛",
            "拿破仑一世 / 法兰西第一帝国 / 1804–1814年 / 颁布《拿破仑法典》，凭借军事才能横扫欧洲大陆",
            "维多利亚女王 / 大英帝国 / 1837–1901年 / 缔造“日不落帝国”的极盛巅峰，开创维多利亚时代"
        ];

        const container = document.getElementById('timeline-container');

        kingsData.forEach(item => {
            const parts = item.split(' / ');
            if (parts.length === 4) {
                const name = parts[0];
                const dynasty = parts[1];
                const time = parts[2];
                const achieve = parts[3];

                // 彻底去掉了第4个多余的斜杠，并在第3个斜杠加了控制显隐的 class
                const html = `
                    <div class="king-row">
                        <div class="part col-name">${name}</div><div class="slash">/</div>
                        <div class="part col-dynasty">${dynasty}</div><div class="slash">/</div>
                        <div class="part col-time">${time}</div><div class="slash hide-on-mobile">/</div>
                        <div class="part col-achieve">${achieve}</div>
                    </div>
                `;
                container.innerHTML += html;
            }
        });
    </script>
</body>
</html>
