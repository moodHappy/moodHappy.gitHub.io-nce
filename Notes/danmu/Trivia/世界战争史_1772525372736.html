<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0b1120">
    <title>世界战争史全景长卷</title>
    <style>
        /* 极简星空背景与全局排版 */
        body {
            font-family: "STKaiti", "KaiTi", "BiauKai", "楷体", "SimSun", "宋体", serif;
            line-height: 1.6;
            color: #cbd5e1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 15px;
            background-color: #0b1120; 
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" opacity="0.02"><circle cx="300" cy="300" r="250" stroke="%23ffffff" stroke-width="2" fill="none"/><line x1="50" y1="300" x2="550" y2="300" stroke="%23ffffff" stroke-width="1"/><line x1="300" y1="50" x2="300" y2="550" stroke="%23ffffff" stroke-width="1"/><text x="130" y="320" font-family="楷体" font-size="80" transform="rotate(-15)" font-weight="bold" fill="%23ffffff">铁血长歌</text></svg>');
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            color: #ef4444; 
            font-size: 26px; 
            margin-bottom: 5px;
            letter-spacing: 5px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
            font-weight: bold;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            font-size: 12px;
            margin-bottom: 25px;
            border-bottom: 1px solid #1e3a8a;
            padding-bottom: 15px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .controls {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .toggle-btn {
            background-color: #0f172a;
            border: 1px solid #334155;
            color: #cbd5e1;
            padding: 6px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px; 
            font-weight: bold;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        .toggle-btn:hover {
            background-color: #1e3a8a; 
            border-color: #3b82f6;
            color: #fbbf24;
            box-shadow: 0 0 15px rgba(30, 58, 138, 0.6);
        }

        /* 折叠面板整体样式 */
        details {
            margin-bottom: 20px;
            background: #0f172a;
            border-radius: 6px;
            border: 1px solid #1e293b;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        summary {
            padding: 15px 20px;
            cursor: pointer;
            font-size: 16px; 
            font-weight: bold;
            color: #93c5fd;
            background: #0f172a;
            border-left: 4px solid #ef4444; 
            list-style: none;
            position: relative;
            letter-spacing: 2px;
            transition: background 0.2s ease;
            white-space: nowrap; 
        }

        summary::-webkit-details-marker {
            display: none;
        }

        summary:hover {
            background: #1e293b;
            color: #fbbf24;
        }

        summary::after {
            content: "▼";
            position: absolute;
            right: 20px;
            font-size: 12px;
            color: #64748b;
            transition: transform 0.3s ease;
        }

        details[open] summary::after {
            transform: rotate(180deg);
        }

        details[open] summary {
            border-bottom: 1px solid #1e293b;
            background: rgba(0, 0, 0, 0.2);
        }

        .details-content {
            width: 100%;
            overflow-x: auto; 
            box-sizing: border-box;
        }

        /* PC端：原生表格严格对齐 */
        table {
            width: 100%;
            min-width: 900px;
            border-collapse: collapse;
            text-align: left;
            table-layout: auto; 
            box-sizing: border-box;
        }

        thead {
            background-color: #1e293b;
            border-bottom: 2px solid #ef4444;
        }

        th {
            padding: 15px 20px;
            color: #f1f5f9;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            white-space: nowrap; 
        }

        td {
            padding: 14px 20px;
            border-bottom: 1px solid #1e293b;
            transition: background-color 0.2s ease;
            vertical-align: top;
        }

        tbody tr:hover {
            background-color: rgba(239, 68, 68, 0.05); 
        }

        .col-battle {
            color: #fbbf24;
            font-weight: bold;
            font-size: 15px;
            white-space: nowrap; 
        }

        .col-sides {
            color: #93c5fd;
            font-size: 14px;
            white-space: nowrap; 
        }

        .col-time {
            color: #a7f3d0;
            font-size: 13px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            white-space: nowrap; 
        }

        .col-result {
            color: #94a3b8;
            font-size: 14px;
            line-height: 1.6;
        }

        .decisive {
            border-left: 3px solid #ef4444; 
        }

        .details-content::-webkit-scrollbar { height: 6px; }
        .details-content::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 3px; }

        /* ★★★ 移动端适配：悬挂缩进完美对齐 ★★★ */
        @media (max-width: 800px) {
            .details-content {
                overflow-x: hidden; 
            }

            table { 
                min-width: 0 !important; 
            }

            table, thead, tbody, th, td, tr { 
                display: block; 
                width: 100%; 
                box-sizing: border-box; 
            }
            
            thead { display: none; }
            
            tr { 
                margin-bottom: 0; 
                border-bottom: 6px solid #0b1120; 
                padding: 15px; 
                position: relative;
                width: 100%; 
            }
            
            tr.decisive {
                border-left: none;
                border-top: 2px solid #ef4444; 
            }

            td { 
                display: flex; 
                align-items: flex-start; 
                padding: 6px 0; 
                border: none; 
                white-space: normal; 
                width: 100%;
            }

            td::before {
                content: attr(data-label);
                flex-shrink: 0; 
                width: 45px; 
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                font-weight: bold;
                color: #475569;
                font-size: 13px;
                margin-right: 5px;
            }

            .col-battle { 
                display: block; 
                font-size: 18px; 
                border-bottom: 1px dashed #334155; 
                padding-bottom: 10px; 
                margin-bottom: 5px; 
                color: #fbbf24; 
            }
            .col-battle::before { display: none; } 

            .col-sides, .col-result { font-size: 14px; color: #cbd5e1; flex-grow: 1; word-break: break-word; }
            .col-time { font-size: 13px; color: #a7f3d0; flex-grow: 1; word-break: break-word; }
        }
    </style>
</head>

                    "约克镇围城战 | 美法联军 vs 英国军队 | 1781年 | 英军统帅康华里投降，标志着美国独立战争的决定性胜利"

            },
            {
                title: "工业时代",

                    "葛底斯堡战役 | 美国联邦军(北) vs 邦联军(南) | 1863年 | 北军惨烈获胜，挡住南方北进势头，成为美国南北战争的最关键转折点",

                    "阿杜瓦战役 | 埃塞俄比亚帝国 vs 意大利王国 | 1896年 | 非洲国家首次在正面战场全歼欧洲列强主力，保住了埃塞独立地位",
                    "马尼拉湾海战(美西战争) | 美国亚洲舰队 vs 西班牙太平洋舰队 | 1898年 | 美军全歼西班牙舰队，标志着西班牙帝国彻底衰落与美国全球霸权的崛起",

                    "凡尔登战役(一战) | 法国 vs 德国 | 1916年 | 历时十个月的消耗战，法国惨胜，被称为一战中最残酷的“绞肉机”",
                    "索姆河战役(一战) | 英法联军 vs 德国 | 1916年 | 坦克首次投入实战，双方伤亡超百万，是一战中最血腥的阵地战",
                    "日德兰海战(一战) | 英国皇家海军 vs 德国大洋舰队 | 1916年 | 史上最大规模战列舰对决，英国虽损失惨重但成功维持了海上封锁线",
                    "不列颠战役(二战) | 英国皇家空军 vs 德国空军 | 1940年 | 史上最大规模空战，英国粉碎了德国的制空权夺取企图，免于被直接入侵",

                    "珍珠港事件(二战) | 大日本帝国 vs 美国 | 1941年 | 日军偷袭美国太平洋舰队基地，太平洋战争爆发，美国正式卷入二战",
                    "中途岛海战(二战) | 美国太平洋舰队 vs 日本联合舰队 | 1942年 | 美军密码破译建功，击沉日军四艘主力航母，扭转太平洋局势",
                    "斯大林格勒战役(二战) | 苏联 vs 纳粹德国 | 1942–1943年 | 苏军全歼德军精锐第六集团军，成为二战欧洲战场乃至全局的根本转折点",
                    "阿拉曼战役(二战) | 盟军(英/自治领) vs 德意联军 | 1942年 | 蒙哥马利击败隆美尔，彻底肃清了轴心国在北非的威胁",
                    "库尔斯克会战(二战) | 苏联 vs 纳粹德国 | 1943年 | 史上最大规模坦克大决战，德军精锐装甲部队遭重创，彻底丧失东线战略主动权",

                    "莱特湾海战(二战) | 美国海军 vs 日本联合舰队 | 1944年 | 人类历史上参战吨位最大的海战，日本海军主力被彻底摧毁，丧失制海权",
                    "柏林战役(二战) | 苏联 vs 纳粹德国 | 1945年 | 苏军攻克柏林，希特勒自杀，纳粹德国无条件投降",
                    "仁川登陆(朝鲜战争) | 联合国军(美/韩) vs 朝鲜人民军 | 1950年 | 麦克阿瑟指挥的极具冒险性的两栖登陆，成功切断朝军后路，扭转朝鲜战争战局",
                    "奠边府战役(第一次印支战争) | 越南独立同盟会 vs 法国 | 1954年 | 越盟取得决定性胜利，直接导致法国彻底结束对中南半岛的殖民统治"
                ]
            }
        ];

        const container = document.getElementById('content');

        // 生成折叠面板和表格
        erasData.forEach((era, index) => {
            const isOpen = index === 0 ? 'open' : '';
            
            let html = `
            <details class="era-details" ${isOpen}>
                <summary>${era.title}</summary>
                <div class="details-content">
                    <table>
                        <thead>
                            <tr>
                                <th>战争/战役</th>
                                <th>交战双方</th>
                                <th>发生时间</th>
                                <th>战役结果与历史影响</th>
                            </tr>
                        </thead>
                        <tbody>
            `;
            
            era.battles.forEach(item => {
                const parts = item.split(' | ');
                if (parts.length === 4) {
                    const [battle, sides, time, result] = parts;
                    // 给所有带决战性质的字眼加上红色左边框高亮
                    const isDecisive = result.includes('转折') || result.includes('覆灭') || result.includes('终结') || result.includes('灭亡') || result.includes('粉碎');
                    const decisiveClass = isDecisive ? 'decisive' : '';

                    html += `
                        <tr class="${decisiveClass}">
                            <td class="col-battle" data-label="战役">${battle}</td>
                            <td class="col-sides" data-label="双方："><span>${sides}</span></td>
                            <td class="col-time" data-label="时间："><span>${time}</span></td>
                            <td class="col-result" data-label="结果："><span>${result}</span></td>
                        </tr>
                    `;
                }
            });

            html += `
                        </tbody>
                    </table>
                </div>
            </details>
            `;
            
            container.innerHTML += html;
        });

        // 展开/收拢按钮逻辑
        const toggleBtn = document.getElementById('toggleBtn');
        let isAllExpanded = false;

        toggleBtn.addEventListener('click', () => {
            isAllExpanded = !isAllExpanded;
            const allDetails = document.querySelectorAll('.era-details');
            
            allDetails.forEach(details => {
                if (isAllExpanded) {
                    details.setAttribute('open', '');
                } else {
                    details.removeAttribute('open');
                }
            });
            
            toggleBtn.textContent = isAllExpanded ? '收拢所有长卷' : '展开所有长卷';
        });
    </script>
</body>
</html>
