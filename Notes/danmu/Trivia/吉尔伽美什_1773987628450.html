<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f4f1ea">
    <title>吉尔伽美什神话与人物图鉴</title>
    <style>
        /* 基础古风/美索不达米亚排版 */
        body {
            font-family: "STKaiti", "KaiTi", "BiauKai", "楷体", "SimSun", "宋体", serif;
            line-height: 1.6;
            color: #382c21; 
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f4f1ea; /* 泥板陶土底色 */
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" opacity="0.03"><text x="0" y="150" font-family="楷体" font-size="28" transform="rotate(-30)">吉尔伽美什</text></svg>');
        }

        h1 {
            text-align: center;
            color: #153e5c; /* 青金石蓝 */
            font-size: 26px; 
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
            border-bottom: 2px solid #c29b47; /* 青铜鎏金 */
            padding-bottom: 20px;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .search-box {
            width: 100%;
            max-width: 260px;
            padding: 8px 12px;
            border: none;
            border-bottom: 2px solid #bba388;
            background: transparent;
            font-family: inherit;
            font-size: 16px;
            color: #382c21;
            outline: none;
            transition: border-color 0.3s;
            text-align: center;
        }

        .search-box:focus {
            border-bottom-color: #153e5c;
        }

        .search-box::placeholder {
            color: #a89a8c;
            font-size: 15px;
            letter-spacing: 1px;
        }

        .toggle-btn {
            background-color: transparent;
            border: 1px solid #153e5c;
            color: #153e5c;
            padding: 7px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .toggle-btn:hover {
            background-color: #153e5c;
            color: #f4f1ea;
            box-shadow: 0 2px 6px rgba(21, 62, 92, 0.2);
        }

        .main-category {
            background: #fbf9f4;
            border: 1px solid #d1c5b8;
            border-radius: 4px;
            padding: 15px; 
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
            transition: opacity 0.3s;
        }

        .main-category h2 {
            border-bottom: 1px dashed #c29b47;
            padding-bottom: 12px;
            color: #153e5c;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 18px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        details {
            margin-bottom: 15px;
            background: #f5f0e6;
            border-radius: 4px;
            border: 1px solid #dbcfc1;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        summary {
            padding: 12px 15px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            color: #4a3c2e;
            background: #ebdcc8;
            border-left: 4px solid #153e5c;
            list-style: none;
            position: relative;
            transition: background 0.2s ease;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        summary::-webkit-details-marker {
            display: none;
        }

        summary:hover {
            background: #e0ccb1;
        }

        summary::after {
            content: "▼";
            position: absolute;
            right: 15px;
            font-size: 12px;
            color: #7a6a5a;
            transition: transform 0.3s ease;
        }

        details[open] summary::after {
            transform: rotate(180deg);
        }

        .details-content {
            padding: 15px;
            background-color: #fbf9f4;
        }

        .grid-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 10px; 
            padding: 0;
            margin: 0;
            list-style: none;
        }

        .grid-list li {
            transition: opacity 0.3s ease;
            min-width: 0; 
        }

        .grid-list li a {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px 4px; 
            background-color: transparent;
            border: 1px solid #d1c5b8;
            color: #382c21;
            text-decoration: none;
            border-radius: 4px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            height: 100%;
            position: relative;
            overflow: hidden;
            z-index: 1;
            width: 100%;
            box-sizing: border-box;
        }

        .grid-list li a::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #153e5c;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .grid-list li a:hover {
            border-color: #153e5c;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(21, 62, 92, 0.2);
        }

        .grid-list li a:hover::before {
            opacity: 1;
        }

        .grid-list li a:hover .name,
        .grid-list li a:hover .subtitle {
            color: #f4f1ea;
        }

        .grid-list li a:hover .name.famous {
            color: #f0c365; 
            text-shadow: 0px 0px 6px rgba(240, 195, 101, 0.6);
        }

        .subtitle {
            font-size: 10px; 
            color: #7a6a5a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin-bottom: 4px;
            transition: color 0.3s ease;
            white-space: nowrap; 
            overflow: hidden;
            text-overflow: ellipsis; 
            width: 100%; 
            text-align: center;
            letter-spacing: -0.5px; 
        }

        .name {
            font-size: 14px; 
            font-weight: 600;
            letter-spacing: 0px; 
            transition: color 0.3s ease, text-shadow 0.3s ease;
            white-space: nowrap; 
            overflow: hidden;
            text-overflow: ellipsis; 
            width: 100%;
            text-align: center;
        }

        .name.famous {
            color: #b58a2d; /* 青铜暗金 */
            text-shadow: 0px 1px 1px rgba(181, 138, 45, 0.2);
        }

        .count-tag {
            font-size: 13px;
            font-weight: normal;
            color: #7a6a5a;
        }
    </style>
</head>
<body>

    <h1>《吉尔伽美什史诗》神话图鉴</h1>

    <div class="controls">
        <input type="text" id="searchInput" class="search-box" placeholder="寻觅乌鲁克双雄与众神...">
        <button id="toggleBtn" class="toggle-btn">展开泥板</button>
    </div>

    <div id="content"></div>

    <script>
        // 核心知名人物/神话元素
        const famousEntities = [
            "吉尔伽美什", "恩奇都", "伊什塔尔", "乌塔那匹兹姆", 
            "胡姆巴巴", "天牛", "安努", "恩利尔"
        ];

        const data = [
            {
                category: "一、 乌鲁克的双雄",
                subCats: [
                    {
                        title: "1. 核心主角",
                        items: ["吉尔伽美什|三分之二为神，三分之一为人的乌鲁克之王", "恩奇都|由泥土捏成、与野兽为伍的荒野莽汉"]
                    },
                    {
                        title: "2. 凡人与向导",
                        items: ["宁孙|吉尔伽美什的母亲，全知的母牛女神", "萨玛特|引诱并教化恩奇都的神庙女祭司", "猎人|在水边发现恩奇都的凡人"]
                    }
                ]
            },
            {
                category: "二、 苏美尔神系与天界",
                subCats: [
                    {
                        title: "1. 乌鲁克主要神明",
                        items: ["安努|天神，众神之父", "伊什塔尔|爱与战争的女神，求爱被拒后降下灾难", "恩利尔|风暴与大地之神，降下大洪水的主使", "沙马什|太阳神，庇护吉尔伽美什的守护神"]
                    },
                    {
                        title: "2. 冥界与创造者",
                        items: ["埃亚|智慧与深渊之神，暗中拯救了人类", "阿鲁鲁|受众神之托创造恩奇都的母神", "埃列什基伽勒|统治幽暗冥界的女王"]
                    }
                ]
            },
            {
                category: "三、 史诗魔物与试炼",
                subCats: [
                    {
                        title: "1. 恐怖的强敌",
                        items: ["胡姆巴巴|恩利尔指派守护雪松林的恐怖巨兽", "天牛|伊什塔尔为报复而降下的引发旱灾的神兽", "蝎人|看守马舒神山大门、目光致命的生物"]
                    },
                    {
                        title: "2. 奇境与难关",
                        items: ["雪松林|诸神的居所，胡姆巴巴的领地", "马舒神山|太阳升起与落下之处的双子山", "死亡之海|环绕世界尽头、触之即死的致命水域"]
                    }
                ]
            },
            {
                category: "四、 永生之旅",
                subCats: [
                    {
                        title: "1. 大洪水的幸存者",
                        items: ["乌塔那匹兹姆|唯一获得永生的人类，远古的智者", "乌塔那匹兹姆之妻|与丈夫一同获得永生的女人"]
                    },
                    {
                        title: "2. 追寻与失落之物",
                        items: ["乌尔沙纳比|驾驶渡船穿越死亡之海的摆渡人", "青春草|藏于深水底、能让人返老还童的植物", "蛇|偷吃青春草并蜕皮重生的动物", "石篙|吉尔伽美什砍伐用来撑过死亡之海的石柱"]
                    }
                ]
            }
        ];

        const container = document.getElementById('content');

        data.forEach(main => {
            let html = `<div class="main-category"><h2>${main.category}</h2>`;
            main.subCats.forEach(sub => {
                html += `
                <details>
                    <summary>${sub.title} <span class="count-tag">(${sub.items.length}个)</span></summary>
                    <div class="details-content">
                        <ul class="grid-list">
                `;
                sub.items.forEach(item => {
                    const [name, subtitle] = item.split('|');
                    const searchName = name; 

                    const isFamous = famousEntities.includes(name);
                    const nameClass = isFamous ? "name famous" : "name";

                    // 搜索链接修改为吉尔伽美什相关
                    html += `
                        <li class="item-li">
                            <a href="https://www.google.com/search?tbm=isch&q=吉尔伽美什史诗+${searchName}" target="_blank" rel="noopener noreferrer" title="${subtitle} - ${name}">
                                <div class="subtitle">${subtitle}</div>
                                <div class="${nameClass}">${name}</div>
                            </a>
                        </li>
                    `;
                });
                html += `</ul></div></details>`;
            });
            html += `</div>`;
            container.innerHTML += html;
        });

        const toggleBtn = document.getElementById('toggleBtn');
        let isExpanded = false;

        toggleBtn.addEventListener('click', () => {
            isExpanded = !isExpanded;
            const allDetails = document.querySelectorAll('details');
            allDetails.forEach(details => {
                if (details.style.display !== 'none') {
                    if (isExpanded) {
                        details.setAttribute('open', '');
                    } else {
                        details.removeAttribute('open');
                    }
                }
            });
            toggleBtn.textContent = isExpanded ? '收起泥板' : '展开泥板';
        });

        const searchInput = document.getElementById('searchInput');

        searchInput.addEventListener('input', function(e) {
            const term = e.target.value.trim();
            const allMainCategories = document.querySelectorAll('.main-category');

            allMainCategories.forEach(mainCat => {
                let mainHasMatch = false;
                const detailsElements = mainCat.querySelectorAll('details');

                detailsElements.forEach(details => {
                    let detailsHasMatch = false;
                    const items = details.querySelectorAll('.item-li');

                    items.forEach(li => {
                        const text = li.textContent;
                        if (text.includes(term)) {
                            li.style.display = '';
                            detailsHasMatch = true;
                        } else {
                            li.style.display = 'none';
                        }
                    });

                    if (detailsHasMatch) {
                        details.style.display = '';
                        mainHasMatch = true;
                        if (term !== '') {
                            details.setAttribute('open', '');
                        } else {
                            if (!isExpanded) details.removeAttribute('open');
                        }
                    } else {
                        details.style.display = 'none';
                    }
                });

                mainCat.style.display = mainHasMatch ? '' : 'none';
            });
        });
    </script>
</body>
</html>
