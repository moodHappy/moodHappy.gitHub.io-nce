<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f6f4ec">
    <title>一千零一夜人物与传说图鉴</title>
    <style>
        /* 基础古风/异域排版 */
        body {
            font-family: "STKaiti", "KaiTi", "BiauKai", "楷体", "SimSun", "宋体", serif;
            line-height: 1.6;
            color: #2b2219; 
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f6f4ec; 
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" opacity="0.03"><text x="10" y="150" font-family="楷体" font-size="32" transform="rotate(-30)">一千零一夜</text></svg>');
        }

        h1 {
            text-align: center;
            color: #19204b; /* 暗夜星空蓝 */
            font-size: 26px; 
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
            border-bottom: 2px solid #d4af37; /* 沙漠鎏金 */
            padding-bottom: 20px;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .search-box {
            width: 100%;
            max-width: 260px;
            padding: 8px 12px;
            border: none;
            border-bottom: 2px solid #c4ad98;
            background: transparent;
            font-family: inherit;
            font-size: 16px;
            color: #2b2219;
            outline: none;
            transition: border-color 0.3s;
            text-align: center;
        }

        .search-box:focus {
            border-bottom-color: #19204b;
        }

        .search-box::placeholder {
            color: #bfaea0;
            font-size: 15px;
            letter-spacing: 1px;
        }

        .toggle-btn {
            background-color: transparent;
            border: 1px solid #19204b;
            color: #19204b;
            padding: 7px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .toggle-btn:hover {
            background-color: #19204b;
            color: #f6f4ec;
            box-shadow: 0 2px 6px rgba(25, 32, 75, 0.2);
        }

        .main-category {
            background: #fffdf7;
            border: 1px solid #d5c4b3;
            border-radius: 4px;
            padding: 15px; 
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
            transition: opacity 0.3s;
        }

        .main-category h2 {
            border-bottom: 1px dashed #d4af37;
            padding-bottom: 12px;
            color: #19204b;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 18px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        details {
            margin-bottom: 15px;
            background: #fbf8f1;
            border-radius: 4px;
            border: 1px solid #e2d7c8;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        summary {
            padding: 12px 15px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            color: #3e3226;
            background: #f1e9d8;
            border-left: 4px solid #19204b;
            list-style: none;
            position: relative;
            transition: background 0.2s ease;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        summary::-webkit-details-marker {
            display: none;
        }

        summary:hover {
            background: #e6dac3;
        }

        summary::after {
            content: "▼";
            position: absolute;
            right: 15px;
            font-size: 12px;
            color: #8c7a6b;
            transition: transform 0.3s ease;
        }

        details[open] summary::after {
            transform: rotate(180deg);
        }

        .details-content {
            padding: 15px;
            background-color: #fffdf7;
        }

        .grid-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 10px; 
            padding: 0;
            margin: 0;
            list-style: none;
        }

        .grid-list li {
            transition: opacity 0.3s ease;
            min-width: 0; 
        }

        .grid-list li a {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px 4px; 
            background-color: transparent;
            border: 1px solid #d5c4b3;
            color: #2b2219;
            text-decoration: none;
            border-radius: 4px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            height: 100%;
            position: relative;
            overflow: hidden;
            z-index: 1;
            width: 100%;
            box-sizing: border-box;
        }

        .grid-list li a::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #19204b;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .grid-list li a:hover {
            border-color: #19204b;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(25, 32, 75, 0.2);
        }

        .grid-list li a:hover::before {
            opacity: 1;
        }

        .grid-list li a:hover .name,
        .grid-list li a:hover .subtitle {
            color: #f6f4ec;
        }

        .grid-list li a:hover .name.famous {
            color: #ffd700; 
            text-shadow: 0px 0px 6px rgba(255, 215, 0, 0.6);
        }

        .subtitle {
            font-size: 10px; 
            color: #8c7a6b;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin-bottom: 4px;
            transition: color 0.3s ease;
            white-space: nowrap; 
            overflow: hidden;
            text-overflow: ellipsis; 
            width: 100%; 
            text-align: center;
            letter-spacing: -0.5px; 
        }

        .name {
            font-size: 14px; 
            font-weight: 600;
            letter-spacing: 0px; 
            transition: color 0.3s ease, text-shadow 0.3s ease;
            white-space: nowrap; 
            overflow: hidden;
            text-overflow: ellipsis; 
            width: 100%;
            text-align: center;
        }

        .name.famous {
            color: #d4af37; /* 沙漠金 */
            text-shadow: 0px 1px 1px rgba(212, 175, 55, 0.2);
        }

        .count-tag {
            font-size: 13px;
            font-weight: normal;
            color: #8c7a6b;
        }
    </style>
</head>
<body>

    <h1>《一千零一夜》人物传说图鉴</h1>

    <div class="controls">
        <input type="text" id="searchInput" class="search-box" placeholder="寻觅国王与精灵 (搜汉字)">
        <button id="toggleBtn" class="toggle-btn">展开卷轴</button>
    </div>

    <div id="content"></div>

    <script>
        // 核心知名人物
        const famousEntities = [
            "山鲁亚尔", "山鲁佐德", "阿拉丁", "阿里巴巴", "辛巴达", 
            "神灯精灵", "玛吉亚娜", "哈伦·拉希德", "飞毯", "芝麻开门"
        ];

        const data = [
            {
                category: "一、 核心框架篇 (讲故事的人)",
                subCats: [
                    {
                        title: "1. 暴君与智慧王后",
                        items: ["山鲁亚尔|因遭背叛而杀戮的波斯国王", "山鲁佐德|讲一千零一夜故事的宰相之女", "顿亚佐德|山鲁佐德的妹妹/听众", "国王宰相|山鲁佐德之父", "沙宰曼|山鲁亚尔的弟弟/鞑靼国王"]
                    }
                ]
            },
            {
                category: "二、 阿拉丁与神灯篇",
                subCats: [
                    {
                        title: "1. 主要人物",
                        items: ["阿拉丁|好运的中国穷小子", "巴德尔·布多尔|美丽的公主", "非洲魔法师|企图夺取神灯的恶棍", "苏丹|公主的父亲", "阿拉丁之母|贫苦的寡妇"]
                    },
                    {
                        title: "2. 精灵与法宝",
                        items: ["神灯精灵|法力无边的灯中巨灵", "戒指精灵|较弱但忠诚的戒中精灵", "神灯|可召唤精灵的旧铜灯", "魔法戒指|魔法师给阿拉丁的护身符"]
                    }
                ]
            },
            {
                category: "三、 阿里巴巴与四十大盗篇",
                subCats: [
                    {
                        title: "1. 人物与英雄",
                        items: ["阿里巴巴|发现强盗宝库的穷樵夫", "玛吉亚娜|机智勇敢的女仆", "戈西母|贪婪被杀的哥哥", "戈西母之妻|发现借升子秘密的妇人", "强盗头子|狡诈的客商假扮者", "穆斯塔法|眼盲的老缝皮匠"]
                    },
                    {
                        title: "2. 关键线索与物品",
                        items: ["芝麻开门|打开宝库的秘语", "大麦开门|戈西母情急喊错的口令", "白粉笔|强盗在门上做的记号", "热油篓|玛吉亚娜烫死强盗的工具", "藏宝山洞|装满金银财宝的秘境"]
                    }
                ]
            },
            {
                category: "四、 航海家辛巴达篇",
                subCats: [
                    {
                        title: "1. 两位辛巴达",
                        items: ["航海家辛巴达|历经七次航海的富商", "搬运工辛巴达|贫穷但知足的苦力"]
                    },
                    {
                        title: "2. 七次航海的奇遇与怪物",
                        items: ["巨鲸海岛|被误认为小岛的巨大海怪", "大鹏鸟|体型巨大的神鸟(鲁克鸟)", "钻石谷|满是毒蛇与钻石的深谷", "独眼巨人|吃人的黑巨怪", "海马|海中神奇的骏马", "海神老人|骑在人脖子上吸血的老妖", "象牙林|大象聚集的坟场"]
                    }
                ]
            },
            {
                category: "五、 魔法、异兽与神明篇",
                subCats: [
                    {
                        title: "1. 阿拉伯神话生物",
                        items: ["伊夫里特|强大且危险的火精灵", "巨灵 (Jinn)|由无烟之火造的精灵", "食尸鬼|荒野吃人的食尸魔女", "人鱼|海底王国的子民"]
                    },
                    {
                        title: "2. 奇妙法宝",
                        items: ["乌木马|扭动木针即可飞天的机器马", "飞天魔毯|侯赛因王子买到的飞行毯", "全知苹果|能治愈百病的仙苹果", "预言象牙管|阿里王子能看千里的管子", "所罗门铜瓶|封印魔鬼的容器"]
                    }
                ]
            },
            {
                category: "六、 其他经典市井传说篇",
                subCats: [
                    {
                        title: "1. 巴格达的夜巡",
                        items: ["哈伦·拉希德|喜欢微服私访的哈里发", "贾法尔|忠诚的宰相", "麦斯鲁尔|哈里发的刽子手护卫", "盲人阿卜杜拉|请求别人打自己的盲人"]
                    },
                    {
                        title: "2. 奇幻爱情与冒险",
                        items: ["卡玛尔·扎曼|与公主梦中相会的王子", "白都伦公主|绝美的中国公主", "渔夫与魔鬼|智斗瓶中魔鬼的老渔夫", "巴索拉银匠|经历奇遇的工匠", "白马王子|骑着乌木马救人的王子"]
                    }
                ]
            }
        ];

        const container = document.getElementById('content');

        data.forEach(main => {
            let html = `<div class="main-category"><h2>${main.category}</h2>`;
            main.subCats.forEach(sub => {
                html += `
                <details>
                    <summary>${sub.title} <span class="count-tag">(${sub.items.length}个)</span></summary>
                    <div class="details-content">
                        <ul class="grid-list">
                `;
                sub.items.forEach(item => {
                    const [name, subtitle] = item.split('|');
                    const searchName = name; 

                    const isFamous = famousEntities.includes(name);
                    const nameClass = isFamous ? "name famous" : "name";

                    // 搜索链接修改为一千零一夜相关
                    html += `
                        <li class="item-li">
                            <a href="https://www.google.com/search?tbm=isch&q=一千零一夜+${searchName}" target="_blank" rel="noopener noreferrer" title="${subtitle} - ${name}">
                                <div class="subtitle">${subtitle}</div>
                                <div class="${nameClass}">${name}</div>
                            </a>
                        </li>
                    `;
                });
                html += `</ul></div></details>`;
            });
            html += `</div>`;
            container.innerHTML += html;
        });

        const toggleBtn = document.getElementById('toggleBtn');
        let isExpanded = false;

        toggleBtn.addEventListener('click', () => {
            isExpanded = !isExpanded;
            const allDetails = document.querySelectorAll('details');
            allDetails.forEach(details => {
                if (details.style.display !== 'none') {
                    if (isExpanded) {
                        details.setAttribute('open', '');
                    } else {
                        details.removeAttribute('open');
                    }
                }
            });
            toggleBtn.textContent = isExpanded ? '收起卷轴' : '展开卷轴';
        });

        const searchInput = document.getElementById('searchInput');

        searchInput.addEventListener('input', function(e) {
            const term = e.target.value.trim();
            const allMainCategories = document.querySelectorAll('.main-category');

            allMainCategories.forEach(mainCat => {
                let mainHasMatch = false;
                const detailsElements = mainCat.querySelectorAll('details');

                detailsElements.forEach(details => {
                    let detailsHasMatch = false;
                    const items = details.querySelectorAll('.item-li');

                    items.forEach(li => {
                        const text = li.textContent;
                        if (text.includes(term)) {
                            li.style.display = '';
                            detailsHasMatch = true;
                        } else {
                            li.style.display = 'none';
                        }
                    });

                    if (detailsHasMatch) {
                        details.style.display = '';
                        mainHasMatch = true;
                        if (term !== '') {
                            details.setAttribute('open', '');
                        } else {
                            if (!isExpanded) details.removeAttribute('open');
                        }
                    } else {
                        details.style.display = 'none';
                    }
                });

                mainCat.style.display = mainHasMatch ? '' : 'none';
            });
        });
    </script>
</body>
</html>
