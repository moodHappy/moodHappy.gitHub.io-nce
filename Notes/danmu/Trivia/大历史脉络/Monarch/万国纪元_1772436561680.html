            font-weight: bold;

            color: #fbbf24;

            border-radius: 6px;
            padding: 12px 15px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);

            padding-bottom: 8px;
            color: #93c5fd; 
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 16px; 
            letter-spacing: 2px;
            font-weight: bold;
            text-align: center;
        }

        details {
            margin-bottom: 10px;
            background: #1e293b;
            border-radius: 4px;
            border: 1px solid #334155;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        summary {
            padding: 9px 12px;
            cursor: pointer;
            font-size: 12px; 
            font-weight: bold;
            color: #e2e8f0;
            background: #0f172a;
            border-left: 4px solid #3b82f6; 
            list-style: none;
            position: relative;
            transition: background 0.2s ease;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            white-space: nowrap; /* 年代行誓死不折行 */
        }

        summary::-webkit-details-marker {
            display: none;
        }

        summary:hover {
            background: #1e293b;
            color: #fbbf24;
        }

        summary::after {
            content: "▼";
            position: absolute;
            right: 12px;
            font-size: 10px;
            color: #64748b;
            transition: transform 0.3s ease;
        }

        details[open] summary::after {
            transform: rotate(180deg);
        }

        .details-content {
            padding: 12px;
            background-color: #0f172a;
        }

        .grid-list {
            display: grid;
            /* 165px宽阵列，全面兼容世界上名字最长的人 */
            grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
            gap: 8px;
            padding: 0;
            margin: 0;
            list-style: none;
        }

        .grid-list li {
            width: 100%;
            transition: transform 0.2s ease, box-shadow 0.2s ease;

            justify-content: center;
            align-items: center;
            padding: 8px 6px;
            background-color: #1e293b;
            border: 1px solid #334155;
            color: #94a3b8; 
            text-decoration: none;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .grid-list li a::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #1e3a8a; 
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

            border-color: #3b82f6;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
        }

        .grid-list li a:hover::before {

        }

            color: #fbbf24;

                <details>
                    <summary>${sub.title} <span class="count-tag">(${sub.items.length}位)</span></summary>
                    <div class="details-content">
                        <ul class="grid-list">
                `;
                sub.items.forEach(item => {
                    const parts = item.split('|');
                    const name = parts[0];
                    const isV1 = parts[1] === 'v1' ? 'is-v1' : ''; 
                    const searchName = name.replace(/[()]/g, ' ').trim(); 

                    html += `
                        <li class="${isV1}">
                            <a href="https://www.google.com/search?q=世界历史+${searchName}" target="_blank" rel="noopener noreferrer">
                                <div class="name">${name}</div>
                            </a>
                        </li>
                    `;
                });
                html += `</ul></div></details>`;
            });
            html += `</div>`;
            container.innerHTML += html;
        });

        const toggleBtn = document.getElementById('toggleBtn');
        let isExpanded = false;

        toggleBtn.addEventListener('click', () => {
            isExpanded = !isExpanded;
            const allDetails = document.querySelectorAll('details');
            allDetails.forEach(details => {
                if (details.style.display !== 'none') {
                    if (isExpanded) {
                        details.setAttribute('open', '');
                    } else {
                        details.removeAttribute('open');
                    }
                }
            });
            toggleBtn.textContent = isExpanded ? '收拢星图' : '展开星图';
        });

        const searchInput = document.getElementById('searchInput');

        searchInput.addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase().trim();
            const allMainCategories = document.querySelectorAll('.main-category');

            allMainCategories.forEach(mainCat => {
                let mainHasMatch = false;
                const detailsElements = mainCat.querySelectorAll('details');

                detailsElements.forEach(details => {
                    let detailsHasMatch = false;
                    const items = details.querySelectorAll('.grid-list li');

                    items.forEach(li => {
                        const text = li.textContent.toLowerCase();
                        if (text.includes(term)) {
                            li.style.display = '';
                            detailsHasMatch = true;
                        } else {
                            li.style.display = 'none';
                        }
                    });

                    if (detailsHasMatch) {
                        details.style.display = '';
                        mainHasMatch = true;
                        if (term !== '') {
                            details.setAttribute('open', '');
                        } else {
                            if (!isExpanded) details.removeAttribute('open');
                        }
                    } else {
                        details.style.display = 'none';
                    }
                });

                mainCat.style.display = mainHasMatch ? '' : 'none';
            });
        });
