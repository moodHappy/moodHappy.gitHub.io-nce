            text-align: center;

            margin-bottom: 15px;

            border-bottom: 2px solid #3a1414;
            padding-bottom: 15px;
            font-weight: bold;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

            width: 100%;

            background: rgba(255, 255, 255, 0.02);
            font-family: inherit;
            font-size: 14px; 
            color: #f2e2c4;
            outline: none;
            transition: all 0.3s;
            text-align: center;
            border-radius: 4px 4px 0 0;
        }

        .search-box:focus {
            border-bottom-color: #d4af37;
            background: rgba(255, 255, 255, 0.05);
        }

        .search-box::placeholder {
            color: #665a4c;

        }

            color: #d8c8b8;
            padding: 7px 18px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px; 
            font-weight: bold;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

            background-color: #3a1414;
            border-color: #8c2020;
            color: #d4af37;

            margin-bottom: 30px;

            transition: opacity 0.3s;
        }

            border-bottom: 1px solid #33281b;
            padding-bottom: 12px;
            color: #c4a460;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 19px; 
            letter-spacing: 3px;
            font-weight: bold;
        }

        details {
            margin-bottom: 15px;
            background: #222222;
            border-radius: 4px;
            border: 1px solid #333333;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        summary {
            padding: 12px 18px;
            cursor: pointer;
            font-size: 15px; 
            font-weight: bold;
            color: #bfaea0;
            background: #262626;
            border-left: 4px solid #8c2020;
            list-style: none;
            position: relative;
            transition: background 0.2s ease;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        summary::-webkit-details-marker {
            display: none;
        }

        summary:hover {
            background: #2d2d2d;
            color: #d4af37;
        }

        summary::after {
            content: "▼";
            position: absolute;
            right: 18px;
            font-size: 11px;
            color: #666;
            transition: transform 0.3s ease;
        }

        details[open] summary::after {
            transform: rotate(180deg);
        }

        .details-content {
            padding: 18px;
            background-color: #1e1e1e;
        }

        .grid-list {
            display: grid;
            /* 网格宽度保持 140px 以容纳长名字 */
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
            padding: 0;
            margin: 0;
            list-style: none;
        }

        .grid-list li {
            transition: opacity 0.3s ease;
            width: 100%;
        }

        .grid-list li a {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px 4px;
            background-color: #222;
            border: 1px solid #3a3a3a;
            color: #a89a8c;
            text-decoration: none;
            border-radius: 4px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            height: 100%;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .grid-list li a::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #4a0e0e;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .grid-list li a:hover {
            border-color: #8c2020;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.6);
        }

        .grid-list li a:hover::before {
            opacity: 1;
        }

        .grid-list li a:hover .name {
            color: #f2d588;
            text-shadow: 0 0 5px rgba(242, 213, 136, 0.4);
        }

            color: #cfa87a;
        }

            font-size: 9.5px;

            font-size: 12.5px; 
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            /* 强制不换行 */
            white-space: nowrap; 
        }

            font-size: 12px;
            font-weight: normal;
            color: #665a4c;
        }

                        details.setAttribute('open', '');
                    } else {
                        details.removeAttribute('open');
                    }
                }
            });
            toggleBtn.textContent = isExpanded ? '收拢纪元' : '展开纪元';
        });

        const searchInput = document.getElementById('searchInput');

        searchInput.addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase().trim();
            const allMainCategories = document.querySelectorAll('.main-category');

            allMainCategories.forEach(mainCat => {
                let mainHasMatch = false;
                const detailsElements = mainCat.querySelectorAll('details');

                detailsElements.forEach(details => {
                    let detailsHasMatch = false;
                    const items = details.querySelectorAll('.item-li');

                    items.forEach(li => {
                        const text = li.textContent.toLowerCase();
                        if (text.includes(term)) {
                            li.style.display = '';
                            detailsHasMatch = true;
                        } else {
                            li.style.display = 'none';
                        }
                    });

                    if (detailsHasMatch) {
                        details.style.display = '';
                        mainHasMatch = true;
                        if (term !== '') {
                            details.setAttribute('open', '');
                        } else {
                            if (!isExpanded) details.removeAttribute('open');
                        }
                    } else {
                        details.style.display = 'none';
                    }
                });

                mainCat.style.display = mainHasMatch ? '' : 'none';
            });
        });
