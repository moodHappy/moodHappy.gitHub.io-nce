    <script>
        const dataStore = {
            'victoria': { 
                name: '维多利亚女王 (Queen Victoria)', 
                subtitle: '个子娇小却笼罩全球的“欧洲祖母”', 
                content: '<p>她身高不到 1 米 5，登基时才 18 岁，是个被极度严苛的《肯辛顿体系》培养出来的小女孩。但她上台第一件事，就是把极其控制狂的母亲和那帮顾问全部踢开，展现了极其硬核的独立人格。</p><p>她是英国历史上第一位真正意义上的<strong>立宪君主</strong>。在她的时代，大英帝国完成了工业革命，领土扩张到了全球的四分之一（号称日不落帝国）。但她骨子里是个极度传统的女人，她讨厌女权主义，疯狂地爱着丈夫。丈夫死后，她直接罢工了好几年，常年穿着丧服躲在温莎城堡里。直到晚年，通过两次隆重的登基周年庆典（金禧和钻石禧），她才再次被英国老百姓奉为至高无上的帝国神明。</p>' 
            },
            'albert': { 
                name: '阿尔伯特亲王 (Prince Albert)', 
                subtitle: '被累死的完美老公，女王眼中的上帝', 
                content: '<p>阿尔伯特是维多利亚的德国表哥，长得极其帅气，是个学霸兼工作狂。刚结婚时，英国议会和老百姓极其看不起这个“德国穷亲戚”，连政治文件都不让他看。但他靠着惊人的才华和耐心，逐渐成了女王身边真正的“无冕之王”。</p><p>他主导了万国博览会，改革了英国大学，甚至在临死前还在病榻上修改对美国的外交信件，成功避免了英国卷入美国南北战争。1861 年，年仅 42 岁的阿尔伯特因伤寒（或克罗恩病）活活累死。维多利亚在日记里崩溃地写道：<strong>“世界对我来说，已经结束了。”</strong>她要求宫里的仆人每天必须把阿尔伯特的衣服放在床上，每天在他的脸盆里倒上热水，这套恐怖的仪式整整维持了四十年，直到她自己去世。</p>' 
            },
            'melbourne': { 
                name: '墨尔本子爵 (Lord Melbourne)', 
                subtitle: '18岁女王的“教父”与白月光', 
                content: '<p>在维多利亚刚登基、孤独无助的时候，这位快 60 岁的花花公子首相成了她的政治导师和精神生父。墨尔本风趣幽默、极其宠溺年轻的女王，每天花好几个小时陪她聊天，教她怎么对付那帮狡猾的英国贵族。</p><p>年轻的女王对他产生了极度的依赖，甚至到了言听计从的地步（史称“女床寝室危机”，女王为了保住墨尔本的内阁，甚至拒绝更换身边的女官，直接把新首相气跑了）。直到阿尔伯特亲王介入后，墨尔本才得体地退出了女王的核心生活圈。</p>' 
            },
            'brown': { 
                name: '约翰·布朗 (John Brown)', 
                subtitle: '让大英帝国颜面扫地的“男仆绯闻”', 
                content: '<p>在阿尔伯特死后，女王陷入了长达数年的极度抑郁，连议会都不去了。这时，一个粗鲁、酗酒但极其忠诚的苏格兰高地男仆——约翰·布朗，走进了她的生活。</p><p>布朗是全英国唯一敢不把她当女王看、甚至敢对她大吼大叫的人。这种奇特的“主仆关系”让女王感到极大的安全感。两人形影不离，导致伦敦街头到处流传着女王已经秘密下嫁给男仆的丑闻，议员们甚至在背后嘲笑她为<strong>“布朗夫人” (Mrs. Brown)</strong>。虽然历史学家倾向于认为他们只是极其深厚的灵魂伴侣，但这绝对是维多利亚晚年最大的皇家八卦。</p>' 
            },
            'royal_kids': { 
                name: '欧洲王室联姻网', 
                subtitle: '一顶王冠和一颗致命的基因炸弹', 
                content: '<p>维多利亚和阿尔伯特生了 9 个孩子。维多利亚极其聪明地把这些孩子全部嫁入或娶了欧洲各大王室（德国、俄国、希腊、西班牙等）。一战爆发前，欧洲几大帝国的皇帝全都是她的孙子（比如德国皇帝威廉二世、沙皇尼古拉二世的老婆）。</p><p>但要命的是，维多利亚本人是极其罕见的<strong>血友病（Hemophilia，一种凝血障碍疾病）</strong>基因携带者。这种“皇家病”通过她的女儿和孙女，像盲盒一样传遍了欧洲皇室。最惨的就是俄罗斯末代沙皇，为了给患血友病的皇太子治病，竟然轻信了神棍“妖僧”拉斯普京，直接加速了俄罗斯帝国的覆灭。</p>' 
            },
            'pms': { 
                name: '迪斯雷利 vs 格莱斯顿', 
                subtitle: '女王最爱的马屁精与最讨厌的说教狂', 
                content: '<p>维多利亚晚年有两个极其著名的首相死对头。保守党的**迪斯雷利**是个犹太裔天才，极其擅长拍马屁，他把女王哄得极其开心，甚至帮女王搞到了“印度女皇”的头衔，女王爱他爱得不行。</p><p>而自由党的**格莱斯顿**是个极其严肃的改革派，每次见女王都像是在下议院发表演讲，疯狂给女王上课。维多利亚极其厌恶他，曾抱怨说：<strong>“他总是用看公众集会的眼神看我！”</strong>女王极其罕见地打破了中立原则，在私下里疯狂拉偏架，支持迪斯雷利打压格莱斯顿。</p>' 
            },

            /* 事件库 */
            'exhibition': { 
                name: '水晶宫：万国博览会 (1851年)', 
                subtitle: '日不落帝国最巅峰的凡尔赛', 
                content: '<p><strong>【核心事件】</strong><br>由阿尔伯特亲王亲自顶住所有嘲讽和压力主导筹办的博览会。在伦敦海德公园，用钢铁和巨大玻璃建起了一座宛如神迹的“水晶宫”。里面展出了来自全球各地的十万件展品，从巨型蒸汽机到印度超级钻石（光之山）。</p><p><strong>【深远影响】</strong><br>这是全人类历史上第一次“世博会”。它不仅赚得盆满钵满，更向全世界极其傲慢地宣告：<strong>大英帝国不仅是世界的工厂，更是文明的最高主宰。</strong>这极大地满足了维多利亚的虚荣心，也是阿尔伯特一生中最辉煌的顶点。</p>' 
            },
            'mourning': { 
                name: '漫长的温莎黑寡妇 (1861年起)', 
                subtitle: '用极度悲伤绑架国家的君主', 
                content: '<p><strong>【核心事件】</strong><br>阿尔伯特死后，维多利亚陷入了近乎病态的哀悼中。她不仅自己穿了几十年黑衣服，还强迫宫廷里的女官常年戴孝。她拒绝出席很多重要的公众活动和议会开幕式，导致英国老百姓对她极度不满，共和主义思想甚至一度抬头。</p><p><strong>【深远影响】</strong><br>这种长期的“退居幕后”，反而在客观上促成了英国议会和首相权力的进一步扩大。到了她晚年，大英帝国已经完全成熟为一套不怎么需要君主干预也能完美运转的官僚机器了。她成了国家统一和帝国荣耀的纯粹“精神图腾”。</p>' 
            },
            'india': { 
                name: '加冕“印度女皇” (1876年)', 
                subtitle: '填补虚荣心的终极头衔', 
                content: '<p><strong>【核心事件】</strong><br>因为维多利亚的大女儿嫁给了德国皇储，将来会成为“皇后”（Empress），而维多利亚只是个“女王”（Queen）。极度要强的维多利亚无法忍受自己女儿的头衔比自己高，于是她的贴心小棉袄首相（迪斯雷利）立刻让议会通过了《皇家头衔法》。</p><p><strong>【深远影响】</strong><br>维多利亚正式加冕为<strong>“印度女皇”（Empress of India）</strong>，大英帝国的逼格达到了绝对的巅峰。到了晚年，她甚至雇佣了一个叫阿卜杜勒·卡里姆的印度男仆（Munshi）教她乌尔都语，对他宠信有加，这再次引发了英国贵族圈的集体抓狂和宫廷地震。</p>' 
            }
        };

        function showInfo(id) {
            const data = dataStore[id];
            if (data) {

                document.getElementById('modalSubtitle').innerText = data.subtitle;
                document.getElementById('modalContent').innerHTML = data.content;
                document.getElementById('infoModal').classList.add('active');
            }
        }

            document.getElementById('infoModal').classList.remove('active');
