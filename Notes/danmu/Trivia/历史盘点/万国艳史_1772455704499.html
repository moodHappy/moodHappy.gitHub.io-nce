<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2d0a0a">
    <title>世界历代艳情人物·万国风月档案</title>
    <style>
        /* 绯红月夜·终极防折行排版 */
        body {
            font-family: "STKaiti", "KaiTi", "BiauKai", "楷体", "SimSun", "宋体", serif;
            line-height: 1.5;
            color: #fecaca;
            max-width: 1350px; 
            margin: 0 auto;
            padding: 15px;
            background-color: #1a0505; 
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" opacity="0.03"><circle cx="300" cy="300" r="250" stroke="%23ff0000" stroke-width="2" fill="none"/><text x="130" y="320" font-family="楷体" font-size="80" transform="rotate(-15)" font-weight="bold" fill="%23ff0000">万国风月</text></svg>');
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            color: #f87171;
            font-size: 20px; /* 缩小基础字号防止挤压 */
            margin-bottom: 5px;
            letter-spacing: 3px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
            font-weight: bold;
            /* 铁壁1：主标题绝不换行 */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 11px;
            margin-bottom: 25px;
            border-bottom: 1px solid #7f1d1d;
            padding-bottom: 15px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            /* 副标题允许折行以保证说明完整，但微调边距 */
            padding-left: 5px;
            padding-right: 5px;
        }

        .subtitle span {
            color: #f87171;
            font-weight: bold;
            padding: 0 2px;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .search-box {
            width: 100%;
            max-width: 320px;
            padding: 7px 15px;
            border: none;
            border-bottom: 2px solid #450a0a;
            background: rgba(255, 255, 255, 0.03);
            font-family: inherit;
            font-size: 12px; 
            color: #f1f5f9;
            outline: none;
            transition: all 0.3s;
            text-align: center;
            border-radius: 4px 4px 0 0;
        }

        .search-box:focus {
            border-bottom-color: #f87171;
            background: rgba(255, 255, 255, 0.06);
        }

        .toggle-btn {
            background-color: #450a0a;
            border: 1px solid #7f1d1d;
            color: #fecaca;
            padding: 6px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px; 
            font-weight: bold;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .toggle-btn:hover {
            background-color: #7f1d1d; 
            border-color: #f87171;
            color: #fff;
            box-shadow: 0 0 15px rgba(127, 29, 29, 0.6);
        }

        .main-category {
            background: #2d0a0a;
            border: 1px solid #450a0a;
            border-radius: 6px;
            padding: 12px 15px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        }

        .main-category h2 {
            border-bottom: 1px dashed #7f1d1d;
            padding-bottom: 8px;
            color: #f87171; 
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 14px; /* 缩小基础字号 */
            letter-spacing: 1px;
            font-weight: bold;
            text-align: center;
            /* 铁壁2：大类标题绝不换行，超出显示省略号 */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        details {
            margin-bottom: 10px;
            background: #450a0a;
            border-radius: 4px;
            border: 1px solid #7f1d1d;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        summary {
            /* 右侧留出25px空间，防止文字覆盖箭头 */
            padding: 9px 25px 9px 12px; 
            cursor: pointer;
            font-size: 11px; 
            font-weight: bold;
            color: #fecaca;
            background: #2d0a0a;
            border-left: 4px solid #f87171; 
            list-style: none;
            position: relative;
            /* 铁壁3：子分类标题绝不换行 */
            white-space: nowrap; 
            overflow: hidden;
            text-overflow: ellipsis;
        }

        summary::-webkit-details-marker { display: none; }

        summary::after {
            content: "▼";
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%); /* 绝对垂直居中 */
            font-size: 9px;
            color: #94a3b8;
        }

        .details-content {
            padding: 12px;
            background-color: #1a0505;
        }

        .grid-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 8px;
            padding: 0;
            margin: 0;
            list-style: none;
        }

        .grid-list li a {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px 6px;
            background-color: #2d0a0a;
            border: 1px solid #450a0a;
            color: #fecaca; 
            text-decoration: none;
            border-radius: 4px;
        }

        .grid-list li a:hover {
            border-color: #f87171;
            background-color: #7f1d1d;
        }

        .is-v1 a {
            border-color: #f87171; 
            background-color: rgba(248, 113, 113, 0.1); 
        }
        .is-v1 .name {
            color: #fca5a5; 
            font-weight: bold;
        }

        .name {
            font-size: 11px;
            text-align: center;
            /* 铁壁4：人物卡片内绝不换行 */
            white-space: nowrap; 
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        .count-tag {
            font-size: 10px;
            font-weight: normal;
            color: #94a3b8;
            margin-left: 4px;
        }

        /* 移动端媒体查询：在小屏幕上进一步优化 */
        @media (max-width: 480px) {
            h1 {
                font-size: 18px;
                letter-spacing: 2px;
            }
            .main-category h2 {
                font-size: 13px;
                letter-spacing: 0px;
            }
        }
    </style>
</head>
<body>

    <h1>《万国艳史》世界风月传奇档案库</h1>
    <div class="subtitle">汇集世界王室秘闻及坊间传奇中的 <span>风月人物</span>。带有 <span>👑</span> 的为该时代名噪一时者。</div>

    <div class="controls">
        <input type="text" id="searchInput" class="search-box" placeholder="检索名流 (如：克娄巴特拉)">
        <button id="toggleBtn" class="toggle-btn">展开卷轴</button>
    </div>

    <div id="content"></div>

    <script>
        // 文案精简瘦身，去除冗长描述，确保手机端一目了然
        const data = [
            {
                category: "一、 古希腊罗马与神话 (古典情欲与艳史)",
                subCats: [
                    {
                        title: "1. 希腊神话 (情欲与战争)",
                        items: ["海伦与帕里斯(倾国引发特洛伊战)|v1", "宙斯与众多凡人(化身白牛金雨)|", "俄耳甫斯与欧律狄刻(阴阳相隔)|", "阿佛洛狄忒与阿瑞斯(爱神出轨)|", "美狄亚与伊阿宋(爱之极至生恨)|v1"]
                    },
                    {
                        title: "2. 罗马宫闱 (荒淫与绝对权力)",
                        items: ["克娄巴特拉与安东尼(绝命鸳鸯)|v1", "克娄巴特拉与凯撒(尼罗河征服)|v1", "尼禄与斯波鲁斯(阉割男宠立后)|v1", "哈德良与安提诺乌斯(断袖之恸)|v1", "卡利古拉与德鲁西拉(暴君畸恋)|", "梅萨林娜与众男(荒淫帝后)|v1"]
                    },
                    {
                        title: "3. 希腊化先哲轶事",
                        items: ["亚历山大大帝与赫费斯提翁|v1", "苏格拉底与阿尔西比亚德斯|", "伯里克利与阿斯帕西娅(雅典情妇)|"]
                    }
                ]
            },
            {
                category: "二、 中世纪与文艺复兴 (骑士绝恋与权欲)",
                subCats: [
                    {
                        title: "1. 骑士时代与悲恋",
                        items: ["桂妮维亚与兰斯洛特(圆桌绿帽)|v1", "阿贝拉尔与爱洛依丝(惨遭阉割)|v1", "崔斯坦与伊索尔德(中世纪绝恋)|v1", "埃莉诺与亨利二世(相爱相杀)|"]
                    },
                    {
                        title: "2. 文艺复兴 (教廷与家族秘闻)",
                        items: ["切萨雷与卢克雷齐娅(乱伦传闻)|v1", "教皇亚历山大六世与朱莉娅|", "拉斐尔与玛格丽塔(画中缪斯)|"]
                    },
                    {
                        title: "3. 都铎血色罗曼史",
                        items: ["亨利八世与安妮·博林(创国教)|v1", "玛丽女王与博斯韦尔伯爵|v1", "伊丽莎白一世与罗伯特(秘恋)|", "爱德华二世与皮尔斯(同性惨剧)|v1"]
                    }
                ]
            },
            {
                category: "三、 伊斯兰与东方古国 (绝世后宫与宠妃)",
                subCats: [
                    {
                        title: "1. 奥斯曼后宫 (苏丹与女奴)",
                        items: ["苏莱曼大帝与许蕾姆苏丹|v1", "艾哈迈德一世与柯塞姆苏丹|", "易卜拉欣一世与后宫佳丽|"]
                    },
                    {
                        title: "2. 莫卧儿帝国 (极致奢华绝恋)",
                        items: ["沙贾汗与慕塔芝(泰姬陵诞生)|v1", "贾汉吉尔与努尔·贾汉(寡妇掌权)|v1", "巴吉·拉奥与玛斯塔妮(跨教悲恋)|v1"]
                    },
                    {
                        title: "3. 幕府与战国大奥",
                        items: ["丰臣秀吉与淀殿(茶茶悲剧)|v1", "德川家光与春日局(大奥渊源)|", "阿部定与石田吉藏(昭和猎奇)|v1"]
                    }
                ]
            },
            {
                category: "四、 近代欧洲与启蒙时代 (首席情妇与风流)",
                subCats: [
                    {
                        title: "1. 波旁宫廷 (情妇干政)",
                        items: ["路易十四与蒙特斯潘侯爵夫人|v1", "路易十四与曼特农夫人(无冕王后)|", "路易十五与蓬帕杜夫人(洛可可)|v1", "路易十五与杜巴利伯爵夫人|v1"]
                    },
                    {
                        title: "2. 沙皇宫闱 (女皇与男宠)",
                        items: ["叶卡捷琳娜大帝与波将金|v1", "叶卡捷琳娜与格里高利(政变情人)|", "彼得大帝与安娜·蒙斯|"]
                    },
                    {
                        title: "3. 启蒙情圣与作家",
                        items: ["卡萨诺瓦与欧洲名媛(第一情圣)|v1", "萨德侯爵与受害者(SM滥觞)|v1", "玛丽王后与菲尔逊伯爵(异国私情)|v1", "伏尔泰与艾米莉(灵魂伴侣)|"]
                    }
                ]
            },
            {
                category: "五、 十九世纪浪漫时代 (文人畸恋与悲歌)",
                subCats: [
                    {
                        title: "1. 文豪病态罗曼史",
                        items: ["拜伦勋爵与卡罗林·兰姆(及畸恋)|v1", "乔治·桑与肖邦(倾世畸恋)|v1", "王尔德与波西(唯美主义牢狱灾)|v1", "雨果与朱丽叶(五十年地下情)|"]
                    },
                    {
                        title: "2. 王室绯闻与惨案",
                        items: ["拿破仑与约瑟芬(战神卑微情书)|v1", "路德维希一世与萝拉(舞女祸国)|v1", "王储鲁道夫与玛丽(梅耶林殉情)|v1", "维多利亚女王与约翰·布朗|"]
                    },
                    {
                        title: "3. 世纪交替风月交响",
                        items: ["瓦格纳与科西玛(背叛友谊的乱伦)|", "克林姆特与艾米丽(黄金画作缪斯)|", "罗丹与卡蜜儿(被毁灭的女雕塑家)|v1"]
                    }
                ]
            },
            {
                category: "六、 二十世纪现代风月 (退位、名流与谍战)",
                subCats: [
                    {
                        title: "1. 倾国王室与绯闻",
                        items: ["爱德华八世与辛普森夫人(退位)|v1", "尼古拉二世与拉斯普京(秽乱传闻)|v1", "肯尼迪与梦露(白宫生日歌秘闻)|v1", "查尔斯、戴安娜与卡米拉(三角恋)|v1"]
                    },
                    {
                        title: "2. 谍战玫瑰与拉美狂恋",
                        items: ["玛塔·哈丽与协约国军官(女间谍)|v1", "弗里达与迭戈(拉美相爱相杀)|v1", "胡安·庇隆与贝隆夫人(神雕侠侣)|", "香奈儿与纳粹军官(暗黑情史)|"]
                    },
                    {
                        title: "3. 好莱坞与文艺巨星",
                        items: ["理查德·伯顿与伊丽莎白·泰勒|v1", "约翰·列侬与小野洋子(床上运动)|v1", "达利与加拉(偏执缪斯)|", "阿瑟·米勒与玛丽莲·梦露|"]
                    }
                ]
            }
        ];

        const container = document.getElementById('content');

        data.forEach(main => {
            let html = `<div class="main-category"><h2>${main.category}</h2>`;
            main.subCats.forEach(sub => {
                html += `
                <details>
                    <summary>${sub.title} <span class="count-tag">(${sub.items.length}组)</span></summary>
                    <div class="details-content">
                        <ul class="grid-list">
                `;
                sub.items.forEach(item => {
                    const parts = item.split('|');
                    const name = parts[0];
                    const isV1 = parts[1] === 'v1' ? 'is-v1' : ''; 
                    const icon = parts[1] === 'v1' ? '👑 ' : '';
                    
                    const searchName = name.replace(/与/g, '+').replace(/、/g, '+').replace(/\(.*\)/g, '').trim(); 

                    html += `
                        <li class="${isV1}">
                            <a href="https://www.google.com/search?q=世界历史+${searchName}+风流韵事+传奇" target="_blank" rel="noopener noreferrer">
                                <div class="name" title="${name}">${icon}${name}</div>
                            </a>
                        </li>
                    `;
                });
                html += `</ul></div></details>`;
            });
            html += `</div>`;
            container.innerHTML += html;
        });

        const toggleBtn = document.getElementById('toggleBtn');
        let isExpanded = false;

        toggleBtn.addEventListener('click', () => {
            isExpanded = !isExpanded;
            const allDetails = document.querySelectorAll('details');
            allDetails.forEach(details => {
                details.toggleAttribute('open', isExpanded);
            });
            toggleBtn.textContent = isExpanded ? '合上卷轴' : '展开卷轴';
        });

        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase().trim();
            document.querySelectorAll('.main-category').forEach(mainCat => {
                let mainHasMatch = false;
                mainCat.querySelectorAll('details').forEach(details => {
                    let detailsHasMatch = false;
                    details.querySelectorAll('.grid-list li').forEach(li => {
                        const hasMatch = li.textContent.toLowerCase().includes(term);
                        li.style.display = hasMatch ? '' : 'none';
                        if (hasMatch) detailsHasMatch = true;
                    });
                    details.style.display = detailsHasMatch ? '' : 'none';
                    if (detailsHasMatch) {
                        mainHasMatch = true;
                        if (term !== '') details.setAttribute('open', '');
                    }
                });
                mainCat.style.display = mainHasMatch ? '' : 'none';
            });
        });
    </script>
</body>
</html>
