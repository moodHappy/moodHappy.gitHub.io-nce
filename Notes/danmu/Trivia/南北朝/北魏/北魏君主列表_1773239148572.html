<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北魏君主列表</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f4f7f6;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        details {
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }
        details[open] {
            border-color: #3498db;
            box-shadow: 0 4px 8px rgba(52, 152, 219, 0.2);
            padding-bottom: 15px;
        }
        summary {
            font-weight: bold;
            font-size: 1.2em;
            cursor: pointer;
            outline: none;
            color: #2c3e50;
            padding: 5px 0;
        }
        summary:hover {
            color: #3498db;
        }
        /* 判词（副标题）常驻外显样式 */
        .pan-ci {
            display: block; 
            font-size: 0.75em; 
            font-weight: normal; 
            color: #7f8c8d;
            margin-top: 6px;
            margin-left: 24px;
            font-style: italic;
        }
        ol {
            margin-top: 15px;
            margin-bottom: 5px;
            padding-left: 25px;
        }
        li {
            margin-bottom: 8px;
            font-size: 1.05em;
        }
        .note {
            color: #7f8c8d;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

    <h1>北魏君主列表</h1>

    <details open>
        <summary>
            1. 北魏（386–534）
            <span class="pan-ci">鲜卑入主中原，孝文汉化融合。</span>
        </summary>
        <ol>
            <li>拓跋珪</li>
            <li>拓跋嗣</li>
            <li>拓跋焘</li>
            <li>拓跋余</li>
            <li>拓跋濬</li>
            <li>拓跋弘</li>
            <li>元宏 <span class="note">（孝文帝改姓）</span></li>
            <li>元恪</li>
            <li>元诩</li>
            <li>元姑娘 <span class="note">（女婴）</span></li>
            <li>元子攸</li>
            <li>元晔</li>
            <li>元恭</li>
            <li>元朗</li>
            <li>元修</li>
        </ol>
    </details>

</body>
</html>
