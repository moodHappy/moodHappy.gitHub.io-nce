<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1050, user-scalable=yes">
    <title>刘宋皇室秘史：禁忌深渊与禽兽图鉴</title>
    <style>
        body {
            background-color: #f8f9fa; 
            margin: 0;
            padding: 30px 0 80px 0; 
            font-family: "PingFang SC", "Microsoft YaHei", serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-title {
            text-align: center;
            color: #2c1a1a;
            margin: 10px 0 10px 0;
            font-size: 34px;
            letter-spacing: 2px;
            font-weight: bold;
            border-bottom: 2px solid #c62828;
            padding-bottom: 10px;
        }
        
        .sub-title {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .family-tree {
            position: relative;
            width: 1000px;
            height: 600px; 
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.06);
            border: 1px solid #e0e0e0;
            overflow: hidden;
        }

        /* 纯净的人物卡片 */
        .person {
            position: absolute;
            transform: translate(-50%, -50%);
            border: 1px solid #d0d0d0; 
            background-color: #ffffff; 
            text-align: center;
            padding: 12px 16px;
            line-height: 1.6;
            font-size: 15px;
            z-index: 10;
            letter-spacing: 1px;
            min-width: 70px;
            border-radius: 6px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            cursor: pointer; 
            transition: all 0.2s ease; 
        }

        .person:hover {
            transform: translate(-50%, -52%); 
            box-shadow: 0 8px 20px rgba(198, 40, 40, 0.2);
            border-color: #c62828;
        }

        /* 基础线条：血缘与夫妻 */
        .line-solid-h { position: absolute; background-color: #aaa; z-index: 1; height: 2px; }
        .line-solid-v { position: absolute; background-color: #aaa; z-index: 1; width: 2px; }
        
        /* 畸恋/乱伦/出轨/残杀 红色虚线/实线 */
        .line-scandal-h { position: absolute; border-top: 2px dashed #c62828; z-index: 1; height: 0; }
        .line-scandal-v { position: absolute; border-left: 2px dashed #c62828; z-index: 1; width: 0; }
        .line-kill-v { position: absolute; background-color: #c62828; z-index: 1; width: 2px; }
        .line-kill-h { position: absolute; background-color: #c62828; z-index: 1; height: 2px; }

        /* 关系标签 */
        .label {
            position: absolute;
            transform: translate(-50%, -50%);
            background-color: #fff;
            border: 1px solid #ccc;
            font-size: 12px;
            color: #555;
            padding: 2px 6px;
            z-index: 5;
            border-radius: 12px;
            white-space: nowrap;
        }
        
        .label-scandal {
            color: #c62828;
            font-weight: bold;
            border-color: #ffcdd2;
            background-color: #fff0f0;
            z-index: 6;
        }

        /* 颜色分类 */
        .c-emperor { color: #111; font-weight: bold; } 
        .c-consort { color: #880e4f; font-weight: bold; } 
        .c-dark { color: #777; font-size: 12px;} 

        /* ================= 护眼大字弹窗 ================= */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0, 0, 0, 0.6); 
            backdrop-filter: blur(4px); display: flex; justify-content: center; z-index: 1000;
            opacity: 0; visibility: hidden; transition: opacity 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-box {
            position: absolute; top: 0; bottom: 80px; width: 100%;
            background-color: #fff; border-radius: 0 0 16px 16px; box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            display: flex; flex-direction: column; transform: translateY(-20px); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal-overlay.active .modal-box { transform: translateY(0); }
        .modal-header { padding: 30px 30px 20px 30px; border-bottom: 1px solid #eee; position: relative; }
        .modal-close { position: absolute; top: 25px; right: 30px; font-size: 54px; color: #999; cursor: pointer; line-height: 1; font-weight: 300; }
        .modal-close:hover { color: #c62828; }
        .modal-title { margin: 0 0 10px 0; font-size: 36px; color: #111; font-weight: bold; }
        .modal-subtitle { font-size: 20px; color: #880e4f; font-weight: 500; display: block; }
        .modal-content { padding: 20px 30px 40px 30px; flex: 1; overflow-y: auto; font-size: 54px; color: #333; line-height: 1.8; text-align: justify; }
        .modal-content::-webkit-scrollbar { width: 8px; }
        .modal-content::-webkit-scrollbar-track { background: #f1f1f1; }
        .modal-content::-webkit-scrollbar-thumb { background: #b0b0b0; border-radius: 4px; }
        .modal-content p { margin-top: 0; margin-bottom: 20px; }
        .modal-content strong { color: #c62828; }
        .ending-box { background-color: #fff0f0; border-left: 6px solid #c62828; padding: 15px; margin-top: 25px; font-size: 22px; color: #444;}
        .ending-title { font-weight: bold; color: #c62828; margin-bottom: 8px; display: block;}
    </style>
</head>
<body>

    <h1 class="main-title">刘宋皇室秘史：禁忌深渊与禽兽图鉴</h1>
    <div class="sub-title">点击卡片查看南朝疯人院档案。红色虚线：乱伦/私通；红色实线：虐杀/反杀</div>

    <div class="family-tree">
        <div class="line-solid-h" style="left: 150px; top: 120px; width: 200px;"></div>
        <div class="label" style="left: 250px; top: 120px;">结发夫妻</div>

        <div class="line-solid-h" style="left: 650px; top: 120px; width: 200px;"></div>
        <div class="label" style="left: 750px; top: 120px;">原配夫妻</div>

        <div class="line-solid-v" style="left: 250px; top: 120px; height: 100px;"></div>
        <div class="line-solid-h" style="left: 150px; top: 220px; width: 200px;"></div>
        <div class="line-solid-v" style="left: 150px; top: 220px; height: 130px;"></div> <div class="line-solid-v" style="left: 350px; top: 220px; height: 130px;"></div> <div class="line-scandal-h" style="left: 150px; top: 350px; width: 200px;"></div>
        <div class="label label-scandal" style="left: 250px; top: 350px;">亲姐弟乱伦</div>

        <div class="line-scandal-v" style="left: 150px; top: 350px; height: 150px;"></div>
        <div class="label label-scandal" style="left: 150px; top: 425px;">光明正大养后宫</div>

        <div style="position:absolute; border-left: 2px dashed #c62828; border-top: 2px dashed #c62828; left: 350px; top: 180px; width: 300px; height: 170px; border-radius: 12px 0 0 0; z-index: 1;"></div>
        <div class="line-scandal-v" style="left: 650px; top: 120px; height: 60px;"></div>
        <div class="label label-scandal" style="left: 500px; top: 180px;">强占亲姑姑 / 杀宫女诈死</div>

        <div class="line-kill-h" style="left: 350px; top: 350px; width: 300px;"></div>
        <div class="label label-scandal" style="left: 500px; top: 350px; color: #fff; background-color:#c62828;">圈养为猪 / 叔叔极限反杀</div>

        <div class="line-kill-v" style="left: 380px; top: 350px; height: 90px;"></div>
        <div class="line-kill-h" style="left: 380px; top: 440px; width: 470px;"></div>
        <div class="line-kill-v" style="left: 850px; top: 160px; height: 280px;"></div>
        <div class="label label-scandal" style="left: 615px; top: 440px; color: #fff; background-color:#c62828;">夺人妻子 / 诛杀姑父</div>

        <div class="person" style="left: 150px; top: 120px;" onclick="showInfo('wang')">
            <div class="c-dark">文穆皇后</div>
            <div class="c-consort">王宪嫄</div>
        </div>
        <div class="person" style="left: 350px; top: 120px;" onclick="showInfo('xiaowu')">
            <div class="c-dark">宋孝武帝</div>
            <div class="c-emperor">刘骏</div>
        </div>
        <div class="person" style="left: 650px; top: 120px;" onclick="showInfo('yingmei')">
            <div class="c-dark">新蔡公主 (亲姑姑)</div>
            <div class="c-consort" style="font-size: 16px;">刘英媚</div>
        </div>
        <div class="person" style="left: 850px; top: 120px;" onclick="showInfo('he_mai')">
            <div class="c-dark">驸马都尉 (姑父)</div>
            <div class="c-minister">何迈</div>
        </div>

        <div class="person" style="left: 150px; top: 350px;" onclick="showInfo('chuyu')">
            <div class="c-dark">山阴公主 (亲姐)</div>
            <div class="c-consort" style="font-size: 18px;">刘楚玉</div>
        </div>
        <div class="person" style="left: 350px; top: 350px;" onclick="showInfo('ziye')">
            <div class="c-dark">前废帝 (十六岁恶魔)</div>
            <div class="c-emperor" style="font-size: 18px;">刘子业</div>
        </div>
        <div class="person" style="left: 650px; top: 350px;" onclick="showInfo('liu_yu')">
            <div class="c-dark">湘东王/猪王 (亲叔叔)</div>
            <div class="c-emperor">刘彧 (宋明帝)</div>
        </div>

        <div class="person" style="left: 150px; top: 500px;" onclick="showInfo('mianshou')">
            <div class="c-dark">特供男宠</div>
            <div class="c-minister">三十面首</div>
        </div>
    </div>

    <div class="modal-overlay" id="infoModal" onclick="closeInfo()">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div class="modal-header">
                <div class="modal-close" onclick="closeInfo()">&times;</div>
                <h2 class="modal-title" id="modalTitle">标题</h2>
                <span class="modal-subtitle" id="modalSubtitle">副标题</span>
            </div>
            <div class="modal-content" id="modalContent"></div>
        </div>
    </div>

    <script>
        const dataStore = {
            'wang': { 
                name: '王宪嫄 (文穆皇后)', subtitle: '生出恶魔的绝望母亲', 
                content: '<p>出身顶级门阀琅琊王氏，是刘子业和刘楚玉的亲生母亲。她在临终前，因为思念儿子，派人叫刘子业来见最后一面。结果刘子业冷冷地说：“病人房间里有鬼，我才不去！”</p><p>王太后听后气得浑身发抖，对宫女怒吼：“快拿刀来，我要把我的肚子剖开，看看里面怎么会生出这么个畜生！”</p><div class="ending-box"><span class="ending-title">【最终结局】</span>在极度的愤怒与绝望中病逝。她生出的这对姐弟，将整个南朝宋推向了万劫不复的深渊。</div>' 
            },
            'xiaowu': { 
                name: '刘骏 (宋孝武帝)', subtitle: '开启家族病态基因的源头', 
                content: '<p>刘子业的亲爹。他本人其实颇有才华，但在位后期极其残暴且好色。他不仅屠杀兄弟，还曾为了避暑，在皇宫里建了一座专门用来杀人的“冰室”。</p><p>虽然史书对他的乱伦传闻（甚至说他与生母有染）存在争议，但他极度残暴的性格，完美地遗传给了年幼的儿子刘子业，并在这个儿子身上变异成了纯粹的反人类倾向。</p><div class="ending-box"><span class="ending-title">【最终结局】</span>35岁病逝，留下了年仅15岁的刘子业继承皇位，一场空前绝后的腥风血雨就此展开。</div>' 
            },
            'yingmei': { 
                name: '刘英媚 (新蔡公主)', subtitle: '被侄子强占、上演“狸猫换太子”的姑姑', 
                content: '<p>她是刘子业的亲姑姑（刘骏的同父异母妹妹），容貌绝美，早已嫁给大臣何迈。</p><p>刘子业当皇帝后，有一天把亲姑姑召进宫中，直接强行霸占了她，不准她回家。为了掩人耳目，刘子业竟然毒死了一个宫女，把宫女的尸体装进棺材送到何家，说公主在宫里突发暴病死了，甚至还煞有介事地举行了盛大的国葬！随后，刘子业给她改名换姓叫“谢妃”，堂而皇之地养在后宫。</p><div class="ending-box"><span class="ending-title">【最终结局】</span>在刘子业被暗杀后，刘英媚在史书上离奇失踪。作为这起皇室巨大丑闻的受害者和见证人，她大概率被后续继位的皇帝（宋明帝）秘密处死或在深宫中抑郁而终。</div>' 
            },
            'he_mai': { 
                name: '何迈', subtitle: '被戴绿帽还被骗发丧的憋屈姑父', 
                content: '<p>门阀公子，刘英媚的丈夫。老婆进了一趟宫，抬出来的竟然是一具面目全非的宫女尸体。何迈又不傻，立刻明白老婆被皇帝侄子强占了。</p><p>何迈咽不下这口气，暗中招兵买马，准备发动政变推翻刘子业。</p><div class="ending-box"><span class="ending-title">【最终结局】</span>政变计划提前泄露，刘子业亲自带兵包围了何府，将何迈当场乱箭射死。老婆被侄子抢了，自己还丢了命。</div>' 
            },
            'chuyu': {
                name: '刘楚玉 (山阴公主)', subtitle: '发表惊世骇俗“平权”暴论的荒淫皇姐',
                content: '<p>刘子业的亲姐姐。她最著名的事迹，是跑到皇帝弟弟面前抗议：“我们俩都是同一个父亲生的，凭什么你有上万名妃子，而我却只能有一个驸马？这太不公平了！”</p><p>这种惊世骇俗的言论，竟然得到了心理变态的弟弟的深度认同。于是，刘子业精挑细选了三十个极品美男子（三十面首）赐给姐姐。不仅如此，姐弟俩甚至毫不知耻地在皇宫内同吃同睡，公然发生乱伦关系。</p><div class="ending-box"><span class="ending-title">【最终结局】</span>刘子业被杀后，她的叔叔刘彧（宋明帝）掌权。刘彧以皇太后的名义下诏，指责她“淫秽过度，禽兽不如”，赐其在家中自尽，结束了荒唐的一生。</div>'
            },
            'ziye': { 
                name: '刘子业 (前废帝)', subtitle: '中国历史上最纯粹的十六岁变态恶魔', 
                content: '<p>如果说其他暴君还有政治目的，那他就是纯粹享受变态的快感。他在位仅一年，就完成了：和亲姐乱伦、强暴亲姑姑、杀人取乐等一系列操作。</p><p>最令人发指的是他对待亲叔叔们的方式。他嫌叔叔们长得胖，把他们关进木笼，剥光衣服，其中刘彧最胖，被他赐名为“猪王”。他让人在地上挖个泥坑倒满泔水，逼着这位亲叔叔像猪一样趴在泥坑里用嘴舔食猪食，以此取乐。</p><div class="ending-box"><span class="ending-title">【最终结局】</span>常在河边走哪有不湿鞋。在一次祭祀时，一直隐忍装疯的“猪王”刘彧暗中联络亲信发动兵变，直接一刀将年仅16岁的刘子业斩首。</div>' 
            },
            'liu_yu': {
                name: '刘彧 (宋明帝 / 猪王)', subtitle: '从泥坑里爬出来的极限反杀者',
                content: '<p>他是刘子业的叔叔，因为体态肥胖，被刘子业当成猪圈养，脱光衣服在泥坑里吃泔水。有几次刘子业嫌不好玩，大喊“把这头猪拉出去杀了！”幸亏另一个叔叔（杀王）机智解围：“这猪要等皇上过生日时再杀才吉利。”</p><p>刘彧在极致的屈辱中隐忍，装傻充愣，最终成功买通禁军，一举刺杀了刘子业，登基称帝。</p><div class="ending-box"><span class="ending-title">【最终结局】</span>屠龙者终成恶龙。他当上皇帝后，也许是心理创伤过大，变得比刘子业还要多疑残暴。为了保住皇位，他竟然把自己的兄弟、甚至刘子业的几十个弟弟（自己的亲侄子们）几乎全部杀绝！刘宋王朝的国力被这对叔侄彻底耗尽。</div>'
            },
            'mianshou': {
                name: '三十面首', subtitle: '古代最强后宫男团',
                content: '<p>面首，意思是面貌姣好、头发乌黑的男子，也就是男宠。这三十人是刘子业为了满足姐姐的“平权”要求，从各地搜罗来的顶级帅哥，专门供山阴公主日夜淫乐。</p><p>公主甚至还看上了当时的南朝第一美男子、官员褚渊，逼迫褚渊来府上伺候。褚渊抵死不从，宁死不屈，公主最后觉得没意思才放了他。</p><div class="ending-box"><span class="ending-title">【最终结局】</span>山阴公主被宋明帝刘彧赐死后，这三十个无辜（或不无辜）的男宠，作为皇室巨大丑闻的附庸，被刘彧下令全部处死，一个不留。</div>'
            }
        };

        function showInfo(id) {
            const data = dataStore[id];
            if (data) {
                document.getElementById('modalTitle').innerText = data.name;
                document.getElementById('modalSubtitle').innerText = data.subtitle;
                document.getElementById('modalContent').innerHTML = data.content;
                document.getElementById('infoModal').classList.add('active');
            }
        }

        function closeInfo() {
            document.getElementById('infoModal').classList.remove('active');
        }
    </script>
</body>
</html>
