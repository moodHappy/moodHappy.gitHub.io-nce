<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2d0a0a">
    <title>中国历代艳情人物·传奇断代档案</title>
    <style>
        /* 绯红月夜·压排与护航排版 */
        body {
            font-family: "STKaiti", "KaiTi", "BiauKai", "楷体", "SimSun", "宋体", serif;
            line-height: 1.5;
            color: #fecaca;
            max-width: 1350px; 
            margin: 0 auto;
            padding: 15px;
            background-color: #1a0505; 
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" opacity="0.03"><circle cx="300" cy="300" r="250" stroke="%23ff0000" stroke-width="2" fill="none"/><text x="130" y="320" font-family="楷体" font-size="80" transform="rotate(-15)" font-weight="bold" fill="%23ff0000">风月无边</text></svg>');
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            color: #f87171;
            font-size: 24px; 
            margin-bottom: 5px;
            letter-spacing: 5px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
            font-weight: bold;
        }

        .subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 11px;
            margin-bottom: 25px;
            border-bottom: 1px solid #7f1d1d;
            padding-bottom: 15px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .subtitle span {
            color: #f87171;
            font-weight: bold;
            padding: 0 2px;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .search-box {
            width: 100%;
            max-width: 320px;
            padding: 7px 15px;
            border: none;
            border-bottom: 2px solid #450a0a;
            background: rgba(255, 255, 255, 0.03);
            font-family: inherit;
            font-size: 12px; 
            color: #f1f5f9;
            outline: none;
            transition: all 0.3s;
            text-align: center;
            border-radius: 4px 4px 0 0;
        }

        .search-box:focus {
            border-bottom-color: #f87171;
            background: rgba(255, 255, 255, 0.06);
        }

        .toggle-btn {
            background-color: #450a0a;
            border: 1px solid #7f1d1d;
            color: #fecaca;
            padding: 6px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px; 
            font-weight: bold;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        .toggle-btn:hover {
            background-color: #7f1d1d; 
            border-color: #f87171;
            color: #fff;
            box-shadow: 0 0 15px rgba(127, 29, 29, 0.6);
        }

        .main-category {
            background: #2d0a0a;
            border: 1px solid #450a0a;
            border-radius: 6px;
            padding: 12px 15px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        }

        .main-category h2 {
            border-bottom: 1px dashed #7f1d1d;
            padding-bottom: 8px;
            color: #f87171; 
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 16px; 
            letter-spacing: 2px;
            font-weight: bold;
            text-align: center;
        }

        details {
            margin-bottom: 10px;
            background: #450a0a;
            border-radius: 4px;
            border: 1px solid #7f1d1d;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        summary {
            padding: 9px 12px;
            cursor: pointer;
            font-size: 12px; 
            font-weight: bold;
            color: #fecaca;
            background: #2d0a0a;
            border-left: 4px solid #f87171; 
            list-style: none;
            position: relative;
            white-space: nowrap; 
        }

        summary::-webkit-details-marker { display: none; }

        summary::after {
            content: "▼";
            position: absolute;
            right: 12px;
            font-size: 10px;
            color: #94a3b8;
        }

        .details-content {
            padding: 12px;
            background-color: #1a0505;
        }

        .grid-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 8px;
            padding: 0;
            margin: 0;
            list-style: none;
        }

        .grid-list li a {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px 6px;
            background-color: #2d0a0a;
            border: 1px solid #450a0a;
            color: #fecaca; 
            text-decoration: none;
            border-radius: 4px;
        }

        .grid-list li a:hover {
            border-color: #f87171;
            background-color: #7f1d1d;
        }

        .is-v1 a {
            border-color: #f87171; 
            background-color: rgba(248, 113, 113, 0.1); 
        }
        .is-v1 .name {
            color: #fca5a5; 
            font-weight: bold;
        }

        .name {
            font-size: 11px;
            text-align: center;
            white-space: nowrap; 
        }

        .count-tag {
            font-size: 10px;
            font-weight: normal;
            color: #94a3b8;
            margin-left: 4px;
        }
    </style>
</head>
<body>

    <h1>《风月无边》艳情人物档案库</h1>
    <div class="subtitle">汇集历代史料、笔记小说及传奇轶事中的 <span>风月人物</span>。带有 <span>👑</span> 的为该时期核心传奇或极具争议者。</div>

    <div class="controls">
        <input type="text" id="searchInput" class="search-box" placeholder="搜索人物 (如：西门庆)">
        <button id="toggleBtn" class="toggle-btn">展开卷轴</button>
    </div>

    <div id="content"></div>

    <script>
        const data = [
            {
                category: "一、 先秦·神话、礼教初兴与禁忌",
                subCats: [
                    {
                        title: "1. 远古神话 (情欲滥觞)",
                        items: ["女娲与伏羲(兄妹成婚)|", "瑶姬与楚王(巫山云雨)|v1", "嫦娥与后羿|", "舜与娥皇女英|"]
                    },
                    {
                        title: "2. 春秋禁断 (诸侯乱情)",
                        items: ["文姜与齐襄公(兄妹私通)|v1", "宣姜与公子顽|", "夏姬与陈灵公(杀三夫一君)|v1", "息妫与蔡哀侯(桃花夫人)|", "骊姬与晋献公|v1", "棠姜与齐庄公|"]
                    },
                    {
                        title: "3. 战国传奇 (权色博弈)",
                        items: ["赵姬与嫪毐(车裂之变)|v1", "芈月(宣太后)与义渠王|v1", "魏无忌与如姬|", "郑袖与楚怀王(掩鼻计)|", "龙阳君与魏安釐王(龙阳之好)|v1", "弥子瑕与卫灵公(分桃之爱)|v1"]
                    }
                ]
            },
            {
                category: "二、 秦汉魏晋·宫闱、名士与乐府",
                subCats: [
                    {
                        title: "1. 汉宫秘史 (燕瘦环肥)",
                        items: ["赵飞燕与赵合德|v1", "汉武帝与卫子夫|", "汉武帝与韩嫣(断袖前身)|", "汉成帝与张放|", "汉哀帝与董贤(断袖之癖)|v1", "吕雉与审食其|", "馆陶公主与董偃(绿帽子由来)|v1", "戚夫人与刘邦|"]
                    },
                    {
                        title: "2. 汉乐府与民间传奇",
                        items: ["卓文君与司马相如(当垆卖酒)|v1", "刘兰芝与焦仲卿(孔雀东南飞)|", "罗敷与使君(陌上桑)|", "秋胡之妻(秋胡戏妻)|"]
                    },
                    {
                        title: "3. 魏晋风度 (纵欲、名士与魏晋风骨)",
                        items: ["曹丕与甄宓(洛神赋原型)|v1", "曹植与甄宓(叔嫂传说)|v1", "贾南风与潘安(及太医程据)|v1", "潘安与众妇人(掷果盈车)|", "韩寿与贾午(偷香窃玉)|v1", "桓温与李势女(我见犹怜)|", "荀奉倩与妻子(熨身救妻)|"]
                    }
                ]
            },
            {
                category: "三、 隋唐五代·开放、浪漫与胡风",
                subCats: [
                    {
                        title: "1. 帝王绝恋 (伦理倒错与倾国倾城)",
                        items: ["杨贵妃与唐玄宗(长恨歌)|v1", "武则天与薛怀义|v1", "武则天与张易之、张昌宗|v1", "唐太宗与武媚娘|", "唐高宗与韩国夫人|", "隋炀帝与萧皇后|", "李煜与小周后(亡国之音)|v1", "花蕊夫人与孟昶(及宋太祖)|v1"]
                    },
                    {
                        title: "2. 公主与后宫秘闻",
                        items: ["高阳公主与辩机和尚|v1", "太平公主与薛绍(及崔湜)|", "安乐公主与武延秀|", "唐中宗与韦后(及武三思)|", "上官婉儿与崔湜|v1", "侯夫人与隋炀帝(迷楼记)|"]
                    },
                    {
                        title: "3. 晚唐风月 (青楼文采与传奇小说)",
                        items: ["鱼玄机与温庭筠|v1", "薛涛与元稹(姐弟恋)|v1", "霍小玉与李益(紫钗记原型)|v1", "步非烟与赵象(私通被捶死)|v1", "李商隐与宋华阳(女道士)|", "杜牧与张好好(扬州一梦)|", "红拂女与李靖(风尘三侠)|v1", "聂隐娘与磨镜少年|"]
                    }
                ]
            },
            {
                category: "四、 宋元·话本、青楼与文人忧思",
                subCats: [
                    {
                        title: "1. 宋代词人与青楼名妓",
                        items: ["李师师与宋徽宗(及燕青)|v1", "周邦彦与李师师(床下听雨)|", "柳永与虫娘(奉旨填词)|v1", "苏轼与王朝云|", "陆游与唐婉(钗头凤)|v1", "李清照与赵明诚(金石录)|", "严蕊与唐仲友|", "琴操与苏轼|"]
                    },
                    {
                        title: "2. 话本与民间情色 (欲望投射)",
                        items: ["西门庆与潘金莲(市井情色)|v1", "王婆、武大郎与潘金莲|", "卖油郎与花魁娘子(王美娘)|v1", "王魁与敫桂英(痴情女与负心汉)|v1", "冯梦龙笔下杜十娘与李甲|v1", "苏三(玉堂春)与王景隆|"]
                    },
                    {
                        title: "3. 元曲深情 (禁锢下的反抗)",
                        items: ["崔莺莺与张生(西厢记)|v1", "裴少俊与李千金(墙头马上)|v1", "关汉卿与朱帘秀|", "赵盼儿与风月救风尘|", "张珙与红娘(牵线搭桥)|"]
                    }
                ]
            },
            {
                category: "五、 明清·秦淮八艳、红楼与志怪奇情",
                subCats: [
                    {
                        title: "1. 晚明奇情 (秦淮八艳与纵欲思潮)",
                        items: ["柳如是与钱谦益(水太冷)|v1", "陈圆圆与吴三桂(冲冠一怒)|v1", "李香君与侯方域(桃花扇)|v1", "董小宛与冒辟疆|", "顾横波与龚鼎孳|", "寇白门与朱国弼|", "马湘兰与王稚登|", "李渔与乔、王二姬(声容之癖)|"]
                    },
                    {
                        title: "2. 清代帝王与宫廷秘闻",
                        items: ["顺治帝与董鄂妃(出家之谜)|v1", "皇太极与海兰珠|", "多尔衮与孝庄太后(太后下嫁)|v1", "乾隆与香妃(容妃)|v1", "慈禧与荣禄(及李莲英传说)|v1", "同治帝与八大胡同(野史)|"]
                    },
                    {
                        title: "3. 笔记志怪与世情小说巅峰",
                        items: ["贾宝玉与林黛玉(木石前盟)|v1", "贾宝玉与薛宝钗(金玉良缘)|", "尤二姐与贾琏|", "秦可卿与贾珍(爬灰)|v1", "聂小倩与宁采臣(人鬼情未了)|v1", "婴宁与王子服(狐妖之恋)|", "莲香与桑生(人鬼狐三角)|"]
                    },
                    {
                        title: "4. 明清笔札 (同性、戏曲与秘闻)",
                        items: ["郑板桥与男色(清代男风)|v1", "张岱与各种声色犬马|", "纳兰性德与沈宛(及卢氏)|", "和珅与冯氏(及黑玫瑰)|", "年羹尧与各种姬妾|"]
                    }
                ]
            }
        ];

        const container = document.getElementById('content');

        data.forEach(main => {
            let html = `<div class="main-category"><h2>${main.category}</h2>`;
            main.subCats.forEach(sub => {
                html += `
                <details>
                    <summary>${sub.title} <span class="count-tag">(${sub.items.length}组/人)</span></summary>
                    <div class="details-content">
                        <ul class="grid-list">
                `;
                sub.items.forEach(item => {
                    const parts = item.split('|');
                    const name = parts[0];
                    const isV1 = parts[1] === 'v1' ? 'is-v1' : ''; 
                    const icon = parts[1] === 'v1' ? '👑 ' : '';
                    const searchName = name.replace(/与/g, '+').replace(/\(.*\)/g, '').trim(); 

                    html += `
                        <li class="${isV1}">
                            <a href="https://www.google.com/search?q=中国历史+${searchName}+故事" target="_blank" rel="noopener noreferrer">
                                <div class="name">${icon}${name}</div>
                            </a>
                        </li>
                    `;
                });
                html += `</ul></div></details>`;
            });
            html += `</div>`;
            container.innerHTML += html;
        });

        const toggleBtn = document.getElementById('toggleBtn');
        let isExpanded = false;

        toggleBtn.addEventListener('click', () => {
            isExpanded = !isExpanded;
            const allDetails = document.querySelectorAll('details');
            allDetails.forEach(details => {
                details.toggleAttribute('open', isExpanded);
            });
            toggleBtn.textContent = isExpanded ? '合上卷轴' : '展开卷轴';
        });

        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase().trim();
            document.querySelectorAll('.main-category').forEach(mainCat => {
                let mainHasMatch = false;
                mainCat.querySelectorAll('details').forEach(details => {
                    let detailsHasMatch = false;
                    details.querySelectorAll('.grid-list li').forEach(li => {
                        const hasMatch = li.textContent.toLowerCase().includes(term);
                        li.style.display = hasMatch ? '' : 'none';
                        if (hasMatch) detailsHasMatch = true;
                    });
                    details.style.display = detailsHasMatch ? '' : 'none';
                    if (detailsHasMatch) {
                        mainHasMatch = true;
                        if (term !== '') details.setAttribute('open', '');
                    }
                });
                mainCat.style.display = mainHasMatch ? '' : 'none';
            });
        });
    </script>
</body>
</html>
