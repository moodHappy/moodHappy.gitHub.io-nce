<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2d0a0a">
    <title>中国历代艳情人物·传奇断代档案</title>
    <style>
        /* 绯红月夜·压排与护航排版 */
        body {
            font-family: "STKaiti", "KaiTi", "BiauKai", "楷体", "SimSun", "宋体", serif;
            line-height: 1.5;
            color: #fecaca;
            max-width: 1350px; 
            margin: 0 auto;
            padding: 15px;
            background-color: #1a0505; 
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" opacity="0.03"><circle cx="300" cy="300" r="250" stroke="%23ff0000" stroke-width="2" fill="none"/><text x="130" y="320" font-family="楷体" font-size="80" transform="rotate(-15)" font-weight="bold" fill="%23ff0000">风月无边</text></svg>');
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            color: #f87171;
            font-size: 24px; 
            margin-bottom: 5px;
            letter-spacing: 5px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
            font-weight: bold;
        }

        .subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 11px;
            margin-bottom: 25px;
            border-bottom: 1px solid #7f1d1d;
            padding-bottom: 15px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .subtitle span {
            color: #f87171;
            font-weight: bold;
            padding: 0 2px;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .search-box {
            width: 100%;
            max-width: 320px;
            padding: 7px 15px;
            border: none;
            border-bottom: 2px solid #450a0a;
            background: rgba(255, 255, 255, 0.03);
            font-family: inherit;
            font-size: 12px; 
            color: #f1f5f9;
            outline: none;
            transition: all 0.3s;
            text-align: center;
            border-radius: 4px 4px 0 0;
        }

        .search-box:focus {
            border-bottom-color: #f87171;
            background: rgba(255, 255, 255, 0.06);
        }

        .toggle-btn {
            background-color: #450a0a;
            border: 1px solid #7f1d1d;
            color: #fecaca;
            padding: 6px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px; 
            font-weight: bold;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        .toggle-btn:hover {
            background-color: #7f1d1d; 
            border-color: #f87171;
            color: #fff;
            box-shadow: 0 0 15px rgba(127, 29, 29, 0.6);
        }

        .main-category {
            background: #2d0a0a;
            border: 1px solid #450a0a;
            border-radius: 6px;
            padding: 12px 15px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        }

        .main-category h2 {
            border-bottom: 1px dashed #7f1d1d;
            padding-bottom: 8px;
            color: #f87171; 
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 16px; 
            letter-spacing: 2px;
            font-weight: bold;
            text-align: center;
        }

        details {
            margin-bottom: 10px;
            background: #450a0a;
            border-radius: 4px;
            border: 1px solid #7f1d1d;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        summary {
            padding: 9px 12px;
            cursor: pointer;
            font-size: 12px; 
            font-weight: bold;
            color: #fecaca;
            background: #2d0a0a;
            border-left: 4px solid #f87171; 
            list-style: none;
            position: relative;
            white-space: nowrap; 
        }

        summary::-webkit-details-marker { display: none; }

        summary::after {
            content: "▼";
            position: absolute;
            right: 12px;
            font-size: 10px;
            color: #94a3b8;
        }

        .details-content {
            padding: 12px;
            background-color: #1a0505;
        }

        .grid-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 8px;
            padding: 0;
            margin: 0;
            list-style: none;
        }

        .grid-list li a {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px 6px;
            background-color: #2d0a0a;
            border: 1px solid #450a0a;
            color: #fecaca; 
            text-decoration: none;
            border-radius: 4px;
        }

        .grid-list li a:hover {
            border-color: #f87171;
            background-color: #7f1d1d;
        }

        .is-v1 a {
            border-color: #f87171; 
            background-color: rgba(248, 113, 113, 0.1); 
        }
        .is-v1 .name {
            color: #fca5a5; 
            font-weight: bold;
        }

        .name {
            font-size: 11px;
            text-align: center;
            white-space: nowrap; 
        }

        .count-tag {
            font-size: 10px;
            font-weight: normal;
            color: #94a3b8;
            margin-left: 4px;
        }
    </style>
</head>
<body>

    <h1>《风月无边》艳情人物档案库</h1>
    <div class="subtitle">汇集历代史料、笔记小说及传奇轶事中的 <span>风月人物</span>。带有 <span>👑</span> 的为该时期核心传奇或极具争议者。</div>

    <div class="controls">
        <input type="text" id="searchInput" class="search-box" placeholder="搜索人物 (如：西门庆)">
        <button id="toggleBtn" class="toggle-btn">展开卷轴</button>
    </div>

    <div id="content"></div>

    <script>
        const data = [
            {
                category: "一、 先秦·礼教初兴与禁忌",
                subCats: [
                    {
                        title: "1. 春秋禁断 (诸侯乱情)",
                        items: ["文姜与齐襄公|v1", "宣姜与公子顽|", "夏姬与陈灵公|v1", "息妫与蔡哀侯|"]
                    },
                    {
                        title: "2. 战国传奇 (权色博弈)",
                        items: ["赵姬与嫪毐|v1", "魏无忌与如姬|", "郑袖与楚怀王|", "寻欢客(春申君)|"]
                    }
                ]
            },
            {
                category: "二、 秦汉魏晋·宫闱与名士",
                subCats: [
                    {
                        title: "1. 汉宫秘史 (燕瘦环肥)",
                        items: ["赵飞燕与合德|v1", "汉成帝与张放|", "邓通与汉文帝|", "汉武帝与韩嫣|"]
                    },
                    {
                        title: "2. 魏晋风度 (纵欲与名士)",
                        items: ["曹丕与甄宓|v1", "潘安与左思|", "贾南风与美男子|v1", "山涛与嵇康(风闻)|"]
                    }
                ]
            },
            {
                category: "三、 隋唐五代·开放与浪漫",
                subCats: [
                    {
                        title: "1. 唐宫绝恋 (伦理倒错)",
                        items: ["杨贵妃与唐玄宗|v1", "武则天与薛怀义|v1", "高阳公主与辩机|v1", "太平公主与张易之|"]
                    },
                    {
                        title: "2. 晚唐风月 (青楼文采)",
                        items: ["鱼玄机与温庭筠|v1", "薛涛与元稹|", "杜牧与扬州妓|", "李商隐与锦瑟女|"]
                    }
                ]
            },
            {
                category: "四、 宋元·话本与文人忧思",
                subCats: [
                    {
                        title: "1. 市井情色 (话本原型)",
                        items: ["西门庆与潘金莲|v1", "李师师与宋徽宗|v1", "周邦彦与地道官|", "武松与孙二娘(误传)|"]
                    },
                    {
                        title: "2. 元曲深情 (禁锢下的反抗)",
                        items: ["崔莺莺与张生|v1", "杜丽娘与柳梦梅|", "裴少俊与李千金|"]
                    }
                ]
            },
            {
                category: "五、 明清·笔记与奇情之巅",
                subCats: [
                    {
                        title: "1. 明代奇情 (晚明纵欲)",
                        items: ["柳如是与钱谦益|v1", "陈圆圆与吴三桂|v1", "董小宛与冒辟疆|", "李渔与他的姬妾|"]
                    },
                    {
                        title: "2. 清代笔札 (同性与秘闻)",
                        items: ["郑板桥与好男色|", "纳兰性德与卢氏|", "慈禧与李莲英(谣传)|v1", "乾隆与香妃|"]
                    }
                ]
            }
        ];

        const container = document.getElementById('content');

        data.forEach(main => {
            let html = `<div class="main-category"><h2>${main.category}</h2>`;
            main.subCats.forEach(sub => {
                html += `
                <details>
                    <summary>${sub.title} <span class="count-tag">(${sub.items.length}组/人)</span></summary>
                    <div class="details-content">
                        <ul class="grid-list">
                `;
                sub.items.forEach(item => {
                    const parts = item.split('|');
                    const name = parts[0];
                    const isV1 = parts[1] === 'v1' ? 'is-v1' : ''; 
                    const icon = parts[1] === 'v1' ? '👑 ' : '';
                    const searchName = name.replace(/与/g, '+').trim(); 

                    html += `
                        <li class="${isV1}">
                            <a href="https://www.google.com/search?q=中国历史+${searchName}+故事" target="_blank" rel="noopener noreferrer">
                                <div class="name">${icon}${name}</div>
                            </a>
                        </li>
                    `;
                });
                html += `</ul></div></details>`;
            });
            html += `</div>`;
            container.innerHTML += html;
        });

        const toggleBtn = document.getElementById('toggleBtn');
        let isExpanded = false;

        toggleBtn.addEventListener('click', () => {
            isExpanded = !isExpanded;
            const allDetails = document.querySelectorAll('details');
            allDetails.forEach(details => {
                details.toggleAttribute('open', isExpanded);
            });
            toggleBtn.textContent = isExpanded ? '合上卷轴' : '展开卷轴';
        });

        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase().trim();
            document.querySelectorAll('.main-category').forEach(mainCat => {
                let mainHasMatch = false;
                mainCat.querySelectorAll('details').forEach(details => {
                    let detailsHasMatch = false;
                    details.querySelectorAll('.grid-list li').forEach(li => {
                        const hasMatch = li.textContent.toLowerCase().includes(term);
                        li.style.display = hasMatch ? '' : 'none';
                        if (hasMatch) detailsHasMatch = true;
                    });
                    details.style.display = detailsHasMatch ? '' : 'none';
                    if (detailsHasMatch) {
                        mainHasMatch = true;
                        if (term !== '') details.setAttribute('open', '');
                    }
                });
                mainCat.style.display = mainHasMatch ? '' : 'none';
            });
        });
    </script>
</body>
</html>
