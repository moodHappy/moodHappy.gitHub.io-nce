            margin-bottom: 25px;
            border-bottom: 1px solid #3f202c;
            padding-bottom: 15px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        
        .subtitle span {
            color: #eab308;
            font-weight: bold;
            padding: 0 2px;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .search-box {
            width: 100%;
            max-width: 340px;
            padding: 7px 15px;
            border: none;
            border-bottom: 2px solid #5c3041;
            background: rgba(255, 255, 255, 0.02);
            font-family: inherit;
            font-size: 12px; 
            color: #f3f4f6;
            outline: none;
            transition: all 0.3s;
            text-align: center;
            border-radius: 4px 4px 0 0;
        }

        .search-box:focus {
            border-bottom-color: #eab308;
            background: rgba(255, 255, 255, 0.05);
        }

        .toggle-btn {
            background-color: #1f1016;
            border: 1px solid #5c3041;
            color: #d1d5db;
            padding: 6px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px; 
            font-weight: bold;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        .toggle-btn:hover {
            background-color: #3f202c; 
            border-color: #7d4258;
            color: #eab308;
            box-shadow: 0 0 15px rgba(234, 179, 8, 0.2);
        }

        .main-category {
            background: #1f1016;
            border: 1px solid #3f202c;
            border-radius: 6px;
            padding: 12px 15px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.8);
            transition: opacity 0.3s;
        }

            border-bottom: 1px dashed #3f202c;
            padding-bottom: 8px;
            color: #fca5a5; /* 淡雪松红 */
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 15px; 
            letter-spacing: 3px;
            font-weight: bold;
            text-align: center;
        }
        
        details {
            margin-bottom: 10px;
            background: #2a151e;
            border-radius: 4px;
            border: 1px solid #4a2634;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        summary {
            padding: 9px 12px;
            cursor: pointer;
            font-size: 12px; 
            font-weight: bold;
            color: #e5e7eb;
            background: #1f1016;
            border-left: 4px solid #9f1239; 
            list-style: none;
            position: relative;
            transition: background 0.2s ease;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            white-space: nowrap; 
        }
        
        summary::-webkit-details-marker {
            display: none;
        }
        
        summary:hover {
            background: #2a151e;
            color: #eab308;
        }
        
        summary::after {
            content: "▼";
            position: absolute;
            right: 12px;
            font-size: 10px;
            color: #9ca3af;
            transition: transform 0.3s ease;
        }
        
        details[open] summary::after {
            transform: rotate(180deg);
        }
        
        .details-content {
            padding: 12px;
            background-color: #1f1016;
        }

        .grid-list {
            display: grid;
            /* 拓宽至 200px，因为名著加上作家本名较长，誓死保卫不换行底线 */
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 8px;
            padding: 0;
            margin: 0;
            list-style: none;
        }
        
        .grid-list li {
            width: 100%;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .grid-list li a {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px 6px;
            background-color: #2a151e;
            border: 1px solid #4a2634;
            color: #9ca3af; 
            text-decoration: none;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .grid-list li a::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #3f202c; 
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .grid-list li a:hover {
            border-color: #9ca3af;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.6);
        }

        .grid-list li a:hover::before {
            opacity: 1;
        }

        .grid-list li a:hover .name {
            color: #f3f4f6; 
        }

        .is-v1 a {
            border-color: #854d0e; 
            background-color: rgba(234, 179, 8, 0.06); 
        }
        .is-v1 .name {
            color: #eab308;

        }

            border-color: #eab308;

        }

            font-weight: bold;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            text-align: center;
            white-space: nowrap; /* 核心护卫：誓死不换行 */
        }

            font-size: 10px;
            font-weight: normal;
            color: #9ca3af;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin-left: 4px;

</head>

        const container = document.getElementById('content');

        data.forEach(main => {
            let html = `<div class="main-category"><h2>${main.category}</h2>`;
            main.subCats.forEach(sub => {
                html += `
                <details>
                    <summary>${sub.title} <span class="count-tag">(${sub.items.length}部)</span></summary>
                    <div class="details-content">
                        <ul class="grid-list">
                `;
                sub.items.forEach(item => {
                    const parts = item.split('|');
                    const name = parts[0];
                    const isV1 = parts[1] === 'v1' ? 'is-v1' : ''; 
                    
                    // 提取括号内的作家本名用于搜索，例如 "神曲(但丁)" 提取 "但丁"
                    let searchName = name;
                    const match = name.match(/\((.*?)\)/);
                    if (match && match[1]) {
                        searchName = match[1];
                        // 屏蔽无名氏的错误搜索
                        if(searchName === "无名氏") searchName = name.replace(/\(无名氏\)/, '');
                    }
                    
                    html += `
                        <li class="${isV1}">
                            <a href="https://www.google.com/search?q=作家+${searchName}" target="_blank" rel="noopener noreferrer">
                                <div class="name">${name}</div>
                            </a>
                        </li>
                    `;
                });
                html += `</ul></div></details>`;
            });
            html += `</div>`;
            container.innerHTML += html;
        });

        const toggleBtn = document.getElementById('toggleBtn');
        let isExpanded = false;

        toggleBtn.addEventListener('click', () => {
            isExpanded = !isExpanded;
            const allDetails = document.querySelectorAll('details');
            allDetails.forEach(details => {
                if (details.style.display !== 'none') {
                    if (isExpanded) {
                        details.setAttribute('open', '');
                    } else {
                        details.removeAttribute('open');
                    }
                }
            });
            toggleBtn.textContent = isExpanded ? '收拢书卷' : '展开书卷';
        });

        const searchInput = document.getElementById('searchInput');

        searchInput.addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase().trim();
            const allMainCategories = document.querySelectorAll('.main-category');

            allMainCategories.forEach(mainCat => {
                let mainHasMatch = false;
                const detailsElements = mainCat.querySelectorAll('details');

                detailsElements.forEach(details => {
                    let detailsHasMatch = false;
                    const items = details.querySelectorAll('.grid-list li');

                    items.forEach(li => {
                        const text = li.textContent.toLowerCase();
                        if (text.includes(term)) {
                            li.style.display = '';
                            detailsHasMatch = true;
                        } else {
                            li.style.display = 'none';
                        }
                    });

                    if (detailsHasMatch) {
                        details.style.display = '';
                        mainHasMatch = true;
                        if (term !== '') {
                            details.setAttribute('open', '');
                        } else {
                            if (!isExpanded) details.removeAttribute('open');
                        }
                    } else {
                        details.style.display = 'none';
                    }
                });

                mainCat.style.display = mainHasMatch ? '' : 'none';
            });
        });
    </script>
