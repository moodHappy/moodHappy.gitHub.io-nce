            cursor: pointer;
            font-size: 12px; 
            font-weight: bold;
            color: #e4e4e7;
            background: #18181b;
            border-left: 4px solid #52525b;

            display: none;
        }
        
        summary:hover {
            background: #27272a;
            color: #f59e0b;
            border-left-color: #f59e0b;
        }

            content: "▼";
            position: absolute;
            right: 12px;
            font-size: 10px;
            color: #71717a;
            transition: transform 0.3s ease;

        }

            padding: 12px;
            background-color: #18181b;
        }

            margin: 0;

            border-radius: 4px;
            position: relative;
            overflow: hidden;

            content: '';
            position: absolute;

            background-color: #3f3f46; 
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;

                ]
            }
        ];

        const container = document.getElementById('content');

        data.forEach(main => {
            let html = `<div class="main-category"><h2>${main.category}</h2>`;
            main.subCats.forEach(sub => {
                html += `
                <details>
                    <summary>${sub.title} <span class="count-tag">(${sub.items.length}首)</span></summary>
                    <div class="details-content">
                        <ul class="grid-list">
                `;
                sub.items.forEach(item => {
                    const parts = item.split('|');
                    const name = parts[0];
                    const isV1 = parts[1] === 'v1' ? 'is-v1' : ''; 
                    
                    // 提取乐队名或主唱名用于搜索，例如 "少年心气(涅槃乐队)" 提取 "涅槃乐队"
                    let searchName = name;
                    const match = name.match(/\((.*?)\)/);
                    if (match && match[1]) {
                        searchName = match[1];
                    }
                    
                    html += `
                        <li class="${isV1}">
                            <a href="https://www.google.com/search?q=摇滚乐队/艺人+${searchName}" target="_blank" rel="noopener noreferrer">
                                <div class="name">${name}</div>
                            </a>
                        </li>
                    `;
                });
                html += `</ul></div></details>`;
            });
            html += `</div>`;
            container.innerHTML += html;
        });

        const toggleBtn = document.getElementById('toggleBtn');
        let isExpanded = false;

        toggleBtn.addEventListener('click', () => {
            isExpanded = !isExpanded;
            const allDetails = document.querySelectorAll('details');
            allDetails.forEach(details => {
                if (details.style.display !== 'none') {
                    if (isExpanded) {
                        details.setAttribute('open', '');
                    } else {
                        details.removeAttribute('open');
                    }
                }
            });
            toggleBtn.textContent = isExpanded ? '拔下电源' : '插上电源';
        });

        const searchInput = document.getElementById('searchInput');

        searchInput.addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase().trim();
            const allMainCategories = document.querySelectorAll('.main-category');

            allMainCategories.forEach(mainCat => {
                let mainHasMatch = false;
                const detailsElements = mainCat.querySelectorAll('details');

                detailsElements.forEach(details => {
                    let detailsHasMatch = false;
                    const items = details.querySelectorAll('.grid-list li');

                    items.forEach(li => {
                        const text = li.textContent.toLowerCase();
                        if (text.includes(term)) {
                            li.style.display = '';
                            detailsHasMatch = true;
                        } else {
                            li.style.display = 'none';
                        }
                    });

                    if (detailsHasMatch) {
                        details.style.display = '';
                        mainHasMatch = true;
                        if (term !== '') {
                            details.setAttribute('open', '');
                        } else {
                            if (!isExpanded) details.removeAttribute('open');
                        }
                    } else {
                        details.style.display = 'none';
                    }
                });

                mainCat.style.display = mainHasMatch ? '' : 'none';
            });
        });
    </script>
</body>
</html>
