<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f6f4ec">
    <title>北欧神话九界诸神图鉴</title>
    <style>
        /* 基础古风排版 */
        body {
            font-family: "STKaiti", "KaiTi", "BiauKai", "楷体", "SimSun", "宋体", serif;
            line-height: 1.6;
            color: #1c2331; /* 北欧冷峻深色 */
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f4f5f7; /* 冰原冷灰底色 */
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" opacity="0.03"><text x="10" y="150" font-family="楷体" font-size="36" transform="rotate(-30)">北欧神话</text></svg>');
        }

        h1 {
            text-align: center;
            color: #2c3e50; /* 峡湾深蓝 */
            font-size: 26px; 
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
            border-bottom: 2px solid #bdc3c7;
            padding-bottom: 20px;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .search-box {
            width: 100%;
            max-width: 260px;
            padding: 8px 12px;
            border: none;
            border-bottom: 2px solid #95a5a6;
            background: transparent;
            font-family: inherit;
            font-size: 16px;
            color: #1c2331;
            outline: none;
            transition: border-color 0.3s;
            text-align: center;
        }

        .search-box:focus {
            border-bottom-color: #2c3e50;
        }

        .search-box::placeholder {
            color: #95a5a6;
            font-size: 15px;
            letter-spacing: 1px;
        }

        .toggle-btn {
            background-color: transparent;
            border: 1px solid #2c3e50;
            color: #2c3e50;
            padding: 7px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .toggle-btn:hover {
            background-color: #2c3e50;
            color: #f4f5f7;
            box-shadow: 0 2px 6px rgba(44, 62, 80, 0.2);
        }

        .main-category {
            background: #fdfdfd;
            border: 1px solid #d5dbdb;
            border-radius: 4px;
            padding: 15px; 
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
            transition: opacity 0.3s;
        }

        .main-category h2 {
            border-bottom: 1px dashed #bdc3c7;
            padding-bottom: 12px;
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 18px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        details {
            margin-bottom: 15px;
            background: #f7f9fa;
            border-radius: 4px;
            border: 1px solid #e5e8e8;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        summary {
            padding: 12px 15px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            color: #34495e;
            background: #eaeded;
            border-left: 4px solid #2c3e50;
            list-style: none;
            position: relative;
            transition: background 0.2s ease;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        summary::-webkit-details-marker {
            display: none;
        }

        summary:hover {
            background: #d5dbdb;
        }

        summary::after {
            content: "▼";
            position: absolute;
            right: 15px;
            font-size: 12px;
            color: #7f8c8d;
            transition: transform 0.3s ease;
        }

        details[open] summary::after {
            transform: rotate(180deg);
        }

        .details-content {
            padding: 15px;
            background-color: #fdfdfd;
        }

        .grid-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 10px; 
            padding: 0;
            margin: 0;
            list-style: none;
        }

        .grid-list li {
            transition: opacity 0.3s ease;
            min-width: 0; 
        }

        .grid-list li a {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px 4px; 
            background-color: transparent;
            border: 1px solid #d5dbdb;
            color: #1c2331;
            text-decoration: none;
            border-radius: 4px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            height: 100%;
            position: relative;
            overflow: hidden;
            z-index: 1;
            width: 100%;
            box-sizing: border-box;
        }

        .grid-list li a::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #2c3e50;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .grid-list li a:hover {
            border-color: #2c3e50;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(44, 62, 80, 0.2);
        }

        .grid-list li a:hover::before {
            opacity: 1;
        }

        .grid-list li a:hover .name,
        .grid-list li a:hover .subtitle {
            color: #f4f5f7;
        }

        .grid-list li a:hover .name.famous {
            color: #f1c40f; /* 符文亮金 */
            text-shadow: 0px 0px 6px rgba(241, 196, 15, 0.6);
        }

        .subtitle {
            font-size: 10px; 
            color: #7f8c8d;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin-bottom: 4px;
            transition: color 0.3s ease;
            white-space: nowrap; 
            overflow: hidden;
            text-overflow: ellipsis; 
            width: 100%; 
            text-align: center;
            letter-spacing: -0.5px; 
        }

        .name {
            font-size: 14px; 
            font-weight: 600;
            letter-spacing: 0px; 
            transition: color 0.3s ease, text-shadow 0.3s ease;
            white-space: nowrap; 
            overflow: hidden;
            text-overflow: ellipsis; 
            width: 100%;
            text-align: center;
        }

        .name.famous {
            color: #b8860b; /* 符文暗金 */
            text-shadow: 0px 1px 1px rgba(184, 134, 11, 0.2);
        }

        .count-tag {
            font-size: 13px;
            font-weight: normal;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

    <h1>《北欧神话》<br>九界诸神与史诗图鉴</h1>

    <div class="controls">
        <input type="text" id="searchInput" class="search-box" placeholder="寻觅诸神与史诗 (搜汉字)">
        <button id="toggleBtn" class="toggle-btn">展开卷轴</button>
    </div>

    <div id="content"></div>

    <script>
        // 定义最知名的北欧神明、怪物与事件 (高亮金色)
        const famousEntities = [
            "奥丁", "托尔", "洛基", "弗雷", "芙蕾雅", "提尔", "海姆达尔", "巴德尔",
            "尤弥尔", "芬里尔", "耶梦加得", "海拉", "尼德霍格", "苏尔特尔", "女武神",
            "妙尔尼尔", "冈格尼尔", "世界树", "齐格飞", "布伦希尔德",
            "诸神黄昏", "巴德尔之死", "阿斯加德", "米德加尔特"
        ];

        const data = [
            {
                category: "一、 九界与宇宙根基篇",
                subCats: [
                    {
                        title: "1. 宇宙之基",
                        items: ["世界树|连接九界的宇宙之树", "金伦加鸿沟|创世之前的无底深渊", "命运之井|乌尔德之泉", "智慧之泉|密米尔之泉", "赫瓦格密尔|毒龙啃食的沸腾之泉", "彩虹桥|连接神镇与人类的焰光桥"]
                    },
                    {
                        title: "2. 宇宙九界",
                        items: ["阿斯加德|阿萨神族之国", "华纳海姆|华纳神族之国", "亚尔夫海姆|光之精灵国度", "米德加尔特|人类居住的中庭", "约顿海姆|冰霜巨人之国", "斯瓦塔尔夫海姆|矮人与黑精灵之国", "尼福尔海姆|雾与死之冰国", "穆斯贝尔海姆|火之国", "赫尔海姆|死灵之国"]
                    }
                ]
            },
            {
                category: "二、 阿萨神族",
                subCats: [
                    {
                        title: "1. 主神与王座",
                        items: ["奥丁|众神之父/阿斯加德神王", "托尔|雷神/力量与风暴之神", "弗丽嘉|神后/婚姻与家庭女神", "提尔|战神/契约与正义之神", "海姆达尔|彩虹桥守望者/破晓神", "巴德尔|光明与喜悦之神", "霍德尔|盲眼的黑暗与寒冬之神"]
                    },
                    {
                        title: "2. 次代神明与从神",
                        items: ["维达|森林与复仇之神/无言神", "瓦利|自然与射击之神/复仇神", "布拉基|诗歌与音乐之神", "伊登|青春女神/金苹果守护者", "西芙|土地与收获女神", "乌勒尔|冬猎与滑雪之神", "曼尼|托尔之子/力量之神", "摩迪|托尔之子/勇气之神", "女武神|瓦尔基里/引导英灵的战神"]
                    }
                ]
            },
            {
                category: "三、 华纳神族与巨人篇",
                subCats: [
                    {
                        title: "1. 华纳神族",
                        items: ["尼奥尔德|夏日与海之神/财富神", "弗雷|丰饶与阳光之神", "芙蕾雅|爱与美/女武神首领", "古尔薇格|黄金女神/引发战争的魔女"]
                    },
                    {
                        title: "2. 诡计一脉 (洛基及其眷属)",
                        items: ["洛基|诡计之神/火神", "安格尔博达|悲伤使者/洛基的巨人妻子", "西格恩|洛基的忠诚神族妻子", "纳尔弗|洛基之子(被撕裂)", "瓦利(洛基子)|洛基之子(变成狼)"]
                    },
                    {
                        title: "3. 始祖与远古巨人",
                        items: ["尤弥尔|诞生于冰火的太古巨祖", "苏尔特尔|手持炎剑的火巨人王", "包尔|奥丁的祖父", "贝斯特拉|奥丁的母亲/女巨人", "密米尔|守护智慧之泉的智者巨人", "斯克里米尔|用手套骗过雷神的幻象巨人", "赫朗格尼尔|与雷神决斗的最强巨人"]
                    }
                ]
            },
            {
                category: "四、 灭世魔物与神兽篇",
                subCats: [
                    {
                        title: "1. 终焉的祸端 (灭世级魔物)",
                        items: ["芬里尔|吞噬神明的灭世巨狼", "耶梦加得|环绕中庭的尘世巨蟒", "海拉|冥界女王/死亡半尸女神", "尼德霍格|啃食世界树之根的毒龙", "加姆|守卫冥界大门的血染巨犬", "法夫纳|守护财宝的贪婪毒龙"]
                    },
                    {
                        title: "2. 日月吞噬者与神树之仆",
                        items: ["斯库尔|吞噬太阳的追日巨狼", "哈提|吞噬月亮的追月巨狼", "拉塔托斯克|在世界树上挑拨离间的松鼠", "维德佛尔尼尔|停在世界树顶的猎鹰", "达因|啃食树叶的四头牡鹿之一"]
                    },
                    {
                        title: "3. 诸神的神圣坐骑",
                        items: ["斯莱普尼斯|奥丁的八足神马", "坦格里斯尼尔|雷神的拉车山羊(咬齿者)", "坦格乔斯特|雷神的拉车山羊(磨齿者)", "古林博斯帝|弗雷的金色鬃毛野猪", "芬葛|芙蕾雅的拉车神猫"]
                    }
                ]
            },
            {
                category: "五、 传奇神器与宝物篇",
                subCats: [
                    {
                        title: "1. 诸神的武装 (神造之物)",
                        items: ["妙尔尼尔|雷神之锤/粉碎者", "冈格尼尔|百发百中的命运之矛", "魔剑莱瓦汀|洛基打造的破灭之枝", "格拉墨|斩杀毒龙的树中剑", "提尔锋|斩断一切的诅咒魔剑", "赫格尼之剑|见血方回的毒剑"]
                    },
                    {
                        title: "2. 神奇道具与异宝",
                        items: ["德罗普尼尔|每九天裂变的金戒指", "加拉尔|海姆达尔的报警号角", "斯基德普拉特尼|弗雷的折叠神船", "布里希嘉曼|芙蕾雅的繁星项链", "雅恩格利佩尔|雷神的铁手套", "梅金吉奥德|雷神的力量腰带", "青春苹果|伊登看守的不死灵药"]
                    }
                ]
            },
            {
                category: "六、 著名史诗与灭世事件篇",
                subCats: [
                    {
                        title: "1. 神话纪元 (创世与争端)",
                        items: ["创世之初|尤弥尔之死与世界形成", "阿萨与华纳之战|两大神族的交锋与融合", "智者密米尔之泉|奥丁献祭右眼换取智慧", "诗体埃达|吟游诗人的神话长诗", "筑墙巨人的赌局|洛基变成母马化解危机", "雷神的新娘|托尔男扮女装夺回神锤", "金苹果失窃|洛基受胁迫带走伊登"]
                    },
                    {
                        title: "2. 英雄传说 (尼伯龙根的指环)",
                        items: ["莱茵的黄金|被诅咒的财富与悲剧开端", "拔出树中剑|齐格蒙德的英雄宿命", "齐格飞屠龙|沐浴龙血的不死英雄", "唤醒女武神|穿越烈火解救布伦希尔德", "记忆的魔药|齐格飞的失忆与背叛", "布伦希尔德的复仇|引向双亡的毁灭之火"]
                    },
                    {
                        title: "3. 宿命的终结 (通向毁灭之路)",
                        items: ["巴德尔之死|槲寄生与诸神黄昏的导火索", "洛基的受罚|被绑在岩石上承受毒液", "芬里尔的挣脱|斩断格莱普尼尔锁链", "芬布尔之冬|长达三年的无情寒冬", "诸神黄昏|无法逃避的众神灭世之战", "新世界的重生|世界树的幸存者与新神"]
                    }
                ]
            }
        ];

        const container = document.getElementById('content');

        data.forEach(main => {
            let html = `<div class="main-category"><h2>${main.category}</h2>`;
            main.subCats.forEach(sub => {
                html += `
                <details>
                    <summary>${sub.title} <span class="count-tag">(${sub.items.length}个)</span></summary>
                    <div class="details-content">
                        <ul class="grid-list">
                `;
                sub.items.forEach(item => {
                    const [name, subtitle] = item.split('|');
                    const searchName = name; 

                    const isFamous = famousEntities.includes(name);
                    const nameClass = isFamous ? "name famous" : "name";

                    html += `
                        <li class="item-li">
                            <a href="https://www.google.com/search?tbm=isch&q=北欧神话+${searchName}" target="_blank" rel="noopener noreferrer" title="${subtitle} - ${name}">
                                <div class="subtitle">${subtitle}</div>
                                <div class="${nameClass}">${name}</div>
                            </a>
                        </li>
                    `;
                });
                html += `</ul></div></details>`;
            });
            html += `</div>`;
            container.innerHTML += html;
        });

        const toggleBtn = document.getElementById('toggleBtn');
        let isExpanded = false;

        toggleBtn.addEventListener('click', () => {
            isExpanded = !isExpanded;
            const allDetails = document.querySelectorAll('details');
            allDetails.forEach(details => {
                if (details.style.display !== 'none') {
                    if (isExpanded) {
                        details.setAttribute('open', '');
                    } else {
                        details.removeAttribute('open');
                    }
                }
            });
            toggleBtn.textContent = isExpanded ? '收起卷轴' : '展开卷轴';
        });

        const searchInput = document.getElementById('searchInput');

        searchInput.addEventListener('input', function(e) {
            const term = e.target.value.trim();
            const allMainCategories = document.querySelectorAll('.main-category');

            allMainCategories.forEach(mainCat => {
                let mainHasMatch = false;
                const detailsElements = mainCat.querySelectorAll('details');

                detailsElements.forEach(details => {
                    let detailsHasMatch = false;
                    const items = details.querySelectorAll('.item-li');

                    items.forEach(li => {
                        const text = li.textContent;
                        if (text.includes(term)) {
                            li.style.display = '';
                            detailsHasMatch = true;
                        } else {
                            li.style.display = 'none';
                        }
                    });

                    if (detailsHasMatch) {
                        details.style.display = '';
                        mainHasMatch = true;
                        if (term !== '') {
                            details.setAttribute('open', '');
                        } else {
                            if (!isExpanded) details.removeAttribute('open');
                        }
                    } else {
                        details.style.display = 'none';
                    }
                });

                mainCat.style.display = mainHasMatch ? '' : 'none';
            });
        });
    </script>
</body>
</html>
