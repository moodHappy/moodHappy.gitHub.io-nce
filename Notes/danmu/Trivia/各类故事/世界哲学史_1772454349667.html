            outline: none;
            transition: all 0.3s;
            text-align: center;

        }

        .search-box:focus {
            border-bottom-color: #fbbf24;
            background: rgba(255, 255, 255, 0.05);
        }

            border-radius: 6px;
            padding: 12px 15px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.8);

            border-bottom: 1px dashed #1f2937;
            padding-bottom: 8px;
            color: #9ca3af; 
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 15px; 
            letter-spacing: 3px;
            font-weight: bold;
            text-align: center;
        }
        
        details {
            margin-bottom: 10px;
            background: #1f2937;
            border-radius: 4px;
            border: 1px solid #374151;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        summary {
            padding: 9px 12px;
            cursor: pointer;
            font-size: 12px; 
            font-weight: bold;
            color: #e5e7eb;
            background: #111827;
            border-left: 4px solid #4b5563; 
            list-style: none;
            position: relative;
            transition: background 0.2s ease;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            white-space: nowrap; 
        }
        
        summary::-webkit-details-marker {
            display: none;
        }
        
        summary:hover {
            background: #1f2937;
            color: #fbbf24;
        }
        
        summary::after {
            content: "▼";
            position: absolute;
            right: 12px;
            font-size: 10px;
            color: #6b7280;
            transition: transform 0.3s ease;
        }
        
        details[open] summary::after {
            transform: rotate(180deg);
        }
        
        .details-content {
            padding: 12px;
            background-color: #111827;
        }

        .grid-list {
            display: grid;
            /* 拓宽至 200px，因为哲学主张加上人名较长，誓死保卫不换行底线 */
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 8px;
            padding: 0;
            margin: 0;
            list-style: none;
        }
        
        .grid-list li {
            width: 100%;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .grid-list li a {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px 6px;
            background-color: #1f2937;
            border: 1px solid #374151;
            color: #9ca3af; 
            text-decoration: none;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .grid-list li a::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #374151; 
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .grid-list li a:hover {
            border-color: #6b7280;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.6);
        }

        .grid-list li a:hover::before {
            opacity: 1;
        }

        .grid-list li a:hover .name {
            color: #f3f4f6; 
        }

        .is-v1 a {

            text-align: center;
            white-space: nowrap; /* 核心护卫：誓死不换行 */

            font-size: 10px;
            font-weight: normal;
            color: #6b7280;

                        title: "1. 早期正统派 (吠陀时代)",
                        items: ["梵我一如(商羯罗)|v1", "数论派(伊湿伐罗)|", "瑜伽经(帕坦伽利)|v1"]
                    },
                    {
                        title: "2. 早期佛教 (前6世纪起)",
                        items: ["四圣谛缘起(释迦牟尼)|v1"]
                    },
                    {
                        title: "3. 大乘佛教 (公元初起)",
                        items: ["中观空宗(龙树)|v1", "唯识宗开创(无著)|", "唯识宗大成(世亲)|v1", "因明学奠基(陈那)|"]
                    },
                    {
                        title: "4. 非正统异端 (古代印度)",
                        items: ["顺世论(婆罗波提)|", "耆那教(大雄)|v1"]
                    }
                ]
            },
            {
                category: "十三、 伊斯兰哲学",
                subCats: [
                    {
                        title: "1. 早期奠基 (9世纪)",
                        items: ["第一阿拉伯哲人(肯迪)|v1", "第二导师(法拉比)|"]
                    },
                    {
                        title: "2. 东方黄金时代 (10世纪-11世纪)",
                        items: ["医典哲人(伊本西那)|v1", "穆斯林神学复兴(安萨里)|v1"]
                    },
                    {
                        title: "3. 安达卢斯学派 (12世纪)",
                        items: ["双重真理(伊本鲁世德)|v1", "独修者(伊本图斐利)|"]
                    },
                    {
                        title: "4. 照明学派 (12世纪起)",
                        items: ["照明论(苏哈拉瓦迪)|v1", "超越智慧(穆拉萨德拉)|"]
                    }
                ]
            }
        ];

        const container = document.getElementById('content');

        data.forEach(main => {
            let html = `<div class="main-category"><h2>${main.category}</h2>`;
            main.subCats.forEach(sub => {
                html += `
                <details>
                    <summary>${sub.title} <span class="count-tag">(${sub.items.length}位)</span></summary>
                    <div class="details-content">
                        <ul class="grid-list">
                `;
                sub.items.forEach(item => {
                    const parts = item.split('|');
                    const name = parts[0];
                    const isV1 = parts[1] === 'v1' ? 'is-v1' : ''; 
                    
                    // 提取人名用于搜索，过滤掉思想括号。例如 "天人感应(董仲舒)" 变成 "哲学家 董仲舒"
                    let searchName = name;
                    const match = name.match(/\((.*?)\)/);
                    if (match && match[1]) {
                        searchName = match[1];
                    }
                    
                    html += `
                        <li class="${isV1}">
                            <a href="https://www.google.com/search?q=思想家+${searchName}" target="_blank" rel="noopener noreferrer">
                                <div class="name">${name}</div>
                            </a>
                        </li>
                    `;
                });
                html += `</ul></div></details>`;
            });
            html += `</div>`;
            container.innerHTML += html;
        });

        const toggleBtn = document.getElementById('toggleBtn');
        let isExpanded = false;

        toggleBtn.addEventListener('click', () => {
            isExpanded = !isExpanded;
            const allDetails = document.querySelectorAll('details');
            allDetails.forEach(details => {
                if (details.style.display !== 'none') {
                    if (isExpanded) {
                        details.setAttribute('open', '');
                    } else {
                        details.removeAttribute('open');
                    }
                }
            });
            toggleBtn.textContent = isExpanded ? '收拢群星' : '展开群星';
        });

        const searchInput = document.getElementById('searchInput');

        searchInput.addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase().trim();
            const allMainCategories = document.querySelectorAll('.main-category');

            allMainCategories.forEach(mainCat => {
                let mainHasMatch = false;
                const detailsElements = mainCat.querySelectorAll('details');

                detailsElements.forEach(details => {
                    let detailsHasMatch = false;
                    const items = details.querySelectorAll('.grid-list li');

                    items.forEach(li => {
                        const text = li.textContent.toLowerCase();
                        if (text.includes(term)) {
                            li.style.display = '';
                            detailsHasMatch = true;
                        } else {
                            li.style.display = 'none';
                        }
                    });

                    if (detailsHasMatch) {
                        details.style.display = '';
                        mainHasMatch = true;
                        if (term !== '') {
                            details.setAttribute('open', '');
                        } else {
                            if (!isExpanded) details.removeAttribute('open');
                        }
                    } else {
                        details.style.display = 'none';
                    }
                });

                mainCat.style.display = mainHasMatch ? '' : 'none';
            });
        });
    </script>
</body>
</html>
