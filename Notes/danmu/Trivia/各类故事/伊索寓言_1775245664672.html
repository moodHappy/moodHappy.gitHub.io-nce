<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f6f4ec">
    <title>伊索寓言动物与哲理图鉴</title>
    <style>
        /* 基础古风/自然排版 */
        body {
            font-family: "STKaiti", "KaiTi", "BiauKai", "楷体", "SimSun", "宋体", serif;
            line-height: 1.6;
            color: #2b2219; 
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f6f4ec; 
            /* 替换为伊索寓言的水印文字 */
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" opacity="0.03"><text x="10" y="150" font-family="楷体" font-size="32" transform="rotate(-30)">伊索寓言</text></svg>');
        }

        h1 {
            text-align: center;
            color: #2E4E3F; /* 森林深绿，更契合自然动物主题 */
            font-size: 26px; 
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
            border-bottom: 2px solid #c28e0e; /* 古典黄铜色 */
            padding-bottom: 20px;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .search-box {
            width: 100%;
            max-width: 260px;
            padding: 8px 12px;
            border: none;
            border-bottom: 2px solid #c4ad98;
            background: transparent;
            font-family: inherit;
            font-size: 16px;
            color: #2b2219;
            outline: none;
            transition: border-color 0.3s;
            text-align: center;
        }

        .search-box:focus {
            border-bottom-color: #2E4E3F;
        }

        .search-box::placeholder {
            color: #bfaea0;
            font-size: 15px;
            letter-spacing: 1px;
        }

        .toggle-btn {
            background-color: transparent;
            border: 1px solid #2E4E3F;
            color: #2E4E3F;
            padding: 7px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .toggle-btn:hover {
            background-color: #2E4E3F;
            color: #f6f4ec;
            box-shadow: 0 2px 6px rgba(46, 78, 63, 0.2);
        }

        .main-category {
            background: #fffdf7;
            border: 1px solid #d5c4b3;
            border-radius: 4px;
            padding: 15px; 
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
            transition: opacity 0.3s;
        }

        .main-category h2 {
            border-bottom: 1px dashed #c28e0e;
            padding-bottom: 12px;
            color: #2E4E3F;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 18px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        details {
            margin-bottom: 15px;
            background: #fbf8f1;
            border-radius: 4px;
            border: 1px solid #e2d7c8;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        summary {
            padding: 12px 15px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            color: #3e3226;
            background: #f1e9d8;
            border-left: 4px solid #2E4E3F;
            list-style: none;
            position: relative;
            transition: background 0.2s ease;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        summary::-webkit-details-marker {
            display: none;
        }

        summary:hover {
            background: #e6dac3;
        }

        summary::after {
            content: "▼";
            position: absolute;
            right: 15px;
            font-size: 12px;
            color: #8c7a6b;
            transition: transform 0.3s ease;
        }

        details[open] summary::after {
            transform: rotate(180deg);
        }

        .details-content {
            padding: 15px;
            background-color: #fffdf7;
        }

        .grid-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 10px; 
            padding: 0;
            margin: 0;
            list-style: none;
        }

        .grid-list li {
            transition: opacity 0.3s ease;
            min-width: 0; 
        }

        .grid-list li a {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px 4px; 
            background-color: transparent;
            border: 1px solid #d5c4b3;
            color: #2b2219;
            text-decoration: none;
            border-radius: 4px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            height: 100%;
            position: relative;
            overflow: hidden;
            z-index: 1;
            width: 100%;
            box-sizing: border-box;
        }

        .grid-list li a::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #2E4E3F;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .grid-list li a:hover {
            border-color: #2E4E3F;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(46, 78, 63, 0.2);
        }

        .grid-list li a:hover::before {
            opacity: 1;
        }

        .grid-list li a:hover .name,
        .grid-list li a:hover .subtitle {
            color: #f6f4ec;
        }

        .grid-list li a:hover .name.famous {
            color: #ffd700; 
            text-shadow: 0px 0px 6px rgba(255, 215, 0, 0.6);
        }

        .subtitle {
            font-size: 10px; 
            color: #8c7a6b;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin-bottom: 4px;
            transition: color 0.3s ease;
            white-space: nowrap; 
            overflow: hidden;
            text-overflow: ellipsis; 
            width: 100%; 
            text-align: center;
            letter-spacing: -0.5px; 
        }

        .name {
            font-size: 14px; 
            font-weight: 600;
            letter-spacing: 0px; 
            transition: color 0.3s ease, text-shadow 0.3s ease;
            white-space: nowrap; 
            overflow: hidden;
            text-overflow: ellipsis; 
            width: 100%;
            text-align: center;
        }

        .name.famous {
            color: #c28e0e; /* 古典金 */
            text-shadow: 0px 1px 1px rgba(194, 142, 14, 0.2);
        }

        .count-tag {
            font-size: 13px;
            font-weight: normal;
            color: #8c7a6b;
        }
    </style>
</head>
<body>

    <h1>《伊索寓言》动物与哲理图鉴</h1>

    <div class="controls">
        <input type="text" id="searchInput" class="search-box" placeholder="寻觅动物与哲理 (搜汉字)">
        <button id="toggleBtn" class="toggle-btn">展开羊皮卷</button>
    </div>

    <div id="content"></div>

    <script>
        // 核心知名角色/意象
        const famousEntities = [
            "狐狸", "乌鸦", "狼", "狮子", "老鼠", 
            "农夫", "蛇", "乌龟", "兔子", "蚂蚁", "蝈蝈", "宙斯", "赫耳墨斯"
        ];

        const data = [
            {
                category: "一、 动物启示篇 (智慧与愚蠢)",
                subCats: [
                    {
                        title: "1. 狐狸的狡黠",
                        items: ["狐狸与葡萄|吃不到葡萄说葡萄酸", "乌鸦与狐狸|爱听奉承的乌鸦丢了肉", "狐狸与山羊|遇事要先想好退路", "狐狸与面具|外表美丽却空无头脑"]
                    },
                    {
                        title: "2. 弱小的逆袭与困境",
                        items: ["乌鸦喝水|善用智慧解决困难", "老鼠开会|纸上谈兵，谁去挂铃铛", "燕子与乌鸦|炫耀美丽不如务实", "青蛙求王|盲目改变现状可能更糟"]
                    }
                ]
            },
            {
                category: "二、 人性弱点篇 (贪婪与傲慢)",
                subCats: [
                    {
                        title: "1. 贪得无厌的代价",
                        items: ["狗与它的倒影|贪心不足失去所有", "生金蛋的鹅|杀鸡取卵的短视与愚蠢", "贪婪的猎犬|因小失大"]
                    },
                    {
                        title: "2. 骄傲与虚荣",
                        items: ["龟兔赛跑|骄傲使人落后，坚持走向胜利", "蚊子与狮子|打败强者却败给蜘蛛的骄兵", "孔雀与白鹤|华而不实的外表不如飞翔的能力", "驴子与神像|狐假虎威的盲目虚荣"]
                    }
                ]
            },
            {
                category: "三、 善恶因果篇 (报恩与欺骗)",
                subCats: [
                    {
                        title: "1. 善有善报与相助",
                        items: ["狮子与老鼠|不要轻视弱者，小人物也能救强者", "蚂蚁与鸽子|投桃报李的生命互助", "老鹰与狐狸|背信弃义必受天谴惩罚"]
                    },
                    {
                        title: "2. 伪装与恶毒的本性",
                        items: ["农夫与蛇|对恶人发善心最终会害了自己", "狼与小羊|欲加之罪，何患无辞", "鹤与狼|不要指望坏人会感恩报答", "披着羊皮的狼|伪装成好人的致命危险"]
                    }
                ]
            },
            {
                category: "四、 生活哲理篇 (勤奋与务实)",
                subCats: [
                    {
                        title: "1. 未雨绸缪与勤劳",
                        items: ["蚂蚁与蝈蝈|平时不图努力，老大徒伤悲", "农夫与他的孩子们|勤劳才是真正的财宝", "两只口袋|人总只看到别人的缺点而无视自己"]
                    },
                    {
                        title: "2. 团结与社会分工",
                        items: ["父亲与三个儿子|折箭的启示，团结就是力量", "四头牛与狮子|内部一旦分裂必走向灭亡", "肚皮与四肢|社会分工协作缺一不可"]
                    }
                ]
            },
            {
                category: "五、 神话寓言篇 (神明与凡人)",
                subCats: [
                    {
                        title: "1. 奥林匹斯的神明",
                        items: ["金斧头与银斧头|诚实带来好运，贪婪一无所获", "北风与太阳|温和的劝导胜于严酷的强迫", "赫耳墨斯与雕像者|自命不凡的神明下凡", "宙斯与众猴|敝帚自珍，父母眼里出西施"]
                    },
                    {
                        title: "2. 凡人的百态",
                        items: ["吹牛的运动员|用事实说话，不要光凭口头吹嘘", "观星人|只顾仰望高远星空却掉进眼前井里", "牧羊童与狼|经常说谎的人说真话也没人信"]
                    }
                ]
            }
        ];

        const container = document.getElementById('content');

        data.forEach(main => {
            let html = `<div class="main-category"><h2>${main.category}</h2>`;
            main.subCats.forEach(sub => {
                html += `
                <details>
                    <summary>${sub.title} <span class="count-tag">(${sub.items.length}个)</span></summary>
                    <div class="details-content">
                        <ul class="grid-list">
                `;
                sub.items.forEach(item => {
                    const [name, subtitle] = item.split('|');
                    const searchName = name; 

                    // 匹配包含的知名词汇
                    const isFamous = famousEntities.some(entity => name.includes(entity));
                    const nameClass = isFamous ? "name famous" : "name";

                    // 搜索链接修改为伊索寓言相关
                    html += `
                        <li class="item-li">
                            <a href="https://www.google.com/search?tbm=isch&q=伊索寓言+${searchName}" target="_blank" rel="noopener noreferrer" title="${subtitle} - ${name}">
                                <div class="subtitle">${subtitle}</div>
                                <div class="${nameClass}">${name}</div>
                            </a>
                        </li>
                    `;
                });
                html += `</ul></div></details>`;
            });
            html += `</div>`;
            container.innerHTML += html;
        });

        const toggleBtn = document.getElementById('toggleBtn');
        let isExpanded = false;

        toggleBtn.addEventListener('click', () => {
            isExpanded = !isExpanded;
            const allDetails = document.querySelectorAll('details');
            allDetails.forEach(details => {
                if (details.style.display !== 'none') {
                    if (isExpanded) {
                        details.setAttribute('open', '');
                    } else {
                        details.removeAttribute('open');
                    }
                }
            });
            toggleBtn.textContent = isExpanded ? '收起羊皮卷' : '展开羊皮卷';
        });

        const searchInput = document.getElementById('searchInput');

        searchInput.addEventListener('input', function(e) {
            const term = e.target.value.trim();
            const allMainCategories = document.querySelectorAll('.main-category');

            allMainCategories.forEach(mainCat => {
                let mainHasMatch = false;
                const detailsElements = mainCat.querySelectorAll('details');

                detailsElements.forEach(details => {
                    let detailsHasMatch = false;
                    const items = details.querySelectorAll('.item-li');

                    items.forEach(li => {
                        const text = li.textContent;
                        if (text.includes(term)) {
                            li.style.display = '';
                            detailsHasMatch = true;
                        } else {
                            li.style.display = 'none';
                        }
                    });

                    if (detailsHasMatch) {
                        details.style.display = '';
                        mainHasMatch = true;
                        if (term !== '') {
                            details.setAttribute('open', '');
                        } else {
                            if (!isExpanded) details.removeAttribute('open');
                        }
                    } else {
                        details.style.display = 'none';
                    }
                });

                mainCat.style.display = mainHasMatch ? '' : 'none';
            });
        });
    </script>
</body>
</html>
