<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f6f4ec">
    <title>佛教人物与典故图鉴</title>
    <style>
        /* 基础古风排版 */
        body {
            font-family: "STKaiti", "KaiTi", "BiauKai", "楷体", "SimSun", "宋体", serif;
            line-height: 1.6;
            color: #2b2219; 
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f6f4ec; 
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" opacity="0.03"><text x="10" y="150" font-family="楷体" font-size="36" transform="rotate(-30)">佛教经典</text></svg>');
        }

        h1 {
            text-align: center;
            color: #5d3a1a; /* 调整为主标题色调偏褐红/沉稳色 */
            font-size: 26px; 
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
            border-bottom: 2px solid #d5c4b3;
            padding-bottom: 20px;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .search-box {
            width: 100%;
            max-width: 260px;
            padding: 8px 12px;
            border: none;
            border-bottom: 2px solid #c4ad98;
            background: transparent;
            font-family: inherit;
            font-size: 16px;
            color: #2b2219;
            outline: none;
            transition: border-color 0.3s;
            text-align: center;
        }

        .search-box:focus {
            border-bottom-color: #5d3a1a;
        }

        .search-box::placeholder {
            color: #bfaea0;
            font-size: 15px;
            letter-spacing: 1px;
        }

        .toggle-btn {
            background-color: transparent;
            border: 1px solid #5d3a1a;
            color: #5d3a1a;
            padding: 7px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .toggle-btn:hover {
            background-color: #5d3a1a;
            color: #f6f4ec;
            box-shadow: 0 2px 6px rgba(93, 58, 26, 0.2);
        }

        .main-category {
            background: #fffdf7;
            border: 1px solid #d5c4b3;
            border-radius: 4px;
            padding: 15px; 
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
            transition: opacity 0.3s;
        }

        .main-category h2 {
            border-bottom: 1px dashed #c4ad98;
            padding-bottom: 12px;
            color: #5d3a1a;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 18px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        details {
            margin-bottom: 15px;
            background: #fbf8f1;
            border-radius: 4px;
            border: 1px solid #e2d7c8;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        summary {
            padding: 12px 15px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            color: #3e3226;
            background: #f1e9d8;
            border-left: 4px solid #5d3a1a;
            list-style: none;
            position: relative;
            transition: background 0.2s ease;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        summary::-webkit-details-marker {
            display: none;
        }

        summary:hover {
            background: #e6dac3;
        }

        summary::after {
            content: "▼";
            position: absolute;
            right: 15px;
            font-size: 12px;
            color: #8c7a6b;
            transition: transform 0.3s ease;
        }

        details[open] summary::after {
            transform: rotate(180deg);
        }

        .details-content {
            padding: 15px;
            background-color: #fffdf7;
        }

        .grid-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 10px; 
            padding: 0;
            margin: 0;
            list-style: none;
        }

        .grid-list li {
            transition: opacity 0.3s ease;
            min-width: 0; 
        }

        .grid-list li a {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px 4px; 
            background-color: transparent;
            border: 1px solid #d5c4b3;
            color: #2b2219;
            text-decoration: none;
            border-radius: 4px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            height: 100%;
            position: relative;
            overflow: hidden;
            z-index: 1;
            width: 100%;
            box-sizing: border-box;
        }

        .grid-list li a::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #5d3a1a;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .grid-list li a:hover {
            border-color: #5d3a1a;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(93, 58, 26, 0.2);
        }

        .grid-list li a:hover::before {
            opacity: 1;
        }

        .grid-list li a:hover .name,
        .grid-list li a:hover .subtitle {
            color: #f6f4ec;
        }

        .grid-list li a:hover .name.famous {
            color: #ffd700; 
            text-shadow: 0px 0px 6px rgba(255, 215, 0, 0.6);
        }

        .subtitle {
            font-size: 10px; 
            color: #8c7a6b;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin-bottom: 4px;
            transition: color 0.3s ease;
            white-space: nowrap; 
            overflow: hidden;
            text-overflow: ellipsis; 
            width: 100%; 
            text-align: center;
            letter-spacing: -0.5px; 
        }

        .name {
            font-size: 14px; 
            font-weight: 600;
            letter-spacing: 0px; 
            transition: color 0.3s ease, text-shadow 0.3s ease;
            white-space: nowrap; 
            overflow: hidden;
            text-overflow: ellipsis; 
            width: 100%;
            text-align: center;
        }

        .name.famous {
            color: #c58d20; 
            text-shadow: 0px 1px 1px rgba(197, 141, 32, 0.2);
        }

        .count-tag {
            font-size: 13px;
            font-weight: normal;
            color: #8c7a6b;
        }
    </style>
</head>
<body>

    <h1>《佛教》人物与典故图鉴</h1>

    <div class="controls">
        <input type="text" id="searchInput" class="search-box" placeholder="寻觅佛菩萨与高僧 (搜汉字)">
        <button id="toggleBtn" class="toggle-btn">展开卷轴</button>
    </div>

    <div id="content"></div>

    <script>
        // 佛教中极具代表性的人物或佛菩萨
        const famousEntities = [
            "释迦牟尼", "观音菩萨", "阿弥陀佛", "药师佛", "弥勒佛", "文殊菩萨", "普贤菩萨", 
            "地藏菩萨", "菩提达摩", "玄奘", "惠能", "舍利弗", "目犍连", "阿难", "迦叶", "韦驮菩萨"
        ];

        const data = [
            {
                category: "一、 佛陀与核心弟子篇",
                subCats: [
                    {
                        title: "1. 佛陀本生与成道",
                        items: ["释迦牟尼|佛教创始者/觉者", "净饭王|佛陀之父", "摩耶夫人|佛陀之母", "罗睺罗|佛陀之子", "耶输陀罗|佛陀出家前之妻", "波斯匿王|护法明君", "频婆娑罗王|摩竭陀国护法王"]
                    },
                    {
                        title: "2. 十大弟子 (各擅胜场)",
                        items: ["舍利弗|智慧第一", "目犍连|神通第一", "摩诃迦叶|头陀第一", "阿难|多闻第一", "须菩提|解空第一", "富楼那|说法第一", "迦旃延|论议第一", "阿那律|天眼第一", "优波离|持戒第一", "罗睺罗|密行第一"]
                    },
                    {
                        title: "3. 其他重要声闻众",
                        items: ["大爱道比丘尼|首位出家女众", "周利槃陀伽|扫地悟道", "优婆塞/优婆夷|在家居士总称", "须达长者|祇树给孤独园捐赠者"]
                    }
                ]
            },
            {
                category: "二、 佛菩萨与净土篇",
                subCats: [
                    {
                        title: "1. 十方三世佛",
                        items: ["阿弥陀佛|西方极乐世界教主", "药师佛|东方净琉璃世界教主", "弥勒佛|未来佛", "燃灯佛|过去佛", "大日如来|密宗最高本尊", "阿閦佛|东方妙喜世界教主"]
                    },
                    {
                        title: "2. 四大菩萨与大士",
                        items: ["观音菩萨|大慈大悲", "文殊菩萨|大智无碍", "普贤菩萨|大行愿力", "地藏菩萨|大愿度生", "大势至菩萨|智慧之光", "日光菩萨|药师佛左胁侍", "月光菩萨|药师佛右胁侍"]
                    }
                ]
            },
            {
                category: "三、 护法天部与神明篇",
                subCats: [
                    {
                        title: "1. 护法神将",
                        items: ["韦驮菩萨|三洲感应护法", "伽蓝菩萨|关公/道场护法", "四大天王|风调雨顺天神", "帝释天|忉利天之主", "大梵天王|娑婆世界之主", "坚牢地神|大地之神"]
                    },
                    {
                        title: "2. 天龙八部 (八部众)",
                        items: ["天众|天界神灵", "龙众|水族龙神", "夜叉|勇健鬼神", "乾闼婆|香音神", "阿修罗|非天/易怒好战", "迦楼罗|大鹏金翅鸟", "紧那罗|歌神", "摩睺罗伽|大蟒神"]
                    }
                ]
            },
            {
                category: "四、 历代高僧与祖师篇",
                subCats: [
                    {
                        title: "1. 禅宗祖师 (西天与东土)",
                        items: ["菩提达摩|东土禅宗初祖", "慧可|断臂求法/二祖", "僧璨|《信心铭》作者/三祖", "道信|禅宗四祖", "弘忍|禅宗五祖", "惠能|《六祖坛经》/六祖", "神秀|北宗禅创始人"]
                    },
                    {
                        title: "2. 译经大师与求法者",
                        items: ["鸠摩罗什|四大译经家之一", "玄奘|西行求法/唯识宗祖", "法显|西行求法先驱", "义净|海路求法高僧", "真谛|四大译经家之一", "不空|密宗三大士之一"]
                    },
                    {
                        title: "3. 弘法与宗派祖师",
                        items: ["智顗|天台宗智者大师", "法藏|华严宗三祖", "善导|净土宗二祖", "鉴真|东渡日本弘法盲僧", "济公|道济禅师", "虚云|近代禅宗泰斗", "印光|近代净土宗祖师"]
                    }
                ]
            },
            {
                category: "五、 佛教法物与圣地篇",
                subCats: [
                    {
                        title: "1. 法器与供物",
                        items: ["木鱼|警醒精进", "引磬|法会法器", "念珠|计数摄心", "袈裟|福田衣", "锡杖|比丘出行法器", "曼陀罗|坛城", "莲花|出淤泥而不染", "菩提树|觉悟之树"]
                    },
                    {
                        title: "2. 四大圣地 (佛陀一生)",
                        items: ["蓝毗尼园|佛陀降生地", "菩提伽耶|佛陀成道地", "鹿野苑|初转法轮地", "拘尸那罗|佛陀涅槃地", "灵鹫山|法华经说教地"]
                    }
                ]
            },
            {
                category: "六、 经典传说与譬喻篇",
                subCats: [
                    {
                        title: "1. 本生故事 (前世修菩萨道)",
                        items: ["割肉喂鹰|尸毗王本生悲心", "舍身饲虎|萨埵那太子本生", "九色鹿|救人反遭出卖", "须大拿太子|乐善好施"]
                    },
                    {
                        title: "2. 经典著名譬喻",
                        items: ["火宅喻|《法华经》三界如火宅", "盲人摸象|认识的局限性", "衣里明珠|众生皆具佛性", "化城喻|修行途中的暂歇处", "拈花微笑|教外别传心印"]
                    }
                ]
            }
        ];

        const container = document.getElementById('content');

        data.forEach(main => {
            let html = `<div class="main-category"><h2>${main.category}</h2>`;
            main.subCats.forEach(sub => {
                html += `
                <details>
                    <summary>${sub.title} <span class="count-tag">(${sub.items.length}个)</span></summary>
                    <div class="details-content">
                        <ul class="grid-list">
                `;
                sub.items.forEach(item => {
                    const [name, subtitle] = item.split('|');
                    const searchName = name; 

                    const isFamous = famousEntities.includes(name);
                    const nameClass = isFamous ? "name famous" : "name";

                    // 搜索链接修改为佛教相关
                    html += `
                        <li class="item-li">
                            <a href="https://www.google.com/search?tbm=isch&q=佛教+${searchName}" target="_blank" rel="noopener noreferrer" title="${subtitle} - ${name}">
                                <div class="subtitle">${subtitle}</div>
                                <div class="${nameClass}">${name}</div>
                            </a>
                        </li>
                    `;
                });
                html += `</ul></div></details>`;
            });
            html += `</div>`;
            container.innerHTML += html;
        });

        const toggleBtn = document.getElementById('toggleBtn');
        let isExpanded = false;

        toggleBtn.addEventListener('click', () => {
            isExpanded = !isExpanded;
            const allDetails = document.querySelectorAll('details');
            allDetails.forEach(details => {
                if (details.style.display !== 'none') {
                    if (isExpanded) {
                        details.setAttribute('open', '');
                    } else {
                        details.removeAttribute('open');
                    }
                }
            });
            toggleBtn.textContent = isExpanded ? '收起卷轴' : '展开卷轴';
        });

        const searchInput = document.getElementById('searchInput');

        searchInput.addEventListener('input', function(e) {
            const term = e.target.value.trim();
            const allMainCategories = document.querySelectorAll('.main-category');

            allMainCategories.forEach(mainCat => {
                let mainHasMatch = false;
                const detailsElements = mainCat.querySelectorAll('details');

                detailsElements.forEach(details => {
                    let detailsHasMatch = false;
                    const items = details.querySelectorAll('.item-li');

                    items.forEach(li => {
                        const text = li.textContent;
                        if (text.includes(term)) {
                            li.style.display = '';
                            detailsHasMatch = true;
                        } else {
                            li.style.display = 'none';
                        }
                    });

                    if (detailsHasMatch) {
                        details.style.display = '';
                        mainHasMatch = true;
                        if (term !== '') {
                            details.setAttribute('open', '');
                        } else {
                            if (!isExpanded) details.removeAttribute('open');
                        }
                    } else {
                        details.style.display = 'none';
                    }
                });

                mainCat.style.display = mainHasMatch ? '' : 'none';
            });
        });
    </script>
</body>
</html>
