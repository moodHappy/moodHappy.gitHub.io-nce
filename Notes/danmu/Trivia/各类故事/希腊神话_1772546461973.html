<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f6f4ec">
    <title>希腊神话众神与英雄图鉴</title>
    <style>
        /* 基础古风排版 */
        body {
            font-family: "STKaiti", "KaiTi", "BiauKai", "楷体", "SimSun", "宋体", serif;
            line-height: 1.6;
            color: #2b2219; 
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f6f4ec; 
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" opacity="0.03"><text x="10" y="150" font-family="楷体" font-size="36" transform="rotate(-30)">希腊神话</text></svg>');
        }

        h1 {
            text-align: center;
            color: #1a365d; 
            font-size: 26px; 
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
            border-bottom: 2px solid #d5c4b3;
            padding-bottom: 20px;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .search-box {
            width: 100%;
            max-width: 260px;
            padding: 8px 12px;
            border: none;
            border-bottom: 2px solid #c4ad98;
            background: transparent;
            font-family: inherit;
            font-size: 16px;
            color: #2b2219;
            outline: none;
            transition: border-color 0.3s;
            text-align: center;
        }

        .search-box:focus {
            border-bottom-color: #1a365d;
        }

        .search-box::placeholder {
            color: #bfaea0;
            font-size: 15px;
            letter-spacing: 1px;
        }

        .toggle-btn {
            background-color: transparent;
            border: 1px solid #1a365d;
            color: #1a365d;
            padding: 7px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .toggle-btn:hover {
            background-color: #1a365d;
            color: #f6f4ec;
            box-shadow: 0 2px 6px rgba(26, 54, 93, 0.2);
        }

        .main-category {
            background: #fffdf7;
            border: 1px solid #d5c4b3;
            border-radius: 4px;
            padding: 15px; 
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
            transition: opacity 0.3s;
        }

        .main-category h2 {
            border-bottom: 1px dashed #c4ad98;
            padding-bottom: 12px;
            color: #1a365d;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 18px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        details {
            margin-bottom: 15px;
            background: #fbf8f1;
            border-radius: 4px;
            border: 1px solid #e2d7c8;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        summary {
            padding: 12px 15px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            color: #3e3226;
            background: #f1e9d8;
            border-left: 4px solid #1a365d;
            list-style: none;
            position: relative;
            transition: background 0.2s ease;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        summary::-webkit-details-marker {
            display: none;
        }

        summary:hover {
            background: #e6dac3;
        }

        summary::after {
            content: "▼";
            position: absolute;
            right: 15px;
            font-size: 12px;
            color: #8c7a6b;
            transition: transform 0.3s ease;
        }

        details[open] summary::after {
            transform: rotate(180deg);
        }

        .details-content {
            padding: 15px;
            background-color: #fffdf7;
        }

        .grid-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 10px; 
            padding: 0;
            margin: 0;
            list-style: none;
        }

        .grid-list li {
            transition: opacity 0.3s ease;
            min-width: 0; 
        }

        .grid-list li a {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px 4px; 
            background-color: transparent;
            border: 1px solid #d5c4b3;
            color: #2b2219;
            text-decoration: none;
            border-radius: 4px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            height: 100%;
            position: relative;
            overflow: hidden;
            z-index: 1;
            width: 100%;
            box-sizing: border-box;
        }

        .grid-list li a::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #1a365d;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .grid-list li a:hover {
            border-color: #1a365d;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(26, 54, 93, 0.2);
        }

        .grid-list li a:hover::before {
            opacity: 1;
        }

        .grid-list li a:hover .name,
        .grid-list li a:hover .subtitle {
            color: #f6f4ec;
        }

        .grid-list li a:hover .name.famous {
            color: #ffd700; 
            text-shadow: 0px 0px 6px rgba(255, 215, 0, 0.6);
        }

        .subtitle {
            font-size: 10px; 
            color: #8c7a6b;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin-bottom: 4px;
            transition: color 0.3s ease;
            white-space: nowrap; 
            overflow: hidden;
            text-overflow: ellipsis; 
            width: 100%; 
            text-align: center;
            letter-spacing: -0.5px; 
        }

        .name {
            font-size: 14px; 
            font-weight: 600;
            letter-spacing: 0px; 
            transition: color 0.3s ease, text-shadow 0.3s ease;
            white-space: nowrap; 
            overflow: hidden;
            text-overflow: ellipsis; 
            width: 100%;
            text-align: center;
        }

        .name.famous {
            color: #c58d20; 
            text-shadow: 0px 1px 1px rgba(197, 141, 32, 0.2);
        }

        .count-tag {
            font-size: 13px;
            font-weight: normal;
            color: #8c7a6b;
        }
    </style>
</head>
<body>

    <h1>《希腊神话》众神与英雄图鉴</h1>

    <div class="controls">
        <input type="text" id="searchInput" class="search-box" placeholder="寻觅神明与史诗 (搜汉字)">
        <button id="toggleBtn" class="toggle-btn">展开卷轴</button>
    </div>

    <div id="content"></div>

    <script>
        const famousEntities = [
            "宙斯", "赫拉", "波塞冬", "哈迪斯", "雅典娜", "阿波罗", "阿耳忒弥斯", "阿佛洛狄忒", "阿瑞斯",
            "盖亚", "普罗米修斯", "卡俄斯", "厄洛斯",
            "赫拉克勒斯", "阿喀琉斯", "奥德修斯", "珀耳修斯", "俄狄浦斯", "美狄亚", "伊卡洛斯",
            "美杜莎", "刻耳柏洛斯", "斯芬克斯", "提丰", "塞壬",
            "提坦之战", "特洛伊战争", "奥德赛", "潘多拉的魔盒", "普罗米修斯盗火", "俄狄浦斯王"
        ];

        const data = [
            {
                category: "一、 创世与提坦篇",
                subCats: [
                    {
                        title: "1. 创世原始神 (卡俄斯与初代神)",
                        items: ["卡俄斯|混沌之神", "盖亚|大地之母", "塔耳塔洛斯|深渊之神", "厄洛斯|原始爱神", "厄瑞玻斯|黑暗之神", "倪克斯|黑夜女神", "乌拉诺斯|初代天空之神", "蓬托斯|原始海神", "乌瑞亚|山脉之神"]
                    },
                    {
                        title: "2. 十二提坦神 (第二代神族)",
                        items: ["克洛诺斯|提坦神王", "瑞亚|时光与生育女神", "俄刻阿诺斯|大洋神", "忒提斯|海洋女神", "许珀里翁|太阳与光明神", "忒亚|宝光女神", "科俄斯|暗夜与智力神", "福柏|月辉女神", "克利俄斯|星辰之神", "谟涅摩叙涅|记忆女神", "伊阿珀托斯|灵魂之神", "忒弥斯|秩序与正义女神"]
                    },
                    {
                        title: "3. 其他著名提坦",
                        items: ["普罗米修斯|先知与人类恩人", "厄庇墨透斯|后知之神", "阿特拉斯|擎天神", "勒托|哺育女神", "赫利俄斯|太阳神", "塞勒涅|月亮女神", "厄俄斯|黎明女神"]
                    }
                ]
            },
            {
                category: "二、 奥林匹斯主神篇",
                subCats: [
                    {
                        title: "1. 核心十二主神",
                        items: ["宙斯|众神之王/雷霆之神", "赫拉|天后/婚姻女神", "波塞冬|海神/地震之神", "德墨忒尔|农业与丰收女神", "雅典娜|智慧与战争女神", "阿波罗|光明/音乐/医药神", "阿耳忒弥斯|狩猎与月亮女神", "阿瑞斯|战神", "阿佛洛狄忒|爱与美之神", "赫淮斯托斯|火与工匠之神", "赫尔墨斯|神使/商业与欺骗之神", "狄俄尼索斯|酒神"]
                    },
                    {
                        title: "2. 退位或相关主神",
                        items: ["哈迪斯|冥王/财富之神", "赫斯提亚|炉灶与家庭女神", "珀耳塞福涅|冥后/春之女神", "赫柏|青春女神", "厄勒梯亚|催产女神"]
                    },
                    {
                        title: "3. 艺术与美之从神",
                        items: ["缪斯女神|掌管艺术与科学的九女神", "美惠三女神|象征魅力与美丽的女神", "荷赖|掌管季节与秩序的女神", "厄洛斯(小)|爱神丘比特"]
                    }
                ]
            },
            {
                category: "三、 自然与冥界神篇",
                subCats: [
                    {
                        title: "1. 天空与大地自然神",
                        items: ["潘|牧神/恐慌之神", "埃俄罗斯|风神", "玻瑞阿斯|北风之神", "仄费洛斯|西风之神", "厄里斯|不和女神", "尼刻|胜利女神", "伊里斯|彩虹女神", "赫卡忒|魔法与十字路口女神", "宁芙|自然精灵仙女"]
                    },
                    {
                        title: "2. 冥界与命运神祇",
                        items: ["塔纳托斯|死神", "修普诺斯|睡神", "卡戎|冥河摆渡人", "克洛托|命运三女神-纺线", "拉刻西斯|命运三女神-分配", "阿特罗波斯|命运三女神-剪断", "阿莱克托|复仇三女神之一", "墨纪拉|复仇三女神之一", "提西福涅|复仇三女神之一"]
                    }
                ]
            },
            {
                category: "四、 英雄与凡人篇",
                subCats: [
                    {
                        title: "1. 伟大半神与英雄",
                        items: ["赫拉克勒斯|力量之神/最伟大的英雄", "阿喀琉斯|特洛伊战争第一勇士", "珀耳修斯|斩杀美杜莎的英雄", "忒修斯|雅典伟大国王", "奥德修斯|伊萨卡国王/智多星", "伊阿宋|阿尔戈号船长", "贝勒罗丰|驯服飞马的英雄", "阿塔兰塔|女猎手/捷步如飞", "俄耳甫斯|传奇音乐家"]
                    },
                    {
                        title: "2. 著名凡人与国王",
                        items: ["帕里斯|引发特洛伊战争的王子", "赫克托耳|特洛伊第一勇士", "海伦|世上最美的女人", "阿伽门农|迈锡尼国王/联军统帅", "迈达斯|点石成金的国王", "西西弗斯|欺骗死神的国王", "坦塔罗斯|饱受饥渴折磨者", "皮格马利翁|爱上雕像的国王", "潘多拉|神创造的第一个女人"]
                    },
                    {
                        title: "3. 悲剧人物与传奇异客",
                        items: ["俄狄浦斯|弑父娶母的悲剧国王", "安提戈涅|坚守神圣法则的孝女", "美狄亚|爱恨交织的毒药仙女", "代达罗斯|迷宫建造者/伟大工匠", "伊卡洛斯|坠落的折翼少年", "阿里阿德涅|指引迷宫的线团公主", "喀耳刻|将人变猪的岛屿魔女", "卡珊德拉|无人相信的悲剧预言家", "欧律狄刻|被蛇咬死的毒妇/树神"]
                    }
                ]
            },
            {
                category: "五、 异兽与魔怪篇",
                subCats: [
                    {
                        title: "1. 传奇魔怪 (泰坦之裔/诅咒之物)",
                        items: ["提丰|万妖之王", "厄喀德那|万妖之母", "美杜莎|蛇发女妖", "刻耳柏洛斯|地狱三头犬", "许德拉|九头蛇", "喀迈拉|狮头羊身怪", "斯芬克斯|狮身人面兽", "弥诺陶洛斯|牛头人身怪", "塞壬|海妖", "哈耳庇厄|鹰身女妖", "百眼巨人|阿耳戈斯", "拉冬|百头巨龙", "尼米亚猛狮|刀枪不入之狮", "厄律曼托斯野猪|巨大凶暴的野猪"]
                    },
                    {
                        title: "2. 神圣瑞兽",
                        items: ["珀伽索斯|飞马", "克律索马罗斯|金羊毛之羊", "阿玛尔忒娅|哺育宙斯的神羊"]
                    }
                ]
            },
            {
                category: "六、 著名事件与史诗篇",
                subCats: [
                    {
                        title: "1. 神界纪元 (创世与争霸)",
                        items: ["提坦之战|新老神族的十年争霸", "巨灵之战|奥林匹斯对抗大地巨人", "提丰之战|宙斯与万妖之王的终极对决", "普罗米修斯盗火|为人类带来火种与文明", "潘多拉的魔盒|灾难与希望降临人间", "珀耳塞福涅被劫|四季更替的由来", "金苹果事件|引发纷争的不和之果"]
                    },
                    {
                        title: "2. 英雄纪元 (史诗与冒险)",
                        items: ["特洛伊战争|金苹果与第一美女引发的血战", "赫拉克勒斯十二伟业|赎罪与封神的英雄试炼", "阿尔戈号远航|跨海寻找金羊毛的冒险", "奥德赛|特洛伊战后十年的漫长归乡", "帕里斯的裁判|引发神明阵营分裂的选美", "忒修斯斩杀牛头怪|破解迷宫与克里特神话"]
                    },
                    {
                        title: "3. 宿命与悲剧 (神谕之劫)",
                        items: ["俄狄浦斯王|无法逃避的命运悲剧", "斯芬克斯之谜|早晨四条腿中午两条腿", "七将攻忒拜|兄弟相残的王位之争", "代达罗斯之翼|逃离克里特与伊卡洛斯之死", "俄耳甫斯下冥界|阴阳相隔的回眸之痛"]
                    }
                ]
            }
        ];

        const container = document.getElementById('content');

        data.forEach(main => {
            let html = `<div class="main-category"><h2>${main.category}</h2>`;
            main.subCats.forEach(sub => {
                html += `
                <details>
                    <summary>${sub.title} <span class="count-tag">(${sub.items.length}个)</span></summary>
                    <div class="details-content">
                        <ul class="grid-list">
                `;
                sub.items.forEach(item => {
                    const [name, subtitle] = item.split('|');
                    const searchName = name; 

                    const isFamous = famousEntities.includes(name);
                    const nameClass = isFamous ? "name famous" : "name";

                    html += `
                        <li class="item-li">
                            <a href="https://www.google.com/search?tbm=isch&q=希腊神话+${searchName}" target="_blank" rel="noopener noreferrer" title="${subtitle} - ${name}">
                                <div class="subtitle">${subtitle}</div>
                                <div class="${nameClass}">${name}</div>
                            </a>
                        </li>
                    `;
                });
                html += `</ul></div></details>`;
            });
            html += `</div>`;
            container.innerHTML += html;
        });

        const toggleBtn = document.getElementById('toggleBtn');
        let isExpanded = false;

        toggleBtn.addEventListener('click', () => {
            isExpanded = !isExpanded;
            const allDetails = document.querySelectorAll('details');
            allDetails.forEach(details => {
                if (details.style.display !== 'none') {
                    if (isExpanded) {
                        details.setAttribute('open', '');
                    } else {
                        details.removeAttribute('open');
                    }
                }
            });
            toggleBtn.textContent = isExpanded ? '收起卷轴' : '展开卷轴';
        });

        const searchInput = document.getElementById('searchInput');

        searchInput.addEventListener('input', function(e) {
            const term = e.target.value.trim();
            const allMainCategories = document.querySelectorAll('.main-category');

            allMainCategories.forEach(mainCat => {
                let mainHasMatch = false;
                const detailsElements = mainCat.querySelectorAll('details');

                detailsElements.forEach(details => {
                    let detailsHasMatch = false;
                    const items = details.querySelectorAll('.item-li');

                    items.forEach(li => {
                        const text = li.textContent;
                        if (text.includes(term)) {
                            li.style.display = '';
                            detailsHasMatch = true;
                        } else {
                            li.style.display = 'none';
                        }
                    });

                    if (detailsHasMatch) {
                        details.style.display = '';
                        mainHasMatch = true;
                        if (term !== '') {
                            details.setAttribute('open', '');
                        } else {
                            if (!isExpanded) details.removeAttribute('open');
                        }
                    } else {
                        details.style.display = 'none';
                    }
                });

                mainCat.style.display = mainHasMatch ? '' : 'none';
            });
        });
    </script>
</body>
</html>
