<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我最喜爱的女演员排行榜</title>
    <style>
        :root {
            --text-main: #2d3748;
            --primary: #667eea;
            --link-hover: #764ba2;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            color: var(--text-main);
            line-height: 1.5;
            padding: 1.5rem 0.5rem;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            text-align: center;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: #1a202c;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(255,255,255,0.5);
            font-size: 1.5rem;
        }

        .table-container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1), inset 0 1px 0 rgba(255,255,255,0.6);
            border: 1px solid rgba(255, 255, 255, 0.4);
            width: 100%;
            max-width: 800px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            table-layout: auto;
        }

        th, td {
            padding: 12px 6px;
            border-bottom: 1px solid rgba(226, 232, 240, 0.6);
            font-size: 0.9rem;
            vertical-align: middle;
        }

        th {
            background-color: rgba(241, 245, 249, 0.6);
            font-weight: 600;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td:nth-child(2), th:nth-child(2) {
            white-space: nowrap;
        }

        tr {
            transition: background-color 0.2s ease;
        }

        tr:hover {
            background-color: rgba(255, 255, 255, 0.95);
        }

        tr:last-child td {
            border-bottom: none;
        }

        a.table-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        a.table-link:hover {
            color: var(--link-hover);
            text-decoration: underline;
        }

        .jp-name {
            font-size: 0.8rem;
            color: #718096;
            line-height: 1.2;
            word-break: break-all;
        }

        .score-input {
            width: 55px;
            padding: 8px 2px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            text-align: center;
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 600;
            color: var(--primary);
            background: rgba(255, 255, 255, 0.9);
        }

        .score-input:focus {
            outline: none;
            border-color: var(--link-hover);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.25);
            transform: scale(1.05);
        }

        .rank-number {
            font-weight: 800;
            color: #a0aec0;
            font-size: 1rem;
            text-align: center;
        }

        .rank-1 { color: #fbbf24; text-shadow: 0 0 8px rgba(251, 191, 36, 0.4); font-size: 1.2rem;}
        .rank-2 { color: #94a3b8; text-shadow: 0 0 8px rgba(148, 163, 184, 0.4); font-size: 1.1rem;}
        .rank-3 { color: #b45309; text-shadow: 0 0 8px rgba(180, 83, 9, 0.4); font-size: 1.05rem;}

        .crown {
            margin-right: 4px; 
            font-size: 1rem;
            display: inline-block;
            vertical-align: baseline;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0) rotate(-15deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        @media (min-width: 600px) {
            th, td { padding: 16px 20px; font-size: 1rem; }
            .jp-name { font-size: 0.95rem; }
            .score-input { width: 70px; font-size: 1rem; }
            .rank-number { font-size: 1.1rem; }
            .rank-1 { font-size: 1.3rem;}
            .rank-2 { font-size: 1.2rem;}
            .rank-3 { font-size: 1.1rem;}
            .crown { font-size: 1.1rem; margin-right: 6px; }
            body { padding: 2rem 1rem; }
            h1 { font-size: 2rem; margin-bottom: 2rem; }
        }
    </style>
</head>
<body>

    <h1>我最喜爱的女演员排行榜</h1>

    <div class="table-container">
        <table id="rankingTable">
            <thead>
                <tr>
                    <th width="40" style="text-align: center;">排名</th>
                    <th>中文名称</th>
                    <th>日语名称</th>
                    <th width="70" style="text-align: center;">打分</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>

    <script>
        const actressesData = [
            { name: "希崎杰西卡", jpName: "希崎ジェシカ", enName: "Jessica Kizaki" },
            { name: "小野六花", jpName: "小野六花", enName: "Rikka Ono" },
            { name: "凉森玲梦", jpName: "涼森れむ", enName: "Remu Suzumori" },
            { name: "役野满里奈", jpName: "役野満里奈", enName: "Marina Yakuno" },
            { name: "七海蒂娜", jpName: "七海ティナ", enName: "Tina Nanami" },
            { name: "日下部加奈", jpName: "日下部加奈", enName: "Kana Kusakabe" },
            { name: "宫地莉央", jpName: "宮地莉央", enName: "Rio Miyachi" },
            { name: "三田真铃", jpName: "三田真鈴", enName: "Marin Mita" },
            { name: "村上悠华", jpName: "村上悠華", enName: "Yuuka Murakami" },
            { name: "月野香澄", jpName: "月野香澄", enName: "Kasumi Tsukino" },
            { name: "松冈铃", jpName: "松岡すず", enName: "Suzu Matsuoka" },
            { name: "友田彩也香", jpName: "友田彩也香", enName: "Sayaka Tomoda" },
            { name: "一乃葵", jpName: "一乃あおい", enName: "Aoi Ichino" },
            { name: "梦乃爱华", jpName: "夢乃あいか", enName: "Aika Yumeno" },
            { name: "白峰美羽", jpName: "白峰ミウ", enName: "Miu Shiramine" },
            { name: "新井莉麻", jpName: "新井リマ", enName: "Rima Arai" },
            { name: "坂道美琉", jpName: "坂道みる", enName: "Miru Sakamichi" },
            { name: "樱空桃", jpName: "桜空もも", enName: "Momo Sakura" },
            { name: "末广纯", jpName: "末広純", enName: "Jun Suehiro" },
            { name: "本庄铃", jpName: "本庄鈴", enName: "Suzu Honjo" },
            { name: "美咲佳奈", jpName: "美咲かんな", enName: "Kei Misaki" },
            { name: "七森莉莉", jpName: "七森リリ", enName: "Riri Nanamori" },
            { name: "椎名心春", jpName: "椎名心春", enName: "Koharu Shiina" },
            { name: "大槻响", jpName: "大槻ひびき", enName: "Hibiki Otsuki" }, /* 已修复：大机响 -> 大槻响 */
            { name: "新有菜", jpName: "新ありな", enName: "Arina Arata" },
            { name: "河北彩伽", jpName: "河北彩伽", enName: "Saika Kawakita" }, /* 已修复：河北彩花更名 */
            { name: "明里紬", jpName: "明里つむぎ", enName: "Tsumugi Akari" }, /* 已修复：明里纳 -> 明里紬 */
            { name: "斋藤亚美里", jpName: "斎藤あみり", enName: "Amiri Saito" },
            { name: "香水纯", jpName: "香水じゅん", enName: "Jun Kosui" },
            { name: "三上悠亚", jpName: "三上悠亜", enName: "Yua Mikami" }, /* 已修复：三上悠 -> 三上悠亚 */
            { name: "初音实", jpName: "初音みのり", enName: "Minori Hatsune" },
            { name: "小川阿佐美", jpName: "小川あさ美", enName: "Asami Ogawa" },
            { name: "神咲诗织", jpName: "神咲詩織", enName: "Shiori Kanzaki" },
            { name: "立花美凉", jpName: "立花美涼", enName: "Misuzu Tachibana" },
            { name: "川北明沙", jpName: "川北メイサ", enName: "Meisa Kawakita" },
            { name: "多香良", jpName: "多香良", enName: "Takara" },
            { name: "永濑未萌", jpName: "永瀬みなも", enName: "Minamo Nagase" },
            { name: "天使萌", jpName: "天使もえ", enName: "Moe Amatsuka" },
            { name: "爱花未满", jpName: "愛花未満", enName: "Miman Aika" },
            { name: "庵姬花", jpName: "庵ひめか", enName: "Himeka Iori" },
            { name: "藤浦惠", jpName: "藤浦めぐ", enName: "Megu Fujiura" },
            { name: "前田桃杏", jpName: "前田桃杏", enName: "Moa Maeda" },
            { name: "花守夏步", jpName: "花守夏歩", enName: "Kaho Hanamori" },
            { name: "八蜜凛", jpName: "八蜜凛", enName: "Rin Yamitsu" },
            { name: "百田光希", jpName: "百田光希", enName: "Mitsuki Momota" },
            { name: "西宫梦", jpName: "西宮ゆめ", enName: "Yume Nishimiya" },
            { name: "佐佐木明希", jpName: "佐々木あき", enName: "Aki Sasaki" },
            { name: "松下纱荣子", jpName: "松下紗栄子", enName: "Saeko Matsushita" },
            { name: "南泽海香", jpName: "南沢海香", enName: "Umika Minamizawa" },
            { name: "九野雏乃", jpName: "九野ひなの", enName: "Hinano Kuno" },
            { name: "小野坂结香", jpName: "小野坂ゆいか", enName: "Yuika Onosaka" },
            { name: "宫西光", jpName: "宮西ひかる", enName: "Hikaru Miyanishi" },
            { name: "望乃琉衣", jpName: "望乃るい", enName: "Rui Nono" },
            { name: "善场麻美", jpName: "善場まみ", enName: "Mami Zenba" },
            { name: "佐佐木沙希", jpName: "佐々木さき", enName: "Saki Sasaki" },
            { name: "妃光莉", jpName: "妃ひかり", enName: "Hikari Kisaki" },
            { name: "新妻优香", jpName: "新妻ゆうか", enName: "Yuuka Niizuma" },
            { name: "结衣酱", jpName: "ゆいちゃん", enName: "Yui" },
            { name: "白玉", jpName: "しらたま", enName: "Shiratama" },
            { name: "神谷美玖", jpName: "神谷みく", enName: "Miku Kamiya" },
            { name: "樱井莉亚", jpName: "桜井莉亜", enName: "Ria Sakurai" }
        ];

        // 初始化分数（尝试从本地存储读取，如果没有则为空）
        actressesData.forEach(item => {
            const savedScore = localStorage.getItem(`score_${item.name}`);
            item.score = savedScore !== null ? savedScore : "";
        });

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            // 排序逻辑
            actressesData.sort((a, b) => {
                const scoreA = a.score === "" ? -1 : Number(a.score);
                const scoreB = b.score === "" ? -1 : Number(b.score);
                return scoreB - scoreA;
            });

            actressesData.forEach((item, index) => {
                const tr = document.createElement('tr');

                // 1. 排名列
                const tdRank = document.createElement('td');
                tdRank.className = 'rank-number';
                if (item.score !== "") {
                    tdRank.textContent = index + 1;
                    if (index === 0) tdRank.classList.add('rank-1');
                    else if (index === 1) tdRank.classList.add('rank-2');
                    else if (index === 2) tdRank.classList.add('rank-3');
                } else {
                    tdRank.textContent = "-";
                }

                // 2. 中文姓名列 (皇冠加在姓名前面，且中文名本身不换行)
                const tdName = document.createElement('td');
                const wikiUrl = `https://zh.wikipedia.org/wiki/${encodeURIComponent(item.name)}`;
                let crownHtml = (item.score !== "" && Number(item.score) > 100) ? '<span class="crown" title="绝世神颜！">👑</span>' : '';
                tdName.innerHTML = `${crownHtml}<a href="${wikiUrl}" target="_blank" class="table-link">${item.name}</a>`;

                // 3. 日语名称列 (带 Jable 链接)
                const tdJpName = document.createElement('td');
                tdJpName.className = "jp-name";
                const urlSlug = item.enName.toLowerCase().replace(/\s+/g, '-');
                const jableUrl = `https://jable.tv/models/${urlSlug}/`;
                tdJpName.innerHTML = `<a href="${jableUrl}" target="_blank" class="table-link" style="color:#718096; text-decoration:none;">${item.jpName}</a>`;

                // 4. 打分列
                const tdScore = document.createElement('td');
                tdScore.style.textAlign = "center";
                const inputScore = document.createElement('input');
                inputScore.type = 'number';
                inputScore.className = 'score-input';
                inputScore.placeholder = '110';
                inputScore.value = item.score;

                // 失去焦点触发保存与重绘
                inputScore.addEventListener('blur', (e) => {
                    item.score = e.target.value;
                    localStorage.setItem(`score_${item.name}`, item.score);
                    renderTable();
                });

                // 回车触发保存与重绘
                inputScore.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        item.score = e.target.value;
                        localStorage.setItem(`score_${item.name}`, item.score);
                        renderTable();
                    }
                });

                tdScore.appendChild(inputScore);

                tr.appendChild(tdRank);
                tr.appendChild(tdName);
                tr.appendChild(tdJpName);
                tr.appendChild(tdScore);

                tbody.appendChild(tr);
            });
        }

        renderTable();
    </script>
</body>
</html>
