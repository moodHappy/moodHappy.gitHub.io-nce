            --link-hover: #764ba2;

            --imperial-gold-hover: #d97706;
            --cloud-blue: #4299e1;
            --cloud-blue-hover: #3182ce;
            --calendar-bg: rgba(255, 255, 255, 0.9);

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            color: var(--text-main);
            line-height: 1.4;
            padding: 1rem 0.25rem;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden; 
        }

        h1 {
            text-align: center;
            font-weight: 700;
            margin-bottom: 0.8rem;
            color: #1a202c;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(255,255,255,0.5);
            font-size: 1.35rem;
        }

        .action-buttons-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 1rem;
            width: 100%;
            max-width: 800px;
        }

        .action-row {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            width: 100%;
        }

        .token-input {
            width: 100%; padding: 10px 12px;
            border: 2px solid #e2e8f0; border-radius: 20px;
            font-size: 0.9rem; text-align: center; outline: none;
            transition: border-color 0.3s;
        }

        .token-input:focus { border-color: var(--primary); }

        .btn {
            background: var(--primary); color: white; border: none;
            padding: 8px 16px; border-radius: 20px; font-size: 0.9rem;
            font-weight: 600; cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(102, 126, 234, 0.4);
            display: inline-flex; align-items: center; justify-content: center; gap: 4px;
        }

        .btn:hover { background: var(--link-hover); transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }

        .btn-settings { background: #718096; box-shadow: 0 4px 10px rgba(113, 128, 150, 0.4); padding: 10px 20px; font-size: 1rem; }
        .btn-settings:hover { background: #4a5568; }

        .btn-cloud { background: var(--cloud-blue); box-shadow: 0 4px 10px rgba(66, 153, 225, 0.4); }
        .btn-cloud:hover { background: var(--cloud-blue-hover); }

        .btn-draw {
            background: var(--imperial-gold); box-shadow: 0 4px 10px rgba(245, 158, 11, 0.4);
            animation: pulse 2s infinite; padding: 10px 28px; font-size: 1.05rem;
        }
        .btn-draw:hover { background: var(--imperial-gold-hover); animation: none; }

        .btn-save { background: #48bb78; box-shadow: 0 4px 10px rgba(72, 187, 120, 0.4); }
        .btn-save:hover { background: #38a169; }
        .btn-danger { background: #e53e3e; box-shadow: 0 4px 10px rgba(229, 62, 62, 0.4); }
        .btn-danger:hover { background: #c53030; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.6); }
            70% { box-shadow: 0 0 0 10px rgba(245, 158, 11, 0); }
            100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
        }

        /* ========== 日历样式 ========== */
        .calendar-container {
            background: var(--calendar-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-radius: 12px; padding: 15px; width: 100%; max-width: 800px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1); border: 1px solid rgba(255, 255, 255, 0.4);
            margin-bottom: 1rem;
        }

        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding: 0 5px; }
        .cal-select { padding: 6px 12px; border-radius: 8px; border: 1px solid #cbd5e0; background: white; font-weight: 600; color: var(--primary); outline: none; cursor: pointer; font-size: 0.95rem; }
        .calendar-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-weight: bold; color: #718096; margin-bottom: 8px; font-size: 0.85rem; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; background: #edf2f7; cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: all 0.2s; position: relative; }
        .cal-day:hover:not(.empty) { background: #e2e8f0; transform: scale(1.05); }
        .cal-day.empty { background: transparent; cursor: default; }
        .cal-day.today { border: 2px solid var(--primary); color: var(--primary); font-weight: 800; }
        .cal-day.has-record::after { content: ''; position: absolute; bottom: 4px; width: 6px; height: 6px; background-color: #e53e3e; border-radius: 50%; }

        /* ========== 表格及其他样式 ========== */
        .table-container { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-radius: 12px; box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1); border: 1px solid rgba(255, 255, 255, 0.4); width: 100%; max-width: 800px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; table-layout: auto; }
        th, td { padding: 8px 4px; border-bottom: 1px solid rgba(226, 232, 240, 0.6); font-size: 0.75rem; vertical-align: middle; word-break: break-word; }
        th { background-color: rgba(241, 245, 249, 0.6); font-weight: 600; color: #475569; white-space: nowrap; }
        .sortable-th { cursor: pointer; user-select: none; transition: background-color 0.2s; }
        .sortable-th:hover { background-color: rgba(226, 232, 240, 0.8); }
        tr { transition: background-color 0.2s ease; }
        tr:hover { background-color: rgba(255, 255, 255, 0.95); }
        tr:last-child td { border-bottom: none; }
        a.table-link { color: var(--primary); text-decoration: none; font-weight: 600; }
        a.table-link:hover { text-decoration: underline; }
        .jp-name { font-size: 0.7rem; line-height: 1.1; }
        a.jp-link { color: #718096; text-decoration: none; transition: color 0.2s ease; }
        a.jp-link:hover { color: var(--primary); text-decoration: underline; }

        .num-input { width: 42px; padding: 6px 0; border: 1px solid #cbd5e0; border-radius: 6px; text-align: center; font-size: 0.85rem; font-weight: 600; color: var(--primary); background: rgba(255, 255, 255, 0.9); -moz-appearance: textfield; }
        .num-input::-webkit-outer-spin-button, .num-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .num-input:focus { outline: none; border-color: var(--link-hover); transform: scale(1.05); }

        /* 锁定的侍寝数字样式 */
        .locked-count { font-weight: 800; color: #e53e3e; font-size: 0.95rem; }

        .rank-number { font-weight: 800; color: #a0aec0; text-align: center; }
        .harem-title { font-weight: 700; color: #e53e3e; text-align: center; white-space: nowrap; font-size: 0.75rem;}
        .title-0 { color: #d69e2e; text-shadow: 0 0 8px rgba(214, 158, 46, 0.4); font-size: 0.85rem;} 
        .title-1 { color: #805ad5; } 
        .title-2 { color: #3182ce; } 

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); z-index: 1000; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s ease; }
        .modal-content { background: linear-gradient(to bottom, #fffdf0, #fff); border: 4px solid var(--imperial-gold); border-radius: 12px; padding: 25px 20px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3); transform: scale(0.8); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; width: 90%; max-width: 350px; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-overlay.active .modal-content { transform: scale(1); }
        .modal-close { position: absolute; top: 5px; right: 12px; font-size: 1.5rem; color: #a0aec0; cursor: pointer; }
        .modal-header { font-size: 1.15rem; color: #718096; margin-bottom: 8px; letter-spacing: 1px; font-weight: 700; border-bottom: 1px dashed #cbd5e0; padding-bottom: 10px;}

        /* 弹窗表单样式 */
        .modal-form { margin: 15px 0; text-align: left; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.9rem; color: #4a5568; margin-bottom: 6px; font-weight: 700; }
        .modal-input { width: 100%; padding: 10px 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 0.95rem; outline: none; transition: border-color 0.3s; font-family: inherit; resize: vertical; box-sizing: border-box;}
        .modal-input:focus { border-color: var(--imperial-gold); }

        .modal-btn-box { margin-top: 15px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;}
        .footer { margin-top: 1.5rem; font-size: 0.75rem; color: #4a5568; text-align: center; width: 100%; padding-bottom: 1rem; }

        @media (min-width: 600px) {

            .title-0 { font-size: 1rem; }
            .jp-name { font-size: 0.8rem; }
            .num-input { width: 55px; font-size: 0.95rem; }
            body { padding: 2rem 1rem; }
            h1 { font-size: 1.8rem; }
            .btn { font-size: 1rem; padding: 10px 22px; }
            .calendar-container { padding: 20px 30px; }
            .cal-day { font-size: 1rem; }
            .modal-content { padding: 25px 30px; }
        }
    </style>
</head>

            actressesData.forEach(a => a.sleepCount = 0);

            for (const date in haremHistory) {
                const record = haremHistory[date];
                const actress = actressesData.find(a => a.name === record.name);
                if (actress) {
                    actress.sleepCount++;
                }
            }

            actressesData.forEach(a => {
                if (a.sleepCount > 0) localStorage.setItem(`sleepCount_${a.name}`, a.sleepCount);
                else localStorage.removeItem(`sleepCount_${a.name}`);
            });
        }

        // ================= 敬事房日历系统 =================
        function initCalendar() {
            const yearSelect = document.getElementById('cal-year');
            const monthSelect = document.getElementById('cal-month');

            for (let y = 2020; y <= 2100; y++) {
                const opt = document.createElement('option'); opt.value = y; opt.text = y + '年'; yearSelect.appendChild(opt);
            }
            for (let m = 1; m <= 12; m++) {
                const opt = document.createElement('option'); opt.value = m; opt.text = m + '月'; monthSelect.appendChild(opt);
            }

            const now = new Date();
            yearSelect.value = now.getFullYear();
            monthSelect.value = now.getMonth() + 1;

            const datalist = document.getElementById('actressesList');
            actressesData.forEach(item => {
                const option = document.createElement('option');
                option.value = item.name;
                datalist.appendChild(option);
            });

            renderCalendar();
        }

        function getLocalDateString(dateObj) {
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const d = String(dateObj.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function renderCalendar() {
            const year = parseInt(document.getElementById('cal-year').value);
            const month = parseInt(document.getElementById('cal-month').value) - 1;
            const grid = document.getElementById('cal-grid');
            grid.innerHTML = '';

            const firstDay = new Date(year, month, 1).getDay(); 
            const daysInMonth = new Date(year, month + 1, 0).getDate(); 
            const todayStr = getLocalDateString(new Date());

            for (let i = 0; i < firstDay; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.className = 'cal-day empty'; grid.appendChild(emptyCell);
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const cell = document.createElement('div');
                cell.className = 'cal-day'; cell.innerText = day;
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;

                if (dateStr === todayStr) cell.classList.add('today');
                if (haremHistory[dateStr]) cell.classList.add('has-record');

                cell.onclick = () => showDayInfo(dateStr);
                grid.appendChild(cell);
            }
        }

        // ================= 弹窗控制与表单编辑 =================
        function openSettingsModal() {
            document.getElementById('settingsModal').classList.add('active');
        }

        function closeSettingsModal() {
            document.getElementById('settingsModal').classList.remove('active');
        }

        function showDayInfo(dateStr) {
            currentEditDate = dateStr;
            const record = haremHistory[dateStr] || {};

            document.getElementById('modal-header-text').innerText = `【敬事房档】 ${dateStr}`;
            document.getElementById('recordName').value = record.name || "";
            document.getElementById('recordRemark').value = record.remark || "";

            document.getElementById('drawModal').classList.add('active');
        }

        function saveDayRecord() {
            const nameInput = document.getElementById('recordName').value.trim();
            const remarkInput = document.getElementById('recordRemark').value.trim();

            if (!nameInput) {
                alert("陛下，名号不可为空！若要抹除记录请点击【抹除此日】。");
                return;
            }

            const actress = actressesData.find(a => a.name === nameInput);
            const title = actress ? actress.haremTitle : "未入册";

            haremHistory[currentEditDate] = {
                name: nameInput,
                remark: remarkInput,
                title: title
            };

            localStorage.setItem('harem_history', JSON.stringify(haremHistory));

            recalculateSleepCounts(); 
            renderTable();
            renderCalendar();
            closeModal();
        }

        function clearDayRecord() {
            if(haremHistory[currentEditDate]) {
                delete haremHistory[currentEditDate];
                localStorage.setItem('harem_history', JSON.stringify(haremHistory));
                recalculateSleepCounts(); 
                renderTable();
                renderCalendar();
            }
            closeModal();
        }

        function randomFillModal() {
            const haremMembers = actressesData.filter(item => item.score !== "");
            if (haremMembers.length === 0) {
                alert("陛下，后宫空虚，请先为秀女们赐分册封吧！");
                return;
            }
            const randomIndex = Math.floor(Math.random() * haremMembers.length);
            const luckyGirl = haremMembers[randomIndex];

            document.getElementById('recordName').value = luckyGirl.name;
            document.getElementById('recordRemark').value = "龙体安康，随机翻牌选中";
        }

        function drawCardForToday() {
            const todayStr = getLocalDateString(new Date());
            showDayInfo(todayStr); 
            if (!haremHistory[todayStr]) {
                randomFillModal(); 
            }
        }

        function closeModal() {
            document.getElementById('drawModal').classList.remove('active');
        }

        // ================= GitHub 云同步 =================
        const GITHUB_CONF = {
            owner: 'moodHappy', repo: 'moodHappy.github.io-nce',
            path: 'harem_data.json', token: localStorage.getItem('github_harem_token') || ''
        };

        document.getElementById('githubTokenInput').value = GITHUB_CONF.token;
        document.getElementById('githubTokenInput').addEventListener('input', (e) => {
            GITHUB_CONF.token = e.target.value.trim();
            localStorage.setItem('github_harem_token', GITHUB_CONF.token);
        });

        async function getFileSha() {
            const url = `https://api.github.com/repos/${GITHUB_CONF.owner}/${GITHUB_CONF.repo}/contents/${GITHUB_CONF.path}`;
            try {
                const response = await fetch(url, { headers: { 'Authorization': `token ${GITHUB_CONF.token}`, 'Accept': 'application/vnd.github.v3+json' }});
                if (response.ok) return (await response.json()).sha;
            } catch (e) { console.error('获取 SHA 失败:', e); }
            return null;
        }

        async function uploadToGithub() {
            if (!GITHUB_CONF.token) { alert('陛下，请先输入您的 GitHub Token！'); return; }
            const btn = document.getElementById('btn-upload');
            const originalText = btn.innerText; btn.innerText = '正在起草圣旨...';

            const dataToExport = { harem_history: haremHistory };
            actressesData.forEach(item => {
                const score = localStorage.getItem(`score_${item.name}`);
                if (score !== null && score !== "") dataToExport[`score_${item.name}`] = score;
            });

            const jsonStr = JSON.stringify(dataToExport, null, 2);
            const contentBase64 = btoa(unescape(encodeURIComponent(jsonStr)));
            const sha = await getFileSha();

            const url = `https://api.github.com/repos/${GITHUB_CONF.owner}/${GITHUB_CONF.repo}/contents/${GITHUB_CONF.path}`;
            const body = { message: 'Auto Backup Harem Data (Calendar Bound)', content: contentBase64 };
            if (sha) body.sha = sha;

            try {
                const response = await fetch(url, { method: 'PUT', headers: { 'Authorization': `token ${GITHUB_CONF.token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
                if (response.ok) {
                    alert('敬事房档（含备注）已成功同步至云端！');
                    closeSettingsModal();
                } else {
                    alert('上传失败: ' + (await response.json()).message);
                }
            } catch (e) { alert('网络波动，上传出错: ' + e); } 
            finally { btn.innerText = originalText; }
        }

        async function downloadFromGithub() {
            if (!GITHUB_CONF.token) { alert('陛下，请先输入您的 GitHub Token！'); return; }
            const btn = document.getElementById('btn-download');
            const originalText = btn.innerText; btn.innerText = '正在调取卷宗...';

            const url = `https://api.github.com/repos/${GITHUB_CONF.owner}/${GITHUB_CONF.repo}/contents/${GITHUB_CONF.path}`;
            try {
                const response = await fetch(url, { headers: { 'Authorization': `token ${GITHUB_CONF.token}`, 'Accept': 'application/vnd.github.v3+json' }});
                if (response.ok) {
                    const data = await response.json();
                    const importedData = JSON.parse(decodeURIComponent(escape(atob(data.content))));

                    for (const key in importedData) {
                        if (key.startsWith('score_')) localStorage.setItem(key, importedData[key]);
                    }
                    if (importedData.harem_history) {
                        haremHistory = importedData.harem_history;
                        localStorage.setItem('harem_history', JSON.stringify(haremHistory));
                    }
                    loadScores(); renderTable(); renderCalendar();
                    alert('云端卷宗调取成功！已为您自动合并所有历史侍寝次数。');
                    closeSettingsModal();
                } else if (response.status === 404) alert('云端空空如也，陛下请先点击【云端备份】进行初次上传！');
                else alert('下载失败: ' + (await response.json()).message);
            } catch (e) { alert('网络波动，下载出错: ' + e); } 
            finally { btn.innerText = originalText; }
        }

        // ================= 本地导入导出与表格 =================
        function exportData() {
            const dataToExport = { harem_history: haremHistory };
            actressesData.forEach(item => {
                const score = localStorage.getItem(`score_${item.name}`);
                if (score !== null && score !== "") dataToExport[`score_${item.name}`] = score;
            });

            const dataBlob = new Blob([JSON.stringify(dataToExport)], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', url);
            linkElement.setAttribute('download', 'harem_ranking_backup.json');
            linkElement.click();
            URL.revokeObjectURL(url);
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    for (const key in importedData) {
                        if (key.startsWith('score_')) localStorage.setItem(key, importedData[key]);
                    }
                    if (importedData.harem_history) {
                        haremHistory = importedData.harem_history;
                        localStorage.setItem('harem_history', JSON.stringify(haremHistory));
                    }
                    loadScores(); renderTable(); renderCalendar();
                    alert(`成功恢复数据！侍寝次数已重新校准。`);
                    closeSettingsModal();
                } catch (error) { alert("导入失败，文件格式可能损坏！"); }
                event.target.value = '';
            };
            reader.readAsText(file);
        }

        function setSort(key) {
            if (currentSortKey === key) sortDesc = !sortDesc;
            else { currentSortKey = key; sortDesc = true; }
            updateSortIcons(); renderTable();
        }

        function updateSortIcons() {
            document.getElementById('icon-score').textContent = currentSortKey === 'score' ? (sortDesc ? '🔽' : '🔼') : '';
            document.getElementById('icon-sleepCount').textContent = currentSortKey === 'sleepCount' ? (sortDesc ? '🔽' : '🔼') : '';
        }

        function calculateTitlesAndRanks() {
            let sortedForTitle = [...actressesData].sort((a, b) => {
                const scoreA = a.score === "" ? -1 : Number(a.score);
                const scoreB = b.score === "" ? -1 : Number(b.score);
                return scoreB - scoreA;
            });

            let currentTitleIndex = 0;
            let previousScore = null;
            let currentRank = 1;

            sortedForTitle.forEach((item) => {
                if (item.score !== "") {
                    let numScore = Number(item.score);
                    if (previousScore !== null && numScore < previousScore) currentTitleIndex++;
                    previousScore = numScore;
                    item.haremTitle = currentTitleIndex < haremTitlesArray.length ? haremTitlesArray[currentTitleIndex] : "官女子";
                    item.titleLevel = currentTitleIndex;
                    item.displayRank = currentRank++;
                } else {
                    item.haremTitle = "秀女"; item.titleLevel = -1; item.displayRank = "-";
                }
            });
        }

        function renderTable() {
            calculateTitlesAndRanks();
            actressesData.sort((a, b) => {
                let valA, valB;
                if (currentSortKey === 'score') {
                    valA = a.score === "" ? -1 : Number(a.score); valB = b.score === "" ? -1 : Number(b.score);
                } else if (currentSortKey === 'sleepCount') {
                    valA = a.sleepCount === "" ? -1 : Number(a.sleepCount); valB = b.sleepCount === "" ? -1 : Number(b.sleepCount);
                }
                if (valA === valB) return 0;
                return sortDesc ? (valB - valA) : (valA - valB);
            });

            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            actressesData.forEach((item) => {
                const tr = document.createElement('tr');
                const tdRank = document.createElement('td'); tdRank.className = 'rank-number'; tdRank.textContent = item.displayRank;

                const tdTitle = document.createElement('td'); tdTitle.className = 'harem-title'; tdTitle.textContent = item.haremTitle;
                if (item.score !== "") {
                    if (item.titleLevel === 0) tdTitle.classList.add('title-0');
                    else if (item.titleLevel === 1) tdTitle.classList.add('title-1');
                    else if (item.titleLevel === 2) tdTitle.classList.add('title-2');
                } else { tdTitle.style.color = "#a0aec0"; tdTitle.style.fontWeight = "normal"; }

                const tdName = document.createElement('td');
                const wikiUrl = `https://zh.wikipedia.org/wiki/${encodeURIComponent(item.name)}`;
                tdName.innerHTML = `<a href="${wikiUrl}" target="_blank" class="table-link">${item.name}</a>`;

                const tdJpName = document.createElement('td'); tdJpName.className = "jp-name";
                tdJpName.innerHTML = `<a href="${item.jpLink}" target="_blank" class="jp-link">${item.jpName}</a>`; 

                // 恩宠评分 
                const tdScore = document.createElement('td'); tdScore.style.textAlign = "center";
                const inputScore = document.createElement('input'); inputScore.type = 'number'; inputScore.className = 'num-input'; inputScore.value = item.score;
                inputScore.addEventListener('blur', (e) => {
                    item.score = e.target.value; localStorage.setItem(`score_${item.name}`, item.score); renderTable();
                });
                inputScore.addEventListener('keypress', (e) => { if(e.key==='Enter') inputScore.blur(); });
                tdScore.appendChild(inputScore);

                // 侍寝次数 (只读)
                const tdSleepCount = document.createElement('td'); 
                tdSleepCount.style.textAlign = "center";
                const spanSleepCount = document.createElement('span');
                spanSleepCount.className = 'locked-count';
                spanSleepCount.textContent = item.sleepCount || 0;
                tdSleepCount.appendChild(spanSleepCount);

                tr.appendChild(tdRank); tr.appendChild(tdTitle); tr.appendChild(tdName); tr.appendChild(tdJpName); tr.appendChild(tdScore); tr.appendChild(tdSleepCount);
                tbody.appendChild(tr);
            });
        }

        // 初始化
        initCalendar(); 
        loadScores();
        updateSortIcons();
        renderTable();
    </script>
</body>
</html>
