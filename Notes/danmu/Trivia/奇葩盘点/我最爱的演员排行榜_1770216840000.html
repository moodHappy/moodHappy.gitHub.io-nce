<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>大清后宫 - 后宫佳丽三千人</title>
    <style>
        :root {
            --text-main: #2d3748;
            --primary: #667eea;
            --link-hover: #764ba2;
            --imperial-gold: #f59e0b;
            --imperial-gold-hover: #d97706;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            color: var(--text-main);
            line-height: 1.4;
            padding: 1rem 0.25rem;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden; 
        }

        h1 {
            text-align: center;
            font-weight: 700;
            margin-bottom: 0.8rem;
            color: #1a202c;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(255,255,255,0.5);
            font-size: 1.35rem;
        }

        .action-buttons-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 1rem;
            width: 100%;
        }

        .action-row {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(102, 126, 234, 0.4);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .btn:hover { background: var(--link-hover); transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }

        .btn-draw {
            background: var(--imperial-gold);
            box-shadow: 0 4px 10px rgba(245, 158, 11, 0.4);
            animation: pulse 2s infinite;
            padding: 10px 28px;
            font-size: 1.05rem;
        }

        .btn-draw:hover {
            background: var(--imperial-gold-hover);
            animation: none;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.6); }
            70% { box-shadow: 0 0 0 10px rgba(245, 158, 11, 0); }
            100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
        }

        .table-container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.4);
            width: 100%;
            max-width: 800px;
            overflow: hidden; 
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            table-layout: auto;
        }

        th, td {
            padding: 8px 4px;
            border-bottom: 1px solid rgba(226, 232, 240, 0.6);
            font-size: 0.75rem;
            vertical-align: middle;
            word-break: break-word;
        }

        th {
            background-color: rgba(241, 245, 249, 0.6);
            font-weight: 600;
            color: #475569;
            white-space: nowrap;
        }

        .sortable-th {
            cursor: pointer;
            user-select: none;
            transition: background-color 0.2s;
        }
        .sortable-th:hover { background-color: rgba(226, 232, 240, 0.8); }

        tr { transition: background-color 0.2s ease; }
        tr:hover { background-color: rgba(255, 255, 255, 0.95); }
        tr:last-child td { border-bottom: none; }

        a.table-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        a.table-link:hover { text-decoration: underline; }

        .jp-name {
            font-size: 0.7rem;
            line-height: 1.1;
        }
        
        /* 外文名专属链接样式 */
        a.jp-link {
            color: #718096;
            text-decoration: none;
            transition: color 0.2s ease;
        }
        a.jp-link:hover {
            color: var(--primary);
            text-decoration: underline;
        }

        .num-input {
            width: 42px;
            padding: 6px 0;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--primary);
            background: rgba(255, 255, 255, 0.9);
            -moz-appearance: textfield; 
        }

        .num-input::-webkit-outer-spin-button,
        .num-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .num-input:focus {
            outline: none;
            border-color: var(--link-hover);
            transform: scale(1.05);
        }

        .rank-number { font-weight: 800; color: #a0aec0; text-align: center; }
        .harem-title { font-weight: 700; color: #e53e3e; text-align: center; white-space: nowrap; font-size: 0.75rem;}

        .title-0 { color: #d69e2e; text-shadow: 0 0 8px rgba(214, 158, 46, 0.4); font-size: 0.85rem;} 
        .title-1 { color: #805ad5; } 
        .title-2 { color: #3182ce; } 

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-content {
            background: linear-gradient(to bottom, #fffdf0, #fff);
            border: 4px solid var(--imperial-gold);
            border-radius: 12px;
            padding: 25px 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            transform: scale(0.8);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-overlay.active .modal-content { transform: scale(1); }

        .modal-close {
            position: absolute;
            top: 5px; right: 12px;
            font-size: 1.5rem;
            color: #a0aec0;
            cursor: pointer;
        }

        .modal-header { font-size: 1.1rem; color: #718096; margin-bottom: 8px; letter-spacing: 2px; }
        .modal-result { font-size: 1.8rem; font-weight: 800; color: #c53030; margin: 10px 0; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }

        .footer {
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: #4a5568;
            text-align: center;
            width: 100%;
            padding-bottom: 1rem;
        }

        @media (min-width: 600px) {
            th, td { padding: 12px 8px; font-size: 0.9rem; }
            .harem-title { font-size: 0.9rem; }
            .title-0 { font-size: 1rem; }
            .jp-name { font-size: 0.8rem; }
            .num-input { width: 55px; font-size: 0.95rem; }
            body { padding: 2rem 1rem; }
            h1 { font-size: 1.8rem; }
            .btn { font-size: 1rem; padding: 10px 22px; }
        }
    </style>
</head>

            { name: "神谷美玖", jpName: "神谷みく", enName: "Miku Kamiya", jpLink: "#" }
        ];

        const haremTitlesArray = ["皇后", "皇贵妃", "贵妃", "妃", "嫔", "贵人", "常在", "答应", "官女子"];

        let currentSortKey = 'score'; 
        let sortDesc = true;

        function loadScores() {
            actressesData.forEach(item => {
                const savedScore = localStorage.getItem(`score_${item.name}`);
                item.score = savedScore !== null ? savedScore : "";

                const savedSleep = localStorage.getItem(`sleepCount_${item.name}`);
                item.sleepCount = savedSleep !== null ? savedSleep : "";

                item.haremTitle = "-";
                item.displayRank = "-";
                item.titleLevel = -1;
            });
        }

        loadScores();

        function setSort(key) {
            if (currentSortKey === key) {
                sortDesc = !sortDesc;
            } else {
                currentSortKey = key;
                sortDesc = true;
            }
            updateSortIcons();
            renderTable();
        }

        function updateSortIcons() {
            document.getElementById('icon-score').textContent = currentSortKey === 'score' ? (sortDesc ? '🔽' : '🔼') : '';
            document.getElementById('icon-sleepCount').textContent = currentSortKey === 'sleepCount' ? (sortDesc ? '🔽' : '🔼') : '';
        }

        function calculateTitlesAndRanks() {
            let sortedForTitle = [...actressesData].sort((a, b) => {
                const scoreA = a.score === "" ? -1 : Number(a.score);
                const scoreB = b.score === "" ? -1 : Number(b.score);
                return scoreB - scoreA;
            });

            let currentTitleIndex = 0;
            let previousScore = null;
            let currentRank = 1;

            sortedForTitle.forEach((item) => {
                if (item.score !== "") {
                    let numScore = Number(item.score);
                    if (previousScore !== null && numScore < previousScore) {
                        currentTitleIndex++;
                    }
                    previousScore = numScore;

                    item.haremTitle = currentTitleIndex < haremTitlesArray.length ? haremTitlesArray[currentTitleIndex] : "官女子";
                    item.titleLevel = currentTitleIndex;
                    item.displayRank = currentRank++;
                } else {
                    item.haremTitle = "秀女";
                    item.titleLevel = -1;
                    item.displayRank = "-";
                }
            });
        }

        function renderTable() {
            calculateTitlesAndRanks();

            actressesData.sort((a, b) => {
                let valA, valB;
                if (currentSortKey === 'score') {
                    valA = a.score === "" ? -1 : Number(a.score);
                    valB = b.score === "" ? -1 : Number(b.score);
                } else if (currentSortKey === 'sleepCount') {
                    valA = a.sleepCount === "" ? -1 : Number(a.sleepCount);
                    valB = b.sleepCount === "" ? -1 : Number(b.sleepCount);
                }
                if (valA === valB) return 0;
                return sortDesc ? (valB - valA) : (valA - valB);
            });

            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            actressesData.forEach((item) => {
                const tr = document.createElement('tr');

                const tdRank = document.createElement('td');
                tdRank.className = 'rank-number';
                tdRank.textContent = item.displayRank;

                const tdTitle = document.createElement('td');
                tdTitle.className = 'harem-title';
                tdTitle.textContent = item.haremTitle;
                if (item.score !== "") {
                    if (item.titleLevel === 0) tdTitle.classList.add('title-0');
                    else if (item.titleLevel === 1) tdTitle.classList.add('title-1');
                    else if (item.titleLevel === 2) tdTitle.classList.add('title-2');
                } else {
                    tdTitle.style.color = "#a0aec0";
                    tdTitle.style.fontWeight = "normal";
                }

                const tdName = document.createElement('td');
                const wikiUrl = `https://zh.wikipedia.org/wiki/${encodeURIComponent(item.name)}`;
                tdName.innerHTML = `<a href="${wikiUrl}" target="_blank" class="table-link">${item.name}</a>`;

                const tdJpName = document.createElement('td');
                tdJpName.className = "jp-name";
                // 这里调用数据里写好的 jpLink
                tdJpName.innerHTML = `<a href="${item.jpLink}" target="_blank" class="jp-link">${item.jpName}</a>`; 

                const tdScore = document.createElement('td');
                tdScore.style.textAlign = "center";
                const inputScore = document.createElement('input');
                inputScore.type = 'number';
                inputScore.className = 'num-input';
                inputScore.value = item.score;
                inputScore.addEventListener('blur', (e) => {
                    item.score = e.target.value;
                    localStorage.setItem(`score_${item.name}`, item.score);
                    renderTable();
                });
                inputScore.addEventListener('keypress', (e) => { if(e.key==='Enter') inputScore.blur(); });
                tdScore.appendChild(inputScore);

                const tdSleepCount = document.createElement('td');
                tdSleepCount.style.textAlign = "center";
                const inputSleepCount = document.createElement('input');
                inputSleepCount.type = 'number';
                inputSleepCount.className = 'num-input';
                inputSleepCount.value = item.sleepCount;
                inputSleepCount.addEventListener('blur', (e) => {
                    item.sleepCount = e.target.value;
                    localStorage.setItem(`sleepCount_${item.name}`, item.sleepCount);
                    renderTable();
                });
                inputSleepCount.addEventListener('keypress', (e) => { if(e.key==='Enter') inputSleepCount.blur(); });
                tdSleepCount.appendChild(inputSleepCount);

                tr.appendChild(tdRank);
                tr.appendChild(tdTitle);
                tr.appendChild(tdName);
                tr.appendChild(tdJpName);
                tr.appendChild(tdScore);
                tr.appendChild(tdSleepCount);

                tbody.appendChild(tr);
            });
        }

        function drawCard() {
            const haremMembers = actressesData.filter(item => item.score !== "");

            if (haremMembers.length === 0) {
                alert("陛下，后宫空虚，请先为秀女们赐分册封吧！");
                return;
            }

            const randomIndex = Math.floor(Math.random() * haremMembers.length);
            const luckyGirl = haremMembers[randomIndex];

            const modal = document.getElementById('drawModal');
            document.getElementById('drawResultText').innerHTML = `【${luckyGirl.haremTitle}】<br/>${luckyGirl.name}`;
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('drawModal').classList.remove('active');
        }

        function exportData() {
            const dataToExport = {};
            actressesData.forEach(item => {
                const score = localStorage.getItem(`score_${item.name}`);
                if (score !== null && score !== "") dataToExport[`score_${item.name}`] = score;

                const sleepCount = localStorage.getItem(`sleepCount_${item.name}`);
                if (sleepCount !== null && sleepCount !== "") dataToExport[`sleepCount_${item.name}`] = sleepCount;
            });

            if (Object.keys(dataToExport).length === 0) {
                alert("陛下，目前没有记录可供备份！");
                return;
            }

            const dataStr = JSON.stringify(dataToExport);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);

            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', url);
            linkElement.setAttribute('download', 'harem_ranking_backup.json');
            linkElement.click();
            URL.revokeObjectURL(url);
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    let importCount = 0;

                    for (const key in importedData) {
                        if (key.startsWith('score_') || key.startsWith('sleepCount_')) {
                            localStorage.setItem(key, importedData[key]);
                            importCount++;
                        }
                    }

                    if (importCount > 0) {
                        loadScores(); 
                        renderTable(); 
                        alert(`成功恢复数据！重新册封完毕。`);
                    } else {
                        alert("备份文件中没有找到有效的记录。");
                    }
                } catch (error) {
                    alert("导入失败，文件格式可能损坏！");
                }
                event.target.value = '';
            };
            reader.readAsText(file);
        }

        updateSortIcons();
        renderTable();
    </script>
</body>
</html>
